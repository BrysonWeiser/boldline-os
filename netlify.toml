[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # DOCUSIGN_BASE_PATH is a public DocuSign API hostname (not a secret), used as a
  # code default in docusign-send.mjs. Exclude it from secret scanning so the build
  # doesn't fail on a non-sensitive value. All genuinely-secret keys stay scanned.
  SECRETS_SCAN_OMIT_KEYS = "DOCUSIGN_BASE_PATH"

[functions."weekly-report"]
  schedule = "0 15 * * 1"

[functions."monthly-report"]
  schedule = "0 15 * * *"

[functions."os-report"]
  schedule = "0 16 * * 1"

[functions."lead-followup"]
  schedule = "0 13 * * *"

[functions."blog-autopublish"]
  schedule = "0 14 * * 1,3,5"

[[redirects]]
  from = "/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/lead"
  to = "/.netlify/functions/lead-intake"
  status = 200

[[redirects]]
  from = "/lp/:slug"
  to = "/.netlify/functions/landing?slug=:slug"
  status = 200

# Internal knowledge base lives in the repo (for cross-session persistence) but must
# never be served publicly by the OS site. Force a 404 on it before the SPA catch-all.
[[redirects]]
  from = "/knowledge/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
