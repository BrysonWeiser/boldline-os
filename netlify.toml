[build]
  publish = "."
  functions = "netlify/functions"

[functions."weekly-report"]
  schedule = "0 15 * * 1"

[functions."monthly-report"]
  schedule = "0 15 * * *"

[functions."os-report"]
  schedule = "0 16 * * 1"

[functions."lead-followup"]
  schedule = "0 13 * * *"

[[redirects]]
  from = "/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/lead"
  to = "/.netlify/functions/lead-intake"
  status = 200

[[redirects]]
  from = "/lp/:slug"
  to = "/.netlify/functions/landing?slug=:slug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
