[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # These keys hold NON-SECRET values that legitimately appear in committed files, so
  # the secret scanner must skip them (their presence in code is intentional, not a leak):
  #   • DOCUSIGN_BASE_PATH   — public DocuSign API hostname, a code default in docusign-send.mjs
  #   • OWNER_EMAIL          — Bryson's email, printed on the service agreement (makeContractHTML)
  #   • REPORTS_FROM_EMAIL   — the from-address shown in owner-facing report/email content
  # Every genuinely-secret key (Stripe, Twilio auth, Supabase service role, Google Ads,
  # Resend, etc.) stays fully scanned — none of their values are ever committed.
  SECRETS_SCAN_OMIT_KEYS = "DOCUSIGN_BASE_PATH,OWNER_EMAIL,REPORTS_FROM_EMAIL"

[functions."weekly-report"]
  schedule = "0 15 * * 1"

[functions."monthly-report"]
  schedule = "0 15 * * *"

[functions."os-report"]
  schedule = "0 16 * * 1"

[functions."lead-followup"]
  schedule = "0 13 * * *"

# Daily billing enforcement: syncs overdue invoices from Stripe, accrues the
# Agreement's 1.5%/mo late interest after day 10 (as a pending invoice item on
# the client's next bill), and emails the owner on late/interest/recovered
# transitions. Management-fee side only — never ad spend.
# Runs daily at 14:30 UTC (07:30 America/Phoenix). The temporary every-20-min
# test schedule was reverted 2026-07-18 after the late-payment test verified.
[functions."billing-watch"]
  schedule = "30 14 * * *"

# Every 15 min: publishes scheduled drafts at their exact time + keeps >=1
# scheduled post in the review pipeline. Nearly every run is a cheap no-op.
[functions."blog-autopublish"]
  schedule = "*/15 * * * *"

[[redirects]]
  from = "/portal"
  to = "/.netlify/functions/portal"
  status = 200

[[redirects]]
  from = "/lead"
  to = "/.netlify/functions/lead-intake"
  status = 200

[[redirects]]
  from = "/lp/:slug"
  to = "/.netlify/functions/landing?slug=:slug"
  status = 200

# Internal knowledge base lives in the repo (for cross-session persistence) but must
# never be served publicly by the OS site. Force a 404 on it before the SPA catch-all.
[[redirects]]
  from = "/knowledge/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
