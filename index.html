// Shared owner-authed call to the stripe-billing function (used by BillingCard
// and by the renewal flow, which updates the live subscription amount).
async function stripeBilling(action,extra){
  const { data:{ session } }=await supabaseClient.auth.getSession();
  const token=session&&session.access_token;
  if(!token){ throw new Error("Session expired — refresh and log in again."); }
  const r=await fetch("/.netlify/functions/stripe-billing",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({action,...extra})});
  const d=await r.json().catch(()=>({}));
  if(!r.ok||!d.ok) throw new Error(d.error||"Request failed — try again.");
  return d;
}
// ─── BILLING CARD (inside Contract tab) ───────────────────────────────────────
// Recurring MANAGEMENT-FEE subscription via Stripe (auto-charge card/ACH) + the
// one-time setup fee. Charges BoldLine's service fee ONLY — never ad spend
// (client pays Google/Meta directly). Backend: netlify/functions/stripe-billing.mjs.
function BillingCard({client,pkg,onUpdate}) {
  const [busy,setBusy]=useState("");        // "" | "setup" | "sync" | "portal"
  const [msg,setMsg]=useState("");
  const [copied,setCopied]=useState(false);
  const [adjusting,setAdjusting]=useState(false);
  // Prefer the agreed rate (set at renewal / checkout / manual adjust) over the
  // package default, so discounts and term pricing flow into checkout + contract.
  const monthly=client.billingMonthly||(pkg&&pkg.price)||0;
  // billingSetup may legitimately be 0 (waived) — only fall back when unset.
  const setup=(client.billingSetup!=null?client.billingSetup:(pkg&&pkg.setup))||0;
  const status=client.billingStatus||"none";
  const link=client.billingCheckoutUrl||"";
  const [adjMonthly,setAdjMonthly]=useState(String(monthly));
  const [adjSetup,setAdjSetup]=useState(String(setup));
  const stdMonthly=(pkg&&pkg.price)||0, stdSetup=(pkg&&pkg.setup)||0;
  const discounted=monthly!==stdMonthly||setup!==stdSetup;

  const callBilling=stripeBilling;
  // Persist manual fee adjustments (discount the monthly, waive/reduce the setup
  // fee). Flows everywhere automatically: contract doc, checkout, revenue views.
  const applyAdjust=()=>{
    const m=Math.max(0,Number(adjMonthly)||0), s=Math.max(0,Number(adjSetup)||0);
    if(!(m>0)){ setMsg("Monthly fee must be greater than zero (Stripe requires a recurring amount)."); return; }
    setMsg("");
    onUpdate&&onUpdate({...client,billingMonthly:m,billingSetup:s});
    setAdjusting(false);
  };
  const resetAdjust=()=>{
    onUpdate&&onUpdate({...client,billingMonthly:stdMonthly,billingSetup:stdSetup});
    setAdjMonthly(String(stdMonthly)); setAdjSetup(String(stdSetup));
    setAdjusting(false); setMsg("");
  };
  const setupBilling=async()=>{
    if(!client.email){ setMsg("Add the client's email on the Overview tab first."); return; }
    setBusy("setup"); setMsg("");
    try{
      const d=await callBilling("create-checkout",{clientId:client.id,email:client.email,name:client.contactName||client.name,packageName:pkg&&pkg.name,monthlyAmount:monthly,setupAmount:setup,customerId:client.stripeCustomerId||"",origin:window.location.origin});
      onUpdate&&onUpdate({...client,stripeCustomerId:d.customerId,billingStatus:"awaiting_payment",billingCheckoutUrl:d.url,billingMonthly:monthly,billingSetup:setup});
    }catch(e){ setMsg(e.message); }
    setBusy("");
  };
  const refresh=async()=>{
    if(!client.stripeCustomerId){ return; }
    setBusy("sync"); setMsg("");
    try{
      const d=await callBilling("sync",{customerId:client.stripeCustomerId});
      if(d.customerMissing){
        // Stored customer no longer exists in this Stripe mode — reset cleanly.
        onUpdate&&onUpdate({...client,billingStatus:"none",stripeCustomerId:null,stripeSubscriptionId:null,billingCheckoutUrl:null,billingNextCharge:null});
      }else{
        onUpdate&&onUpdate({...client,billingStatus:d.billingStatus,stripeSubscriptionId:d.subscriptionId||client.stripeSubscriptionId,lastPaymentAt:d.lastPaymentAt||client.lastPaymentAt,billingNextCharge:d.currentPeriodEnd||null,...(d.billingStatus==="active"?{billingCheckoutUrl:null}:{})});
      }
    }catch(e){ setMsg(e.message); }
    setBusy("");
  };
  const openPortal=async()=>{
    setBusy("portal"); setMsg("");
    try{
      const d=await callBilling("portal",{customerId:client.stripeCustomerId,origin:window.location.origin});
      window.open(d.url,"_blank","noopener");
    }catch(e){ setMsg(e.message); }
    setBusy("");
  };
  const copyLink=()=>{ if(link){ navigator.clipboard.writeText(link); setCopied(true); setTimeout(()=>setCopied(false),2000);} };

  const money=(n)=>"$"+Number(n||0).toLocaleString();
  const badge = status==="active"?{t:"Billing Active",c:C.green}:status==="past_due"?{t:"Payment Failed",c:C.red}:status==="awaiting_payment"?{t:"Awaiting Payment",c:C.amber}:status==="canceled"?{t:"Canceled",c:C.textMuted}:{t:"Not Set Up",c:C.textMuted};
  const btn=(bg,extra)=>({width:"100%",padding:"10px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:bg,color:"#fff",cursor:busy?"default":"pointer",opacity:busy?.7:1,...extra});

  return (
    <Card style={{borderColor:status==="active"?"rgba(34,211,160,.28)":status==="past_due"?"rgba(248,113,113,.3)":C.border,backgroundColor:status==="active"?"rgba(34,211,160,.05)":status==="past_due"?"rgba(248,113,113,.05)":"rgba(200,168,75,.04)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:12,fontWeight:800,color:C.text,letterSpacing:".02em"}}>Billing</span>
        <Chip label={badge.t} color={badge.c} small/>
      </div>
      <div style={{fontSize:11,color:C.textDim,lineHeight:1.6,marginBottom:10}}>
        {money(monthly)}<span style={{color:C.textMuted}}>/mo management fee</span>{setup>0?<span> · {money(setup)} one-time setup</span>:<span style={{color:C.green,fontWeight:700}}> · setup fee waived</span>}
        {discounted&&<span style={{marginLeft:6,fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",color:C.gold,border:`1px solid ${C.gold}44`,borderRadius:20,padding:"1px 7px"}}>Adjusted</span>}
        <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>Management fee only — the client pays Google/Meta directly for ad spend.</div>
      </div>

      {status==="none"&&!adjusting&&<>
        <div style={{fontSize:11,color:C.textMuted,lineHeight:1.6,marginBottom:10}}>Create a secure payment link. The client enters a card or bank account once, then the fee auto-charges every month.{setup>0?" The one-time setup fee is added to the first charge automatically.":" Setup fee is waived — first charge is the monthly fee only."}</div>
        <button onClick={setupBilling} disabled={!!busy} style={btn(C.gold,{color:"#0a0800"})}>{busy==="setup"?"Creating…":"Set Up Recurring Billing →"}</button>
        <button onClick={()=>{setAdjMonthly(String(monthly));setAdjSetup(String(setup));setAdjusting(true);}} style={{...btn("transparent"),marginTop:8,border:`1px solid ${C.border}`,color:C.textMuted}}>Adjust Fees (discount / waive setup)</button>
      </>}
      {status==="none"&&adjusting&&<>
        <div style={{fontSize:11,color:C.textMuted,lineHeight:1.6,marginBottom:8}}>Set this client&rsquo;s agreed fees. They flow into the contract, the checkout, and revenue views. Standard: {money(stdMonthly)}/mo + {money(stdSetup)} setup.</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:3}}>Monthly Fee ($)</div>
            <input value={adjMonthly} onChange={e=>setAdjMonthly(e.target.value.replace(/[^0-9.]/g,""))} inputMode="decimal" style={{width:"100%",padding:"8px 10px",fontSize:13,fontWeight:700,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.text}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:3}}>Setup Fee ($ · 0 = waived)</div>
            <input value={adjSetup} onChange={e=>setAdjSetup(e.target.value.replace(/[^0-9.]/g,""))} inputMode="decimal" style={{width:"100%",padding:"8px 10px",fontSize:13,fontWeight:700,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.text}}/>
          </div>
        </div>
        <button onClick={()=>setAdjSetup("0")} style={{width:"100%",padding:"7px",fontSize:11,fontWeight:700,borderRadius:8,border:`1px solid ${C.green}44`,backgroundColor:`${C.green}10`,color:C.green,cursor:"pointer",marginBottom:8}}>Waive Setup Fee (set to $0)</button>
        <div style={S.row7}>
          <button onClick={resetAdjust} style={{flex:1,padding:"9px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Reset to Standard</button>
          <button onClick={()=>setAdjusting(false)} style={{flex:1,padding:"9px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
          <button onClick={applyAdjust} style={{flex:1,padding:"9px",fontSize:11,fontWeight:700,borderRadius:9,border:"none",backgroundColor:C.gold,color:"#0a0800",cursor:"pointer"}}>Apply</button>
        </div>
      </>}

      {status==="awaiting_payment"&&<>
        <div style={{fontSize:11,color:C.amber,lineHeight:1.6,marginBottom:8}}>Payment link ready. Send it to the client (or open it together on the call). Billing activates the moment they pay.</div>
        {link&&<div style={{fontSize:10,color:C.textDim,wordBreak:"break-all",background:"rgba(0,0,0,.25)",border:`1px solid ${C.border}`,borderRadius:7,padding:"7px 9px",marginBottom:8}}>{link}</div>}
        <div style={S.row7}>
          <button onClick={copyLink} style={{flex:1,padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:copied?C.green:C.textDim,cursor:"pointer"}}>{copied?"Copied!":"Copy Link"}</button>
          <button onClick={()=>window.open(link,"_blank","noopener")} style={{flex:1,padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:"#1D4ED8",color:"#fff",cursor:"pointer"}}>Open</button>
        </div>
        <button onClick={refresh} disabled={!!busy} style={{...btn("transparent"),marginTop:8,border:`1px solid ${C.border}`,color:C.textMuted}}>{busy==="sync"?"Checking…":"Refresh Status"}</button>
      </>}

      {status==="active"&&<>
        <div style={{fontSize:11,color:C.green,lineHeight:1.6,marginBottom:8}}>Auto-charging {money(client.billingMonthly||monthly)}/mo.{client.lastPaymentAt?" Last paid "+new Date(client.lastPaymentAt).toLocaleDateString()+".":""}{client.billingNextCharge?" Next charge "+new Date(client.billingNextCharge).toLocaleDateString()+".":""}</div>
        <div style={S.row7}>
          <button onClick={openPortal} disabled={!!busy} style={{flex:2,padding:"10px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:C.gold,color:"#0a0800",cursor:"pointer",opacity:busy?.7:1}}>{busy==="portal"?"Opening…":"Manage in Stripe"}</button>
          <button onClick={refresh} disabled={!!busy} style={{flex:1,padding:"10px",fontSize:12,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textDim,cursor:"pointer"}}>{busy==="sync"?"…":"Refresh"}</button>
        </div>
      </>}

      {status==="past_due"&&<>
        <div style={{fontSize:11,color:C.red,lineHeight:1.6,marginBottom:8}}>The last payment failed. Stripe automatically retries, or update the card/bank in the billing portal.</div>
        <div style={S.row7}>
          <button onClick={openPortal} disabled={!!busy} style={{flex:2,padding:"10px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:C.red,color:"#fff",cursor:"pointer",opacity:busy?.7:1}}>{busy==="portal"?"Opening…":"Fix Payment Method"}</button>
          <button onClick={refresh} disabled={!!busy} style={{flex:1,padding:"10px",fontSize:12,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textDim,cursor:"pointer"}}>{busy==="sync"?"…":"Refresh"}</button>
        </div>
      </>}

      {status==="canceled"&&<>
        <div style={{fontSize:11,color:C.textMuted,lineHeight:1.6,marginBottom:10}}>This subscription was canceled. Set up a new one to resume billing.</div>
        <button onClick={setupBilling} disabled={!!busy} style={btn(C.gold,{color:"#0a0800"})}>{busy==="setup"?"Creating…":"Set Up Billing Again →"}</button>
      </>}

      {msg&&<div style={{fontSize:11,color:C.red,marginTop:8,lineHeight:1.6}}>{msg}</div>}
    </Card>
  );
}
// ─── CONTRACT TAB ─────────────────────────────────────────────────────────────
function ContractTabContent({client,pkg,days,onRenew,onUpdate}) {
  const [copied,setCopied]=useState(false);
  const [showRenewal,setShowRenewal]=useState(false);
  const [renewMonths,setRenewMonths]=useState("3");
  const [renewSaved,setRenewSaved]=useState(false);
  const [renewBusy,setRenewBusy]=useState(false);
  const [renewNote,setRenewNote]=useState("");
  const [showETF,setShowETF]=useState(false);
  const [etfBusy,setEtfBusy]=useState(false);
  const [etfMsg,setEtfMsg]=useState("");
  const [dsState,setDsState]=useState("idle");   // idle | sending | sent | error
  const [dsMsg,setDsMsg]=useState("");
  const html=makeContractHTML(client,pkg);
  const sendDocuSign=async()=>{
    if(!client.email){ setDsState("error"); setDsMsg("Add the client's email on the Overview tab first."); return; }
    setDsState("sending"); setDsMsg("");
    try{
      const { data:{ session } }=await supabaseClient.auth.getSession();
      const token=session&&session.access_token;
      if(!token){ setDsState("error"); setDsMsg("Session expired — refresh the page and log in again."); return; }
      const r=await fetch("/.netlify/functions/docusign-send",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({recipientEmail:client.email,recipientName:client.contactName||client.name,documentHtml:html})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok||!d.ok){ setDsState("error"); setDsMsg(d.error||"Send failed — try again."); return; }
      setDsState("sent");
      onUpdate&&onUpdate({...client,contractStatus:"pending",docusignEnvelopeId:d.envelopeId,docusignSentAt:new Date().toISOString()});
    }catch(e){ setDsState("error"); setDsMsg("Network error — try again."); }
  };
  const downloadPDF=()=>{
    const blob=new Blob([html],{type:"text/html"});const url=URL.createObjectURL(blob);
    const ifr=document.createElement("iframe");ifr.style.cssText="position:fixed;width:0;height:0;border:none;left:-9999px;top:-9999px";
    document.body.appendChild(ifr);ifr.src=url;
    ifr.onload=()=>{ setTimeout(()=>{ ifr.contentWindow.print(); setTimeout(()=>{ document.body.removeChild(ifr);URL.revokeObjectURL(url); },3000); },600); };
  };
  // The standard (3-month) monthly rate this client's term pricing is anchored to.
  const baseMonthly=(pkg&&pkg.price)||client.billingMonthly||0;
  // ── Early termination (Agreement: 30-day notice; ETF = 1 month's fee + term-discount clawback)
  const effMonthly=client.billingMonthly||baseMonthly;
  const etfCalc=(()=>{
    const start=new Date(client.contractStart||new Date());
    const now=new Date();
    // Billing cycles already started this term (billed monthly in advance) — min 1, capped at the committed term.
    const monthsElapsed=Math.max(0,(now.getFullYear()-start.getFullYear())*12+(now.getMonth()-start.getMonth())+(now.getDate()>=start.getDate()?0:-1));
    const monthsBilled=Math.min(Math.max(monthsElapsed+1,1),client.contractTermMonths||3);
    const clawPerMonth=Math.max(0,baseMonthly-effMonthly);
    const clawback=clawPerMonth*monthsBilled;
    const etfFee=effMonthly;
    return {monthsBilled,clawPerMonth,clawback,etfFee,total:etfFee+clawback};
  })();
  const recordETF=async(billViaStripe)=>{
    setEtfBusy(true); setEtfMsg("");
    const noticeEnd=addMonths(new Date(),1);
    const endsSooner=!client.contractEnd||noticeEnd<new Date(client.contractEnd);
    let etf={date:fmt(new Date()),etfFee:etfCalc.etfFee,clawback:etfCalc.clawback,monthsBilled:etfCalc.monthsBilled,total:etfCalc.total,billed:false,settled:false};
    try{
      if(billViaStripe){
        const d=await stripeBilling("charge-etf",{customerId:client.stripeCustomerId,subscriptionId:client.stripeSubscriptionId,etfFee:etfCalc.etfFee,clawback:etfCalc.clawback,clientName:client.name});
        etf={...etf,billed:true,invoiceId:d.invoiceId,invoiceUrl:d.invoiceUrl,settled:d.paid||false};
        setEtfMsg(d.paid?"ETF invoice charged and PAID. Subscription set to cancel at period end.":"ETF invoice created and sent for automatic collection. Subscription set to cancel at period end.");
      }else{
        setEtfMsg("Early termination recorded. Bill the ETF manually (or via Stripe later) — it stays flagged in alerts until marked settled.");
      }
      onUpdate&&onUpdate({...client,etf,contractStatus:"active",...(endsSooner?{contractEnd:fmt(noticeEnd)}:{})});
      setShowETF(false);
    }catch(e){ setEtfMsg("Recording kept locally, but Stripe billing failed: "+e.message); onUpdate&&onUpdate({...client,etf}); }
    setEtfBusy(false);
  };
  const handleRenew=async()=>{
    const months=parseInt(renewMonths)||3;
    const base=new Date(client.contractEnd||new Date());
    const newEnd=addMonths(base,months);  // proper calendar months, not *30 days
    const monthly=termMonthly(baseMonthly,months);
    setRenewNote("");
    // v2 — if a live subscription is active, push the new rate to Stripe so the
    // renewal actually changes what auto-charges (no manual Stripe edit needed).
    let note="";
    if(client.stripeSubscriptionId && client.billingStatus==="active" && monthly!==(client.billingMonthly||baseMonthly)){
      setRenewBusy(true);
      try{
        await stripeBilling("update-subscription",{customerId:client.stripeCustomerId,subscriptionId:client.stripeSubscriptionId,monthlyAmount:monthly,packageName:pkg&&pkg.name});
        note=`Stripe subscription updated — now auto-charging $${monthly.toLocaleString()}/mo.`;
      }catch(e){
        note=`Contract renewed, but the Stripe update failed (${e.message}). Update the amount manually in Stripe.`;
      }
      setRenewBusy(false);
    }
    onRenew(fmt(newEnd),{contractTermMonths:months,billingMonthly:monthly});
    setRenewNote(note);
    setRenewSaved(true);
    setTimeout(()=>{ setShowRenewal(false);setRenewSaved(false);setRenewNote(""); },note?4000:1500);
  };
  // Live preview of the new end date using calendar months
  const renewalPreviewDate = ()=>{
    const months=parseInt(renewMonths)||3;
    const base=new Date(client.contractEnd||new Date());
    return fmt(addMonths(base,months));
  };
  const showRenewBtn = days<=30;
  return (
    <div style={S.col11}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Card style={{textAlign:"center"}}><Label>Status</Label><Chip label={client.contractStatus==="active"?"Signed & Active":client.contractStatus==="pending"?"Pending Signature":"Expired"} color={client.contractStatus==="active"?C.green:client.contractStatus==="pending"?C.amber:C.red}/></Card>
        <Card style={{textAlign:"center"}}><Label>Days Remaining</Label><div style={{fontSize:22,fontWeight:800,color:days<=7?C.red:days<=30?C.amber:C.green,lineHeight:1}}>{Math.max(0,days)}</div></Card>
      </div>
      {/* Renewal button — appears when ≤30 days left or expired */}
      {showRenewBtn&&!showRenewal&&(
        <button onClick={()=>setShowRenewal(true)} style={{width:"100%",padding:"12px",fontSize:13,fontWeight:700,borderRadius:10,border:`1px solid ${C.green}44`,backgroundColor:`${C.green}12`,color:C.green,cursor:"pointer"}}>
          ✓ Renew This Contract
        </button>
      )}
      {showRenewal&&(
        <Card style={{backgroundColor:"rgba(16,185,129,.06)",borderColor:"rgba(16,185,129,.25)"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.green,marginBottom:10}}>Renew Contract for {client.name}</div>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:5}}>Renewal Length &amp; Rate</div>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {["1","3","6","12"].map(m=>{
              const sel=renewMonths===m;
              const mo=termMonthly(baseMonthly,parseInt(m));
              return (
                <button key={m} onClick={()=>setRenewMonths(m)} style={{flex:1,padding:"8px 4px",borderRadius:9,border:`1px solid ${sel?C.green:C.border}`,backgroundColor:sel?`${C.green}15`:"rgba(255,255,255,.03)",cursor:"pointer",minWidth:56,textAlign:"center"}}>
                  <div style={{fontSize:12,fontWeight:700,color:sel?C.green:C.textDim}}>{m==="12"?"1 yr":m+" mo"}</div>
                  <div style={{fontSize:11,fontWeight:700,color:sel?C.green:C.textMuted,marginTop:2}}>${mo.toLocaleString()}</div>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:".03em",color:parseInt(m)===1?C.amber:parseInt(m)>3?C.green:C.textMuted,marginTop:1}}>{termRateLabel(parseInt(m))}</div>
                </button>
              );
            })}
          </div>
          <div style={{fontSize:11,color:C.textDim,marginBottom:12,lineHeight:1.65}}>
            {(()=>{
              const m=parseInt(renewMonths)||3;
              const mo=termMonthly(baseMonthly,m);
              const m2m=termMonthly(baseMonthly,1);
              const saved=(m2m-mo)*m;
              return <>
                <div>Renewing for <strong style={{color:C.text}}>{monthsLabel(m)}</strong> at <strong style={{color:C.green}}>${mo.toLocaleString()}/mo</strong> ({termRateLabel(m)})</div>
                {m===1&&termRate(1)>0&&<div style={{marginTop:3,fontSize:10,color:C.amber}}>Month-to-month includes a flexibility premium over the standard rate.</div>}
                {saved>0&&<div style={{marginTop:3,fontSize:10,color:C.green}}>Saves ${saved.toLocaleString()} over the term vs. month-to-month.</div>}
                <div style={{marginTop:3}}>New end date: <strong style={{color:C.green}}>{renewalPreviewDate()}</strong></div>
                {client.billingStatus==="active"&&mo!==(client.billingMonthly||baseMonthly)&&<div style={{marginTop:3,fontSize:10,color:C.textMuted}}>Their live Stripe subscription will update to this rate automatically.</div>}
              </>;
            })()}
          </div>
          <div style={S.row7}>
            <button onClick={()=>setShowRenewal(false)} disabled={renewBusy} style={{flex:1,padding:"9px",fontSize:12,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:renewBusy?"default":"pointer"}}>Cancel</button>
            <button onClick={handleRenew} disabled={renewBusy||renewSaved} style={{flex:2,padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:renewSaved?"#059669":C.green,color:"#fff",cursor:renewBusy?"default":"pointer",opacity:renewBusy?.7:1,transition:"background .2s"}}>
              {renewBusy?"Updating…":renewSaved?"✓ Contract Renewed":"Confirm Renewal"}
            </button>
          </div>
          {renewNote&&<div style={{fontSize:10,color:renewNote.startsWith("Contract renewed, but")?C.amber:C.green,marginTop:8,lineHeight:1.55}}>{renewNote}</div>}
        </Card>
      )}
      {/* Early termination — auto-calculates the Agreement's ETF (1 month fee + term-discount clawback) */}
      {client.contractSigned&&client.contractStatus==="active"&&!client.etf&&!showETF&&(
        <button onClick={()=>setShowETF(true)} style={{width:"100%",padding:"9px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.red}33`,backgroundColor:"transparent",color:C.textMuted,cursor:"pointer"}}>
          Client leaving early? Calculate Early Termination →
        </button>
      )}
      {showETF&&(
        <Card style={{backgroundColor:"rgba(239,68,68,.05)",borderColor:"rgba(239,68,68,.25)"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:8}}>Early Termination — {client.name}</div>
          <div style={{fontSize:11,color:C.textDim,lineHeight:1.7,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span>Early-termination fee (1 month&rsquo;s fee)</span><strong style={{color:C.text}}>${etfCalc.etfFee.toLocaleString()}</strong></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span>Term-discount clawback ({etfCalc.clawPerMonth>0?`$${etfCalc.clawPerMonth.toLocaleString()}/mo × ${etfCalc.monthsBilled} month${etfCalc.monthsBilled!==1?"s":""} billed`:"no discounted rate — none"})</span><strong style={{color:C.text}}>${etfCalc.clawback.toLocaleString()}</strong></div>
            <div style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${C.border}`,marginTop:5,paddingTop:5}}><span style={{fontWeight:700,color:C.text}}>Total owed (per Agreement)</span><strong style={{color:C.red,fontSize:14}}>${etfCalc.total.toLocaleString()}</strong></div>
            <div style={{fontSize:10,color:C.textMuted,marginTop:6}}>Recording sets the contract end to 30 days out (the notice period) if that is sooner than the current end date. Fees already accrued still bill normally.</div>
          </div>
          <div style={S.row7}>
            <button onClick={()=>setShowETF(false)} disabled={etfBusy} style={{flex:1,padding:"9px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
            <button onClick={()=>recordETF(false)} disabled={etfBusy} style={{flex:1,padding:"9px",fontSize:11,fontWeight:700,borderRadius:9,border:`1px solid ${C.red}44`,backgroundColor:`${C.red}12`,color:C.red,cursor:"pointer"}}>Record Only</button>
            {client.billingStatus==="active"&&<button onClick={()=>recordETF(true)} disabled={etfBusy} style={{flex:2,padding:"9px",fontSize:11,fontWeight:700,borderRadius:9,border:"none",backgroundColor:C.red,color:"#fff",cursor:"pointer",opacity:etfBusy?.7:1}}>{etfBusy?"Billing…":"Bill via Stripe + End Subscription"}</button>}
          </div>
          {etfMsg&&<div style={{fontSize:10,color:etfMsg.includes("failed")?C.amber:C.green,marginTop:8,lineHeight:1.55}}>{etfMsg}</div>}
        </Card>
      )}
      {client.etf&&(
        <Card style={{backgroundColor:client.etf.settled?"rgba(34,211,160,.05)":"rgba(239,68,68,.05)",borderColor:client.etf.settled?"rgba(34,211,160,.25)":"rgba(239,68,68,.25)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:client.etf.settled?C.green:C.red}}>Early Termination — ${Number(client.etf.total).toLocaleString()} {client.etf.settled?"settled":client.etf.billed?"billed, awaiting payment":"owed (not yet billed)"}</div>
              <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>Recorded {client.etf.date} · ${Number(client.etf.etfFee).toLocaleString()} ETF + ${Number(client.etf.clawback).toLocaleString()} clawback ({client.etf.monthsBilled} mo)</div>
            </div>
            {!client.etf.settled&&<button onClick={()=>onUpdate&&onUpdate({...client,etf:{...client.etf,settled:true}})} style={{padding:"7px 10px",fontSize:10,fontWeight:700,borderRadius:8,border:`1px solid ${C.green}44`,backgroundColor:`${C.green}10`,color:C.green,cursor:"pointer",whiteSpace:"nowrap"}}>Mark Settled</button>}
          </div>
        </Card>
      )}
      {!client.contractSigned&&<Card style={{backgroundColor:"rgba(59,130,246,.06)",borderColor:"rgba(59,130,246,.28)"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#60A5FA",marginBottom:4}}>Contract Not Yet Signed</div>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:10,lineHeight:1.6}}>Send to <strong style={{color:C.textDim}}>{client.email}</strong> via DocuSign for e-signature.</div>
        <button onClick={sendDocuSign} disabled={dsState==="sending"||dsState==="sent"} style={{width:"100%",padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:dsState==="sent"?"#059669":"#1D4ED8",color:"#fff",cursor:dsState==="sending"||dsState==="sent"?"default":"pointer",opacity:dsState==="sending"?.7:1}}>{dsState==="sending"?"Sending…":dsState==="sent"?"✓ Sent for Signature":"Send via DocuSign →"}</button>
        {dsState==="sent"&&<div style={{fontSize:11,color:"#34D399",marginTop:8,lineHeight:1.6}}>Envelope sent to {client.email}. They'll receive an email to sign; status now shows Pending Signature.</div>}
        {dsState==="error"&&<div style={{fontSize:11,color:C.red,marginTop:8,lineHeight:1.6}}>{dsMsg||"Something went wrong."}</div>}
      </Card>}
      <div style={S.row7}>
        <button onClick={downloadPDF} style={{flex:2,padding:"10px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:C.gold,color:"#0a0800",cursor:"pointer"}}>↓ Download PDF</button>
        <button onClick={()=>{navigator.clipboard.writeText(`${window.location.origin}/portal?token=${client.portalToken}`);setCopied(true);setTimeout(()=>setCopied(false),2000);}} title="Copies the client's portal link — they can read this contract on their Contract tab. (The DocuSign signing link is emailed to them directly by DocuSign.)" style={{flex:1,padding:"10px",fontSize:12,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:copied?"#34D399":C.textDim,cursor:"pointer"}}>{copied?"Link Copied!":"Copy Client Link"}</button>
      </div>
      <BillingCard client={client} pkg={pkg} onUpdate={onUpdate}/>
      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"9px 13px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:C.textDim}}>Contract Preview</span>
          <span style={{fontSize:10,color:C.textMuted}}>Scroll to read</span>
        </div>
        <div style={{width:"100%",overflow:"hidden",position:"relative"}}>
          <iframe
            srcDoc={html}
            title="Contract"
            style={{
              width:"100%",
              height:480,
              border:"none",
              display:"block",
              backgroundColor:"#fff",
              maxWidth:"100%",
            }}
            sandbox="allow-same-origin allow-scripts"
          />
        </div>
      </Card>
    </div>
  );
}

// ─── REPORTS TAB ──────────────────────────────────────────────────────────────
function ReportsTabContent({client,pkg}) {
  const {messages,loading,send,reset}=useAI("");
  const [gen,setGen]=useState(false);
  const [input,setInput]=useState("");
  const endRef=useRef(null);
  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}); },[messages]);

  const perLead = PER_LEAD[client.niche];
  const health  = calcHealth(client);
  const onTarget= client.cpl>0 && client.cpl<=(perLead||75);
  const daysLeft= daysUntil(client.contractEnd);
  const botsComplete = Object.values(client.botStatuses||{}).filter(s=>s==="done").length;
  const botsTotal    = Object.values(client.botStatuses||{}).length;

  const SYS=`You are generating a client performance report for Bryson Weiser at BoldLine Media. Write in professional plain English Bryson can read aloud on a client call. Never mention AI or bots.

CLIENT DATA:
Business: ${client.name}
Niche: ${client.niche}
Package: ${(pkg && pkg.name)} on ${(pkg && pkg.platform)}
Campaign Stage: ${client.stage}
Health Score: ${health.toFixed(1)}/10
Leads Generated: ${client.leads}
Average CPL: ${client.cpl>0?"$"+client.cpl:"Not yet tracked"}
Target CPL: ${perLead?"$"+perLead+" (per-lead rate)":"—"}
CPL Status: ${client.leads>0?(onTarget?"On target":"Above target — needs optimization"):"No leads yet"}
Ad Budget: ${client.adBudget||"Not set"}
Contract: ${client.contractStart} → ${client.contractEnd} (${daysLeft>0?daysLeft+"d remaining":"expired"})
Intake Complete: ${client.intakeComplete?"Yes":"No"}
Pipeline Progress: ${botsComplete}/${botsTotal} steps complete
Internal Notes: ${client.notes||"None"}

REPORT STRUCTURE:
1. Campaign Summary (2-3 sentences on current status)
2. Performance This Period (leads, CPL vs target, what's working)
3. What We Did (key actions taken this period)
4. What's Next (next 30 days plan)
5. One recommendation for the client

Keep it concise. Bryson will read this on a call — it should sound natural, not like a dashboard export.`;

  const generateReport = () => {
    reset();
    setGen(true);
    send(`Generate the ${(pkg && pkg.optimizationFreq)==="weekly"?"weekly":"monthly"} performance report for ${client.name}. Use all the client data provided. Make it sound like a confident account manager giving an update.`, SYS);
  };

  return (
    <div style={S.col11}>
      {/* Live data snapshot */}
      <Card style={{backgroundColor:`${C.gold}08`,borderColor:`${C.gold}22`}}>
        <Label>Data Used in This Report</Label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {[
            {l:"Leads",     v:client.leads||0,           color:C.text},
            {l:"CPL",       v:client.cpl?`$${client.cpl}`:"—", color:onTarget?C.green:client.cpl>0?C.amber:C.textMuted},
            {l:"Health",    v:`${health.toFixed(1)}/10`,  color:healthColor(health)},
            {l:"Stage",     v:stageInfo(client.stage).label, color:stageInfo(client.stage).color},
            {l:"Pipeline",  v:`${botsComplete}/${botsTotal}`, color:C.textDim},
            {l:"Days Left", v:daysLeft>0?`${daysLeft}d`:"Expired", color:daysLeft<=7?C.red:daysLeft<=30?C.amber:C.textDim},
          ].map(({l,v,color})=>(
            <div key={l} style={{padding:"6px 8px",borderRadius:7,backgroundColor:"rgba(255,255,255,0.03)",border:`1px solid ${C.border2}`}}>
              <div style={{fontSize:8,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.textMuted,marginBottom:2}}>{l}</div>
              <div style={{fontSize:12,fontWeight:700,color}}>{v}</div>
            </div>
          ))}
        </div>
        {client.notes&&<div style={{marginTop:8,fontSize:10,color:C.textMuted,lineHeight:1.5,fontStyle:"italic"}}>Notes: {client.notes.slice(0,100)}{client.notes.length>100?"…":""}</div>}
      </Card>
      {/* Generate button */}
      <div style={S.row8}>
        <button onClick={generateReport} disabled={loading} style={{flex:1,padding:"11px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:loading?"rgba(255,255,255,.05)":"#1D4ED8",color:loading?C.textMuted:"#fff",cursor:loading?"not-allowed":"pointer"}}>
          {loading?"Generating…":gen?((pkg && pkg.optimizationFreq)==="weekly"?"Regenerate Weekly":"Regenerate Monthly"):((pkg && pkg.optimizationFreq)==="weekly"?"Generate Weekly Report":"Generate Monthly Report")}
        </button>
        {gen&&!loading&&<button onClick={()=>navigator.clipboard.writeText(messages.filter(m=>m.role==="assistant").map(m=>m.content).join("\n\n"))} style={{padding:"11px 14px",fontSize:12,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textDim,cursor:"pointer"}}>Copy</button>}
      </div>
      {/* Report output */}
      <Card style={{minHeight:100}}>
        {messages.length===0&&(
          <div style={{color:C.textMuted,fontSize:12,textAlign:"center",padding:"28px 16px",lineHeight:1.7}}>
            Tap Generate to create a client-ready {(pkg && pkg.optimizationFreq)==="weekly"?"weekly":"monthly"} report for {client.name}.<br/>
            <span style={{fontSize:10,opacity:.7}}>Uses live lead count, CPL, health score, stage, and pipeline progress.</span>
          </div>
        )}
        {messages.map((m,i)=><Bubble key={i} msg={m}/>)}
        {loading&&<Typing/>}
        <div ref={endRef}/>
      </Card>
      {/* Ask */}
      <Card>
        <Label>Ask About {client.name}</Label>
        <ChatBar value={input} onChange={setInput} onSend={()=>{if(input.trim()){send(input.trim(),SYS);setInput("");}}} disabled={loading} placeholder={`Ask about ${client.name}'s performance, next steps, or talking points…`}/>
      </Card>
    </div>
  );
}

// ─── LOG TAB ─────────────────────────────────────────────────────────────────
function LogTabContent({client,onUpdate}) {
  const CATS = [
    {id:"call",    label:"Call",     color:"#22D3A0", icon:"📞"},
    {id:"email",   label:"Email",    color:"#4F8EF7", icon:"✉"},
    {id:"meeting", label:"Meeting",  color:"#8B5CF6", icon:"🤝"},
    {id:"update",  label:"Update",   color:"#C8A84B", icon:"📝"},
    {id:"note",    label:"Note",     color:"#6B7280", icon:"💬"},
  ];
  const [note,setNote]       = useState("");
  const [cat,setCat]         = useState("call");
  const [saved,setSaved]     = useState(false);
  const [filterCat,setFilter]= useState("all");
  const [delIdx,setDelIdx]   = useState(null);

  const add = () => {
    if (!note.trim()) return;
    const entry = {date:fmt(new Date()), note:note.trim(), cat, ts:Date.now()};
    onUpdate({...client, commLog:[entry,...(client.commLog||[])]});
    setNote(""); setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const deleteEntry = (idx) => {
    const updated = (client.commLog||[]).filter((_,i)=>i!==idx);
    onUpdate({...client, commLog:updated});
    setDelIdx(null);
  };

  const log = client.commLog||[];
  const filtered = filterCat==="all" ? log : log.filter(e=>e.cat===filterCat);
  const catInfo = (id) => CATS.find(c=>c.id===id)||CATS[4];

  return (
    <div style={S.col11}>
      {/* Add entry card */}
      <Card>
        <Label>Log an Entry</Label>
        {/* Category selector */}
        <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
          {CATS.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)} style={{
              display:"flex",alignItems:"center",gap:5,
              padding:"5px 10px",fontSize:11,fontWeight:700,borderRadius:20,
              border:`1px solid ${cat===c.id?c.color+"66":C.border}`,
              backgroundColor:cat===c.id?c.color+"15":"rgba(255,255,255,0.02)",
              color:cat===c.id?c.color:C.textMuted,cursor:"pointer"
            }}>
              <span style={{fontSize:12}}>{c.icon}</span>{c.label}
            </button>
          ))}
        </div>
        <textarea
          value={note}
          onChange={e=>setNote(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&e.metaKey) add(); }}
          rows={3}
          placeholder={
            cat==="call"    ?"What was discussed, any action items, client sentiment…":
            cat==="email"   ?"Summary of email sent or received…":
            cat==="meeting" ?"Meeting notes, decisions made, follow-ups…":
            cat==="update"  ?"Campaign update, milestone reached, change made…":
                             "General note about this client…"
          }
          style={{...inp,resize:"none",lineHeight:1.6,marginBottom:8}}
        />
        <button onClick={add} disabled={!note.trim()} style={{
          width:"100%",padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",
          backgroundColor:saved?"rgba(34,211,160,0.15)":note.trim()?"#1D4ED8":"rgba(255,255,255,0.04)",
          color:saved?C.green:note.trim()?"#fff":C.textMuted,
          cursor:note.trim()?"pointer":"not-allowed",transition:"all .2s",
          border:saved?`1px solid ${C.green}33`:"none"
        }}>
          {saved?`✓ ${catInfo(cat).label} logged`:`Log ${catInfo(cat).label}`}
        </button>
        <div style={{marginTop:6,fontSize:9,color:C.textMuted,textAlign:"right"}}>⌘ + Enter to save quickly</div>
      </Card>

      {/* History */}
      <Card>
        {/* Header with filter */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <Label>History ({log.length})</Label>
          {log.length>0&&(
            <div style={{display:"flex",gap:4,overflowX:"auto"}}>
              <button onClick={()=>setFilter("all")} style={{padding:"2px 8px",fontSize:9,fontWeight:700,borderRadius:20,border:`1px solid ${filterCat==="all"?C.gold:C.border}`,backgroundColor:filterCat==="all"?C.goldDim:"transparent",color:filterCat==="all"?C.gold:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>All</button>
              {CATS.filter(c=>log.some(e=>e.cat===c.id)).map(c=>(
                <button key={c.id} onClick={()=>setFilter(filterCat===c.id?"all":c.id)} style={{padding:"2px 8px",fontSize:9,fontWeight:700,borderRadius:20,border:`1px solid ${filterCat===c.id?c.color+"66":C.border}`,backgroundColor:filterCat===c.id?c.color+"15":"transparent",color:filterCat===c.id?c.color:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>{c.icon} {c.label}</button>
              ))}
            </div>
          )}
        </div>

        {/* Empty state */}
        {log.length===0&&(
          <div style={{textAlign:"center",padding:"24px 0",color:C.textMuted}}>
            <div style={{fontSize:24,marginBottom:8}}>📋</div>
            <div style={{fontSize:12,color:C.textDim,marginBottom:4}}>No entries yet</div>
            <div style={{fontSize:11,lineHeight:1.6}}>Log calls, emails, and meetings above to keep a complete history of every interaction with {client.name}.</div>
          </div>
        )}

        {/* Filtered empty */}
        {log.length>0&&filtered.length===0&&(
          <div style={{textAlign:"center",padding:"16px 0",color:C.textMuted,fontSize:12}}>
            No {catInfo(filterCat).label.toLowerCase()} entries yet.
            <button onClick={()=>setFilter("all")} style={{background:"none",border:"none",color:C.gold,cursor:"pointer",fontSize:12,fontWeight:700,marginLeft:5}}>Show all</button>
          </div>
        )}

        {/* Entries */}
        {filtered.map((e,i)=>{
          const ci = catInfo(e.cat);
          const isDeleting = delIdx===i;
          return (
            <div key={e.ts||i} style={{
              padding:"10px 0",
              borderBottom:i<filtered.length-1?`1px solid ${C.border2}`:"none",
            }}>
              {/* Entry header */}
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                <span style={{
                  width:22,height:22,borderRadius:6,flexShrink:0,
                  backgroundColor:ci.color+"15",border:`1px solid ${ci.color+"33"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:11
                }}>{ci.icon}</span>
                <span style={{fontSize:10,fontWeight:700,color:ci.color}}>{ci.label}</span>
                <span style={{fontSize:10,color:C.textMuted,marginLeft:"auto"}}>{e.date}</span>
                {!isDeleting&&(
                  <button onClick={()=>setDelIdx(i)} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:13,lineHeight:1,padding:"0 2px",opacity:.5}}>×</button>
                )}
              </div>
              {/* Note text */}
              <div style={{fontSize:12,color:C.textDim,lineHeight:1.65,paddingLeft:29}}>
                {e.note}
              </div>
              {/* Delete confirm */}
              {isDeleting&&(
                <div style={{marginTop:8,paddingLeft:29,display:"flex",alignItems:"center",gap:7}}>
                  <span style={{fontSize:11,color:C.textMuted}}>Delete this entry?</span>
                  <button onClick={()=>deleteEntry(i)} style={{padding:"3px 9px",fontSize:10,fontWeight:700,borderRadius:7,border:"none",backgroundColor:"rgba(248,113,113,0.15)",color:C.red,cursor:"pointer"}}>Delete</button>
                  <button onClick={()=>setDelIdx(null)} style={{padding:"3px 9px",fontSize:10,fontWeight:700,borderRadius:7,border:`1px solid ${C.border}`,backgroundColor:"transparent",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
                </div>
              )}
            </div>
          );
        })}
      </Card>
    </div>
  );
}

function LeadsTabContent({client,onUpdate}) {
  const STATUSES = [
    {id:"new",label:"New",color:C.amber},
    {id:"contacted",label:"Contacted",color:C.blue},
    {id:"won",label:"Won",color:C.green},
    {id:"lost",label:"Lost",color:C.textMuted},
  ];
  const SOURCE_LABELS = {landing_page:"Landing Page",call_tracking:"Inbound Call",unknown:"Unknown"};
  const sourceLabel = (s) => SOURCE_LABELS[s] || String(s||"unknown").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
  const statusInfo = (id) => STATUSES.find(s=>s.id===id) || STATUSES[0];

  const [filterStatus,setFilterStatus] = useState("all");
  const leads = client.leadsLog||[];
  const indexed = leads.map((l,i)=>({lead:l,idx:i}));
  const filtered = filterStatus==="all" ? indexed : indexed.filter(({lead})=>(lead.status||"new")===filterStatus);

  const setLeadStatus = (idx,status) => {
    const updated = leads.map((l,i)=> i===idx ? {...l,status} : l);
    onUpdate({...client, leadsLog:updated});
  };

  return (
    <div style={S.col11}>
      <Card>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <Label>Leads ({leads.length})</Label>
          {leads.length>0&&(
            <div style={{display:"flex",gap:4,overflowX:"auto"}}>
              <button onClick={()=>setFilterStatus("all")} style={{padding:"2px 8px",fontSize:9,fontWeight:700,borderRadius:20,border:`1px solid ${filterStatus==="all"?C.gold:C.border}`,backgroundColor:filterStatus==="all"?C.goldDim:"transparent",color:filterStatus==="all"?C.gold:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>All</button>
              {STATUSES.filter(s=>leads.some(l=>(l.status||"new")===s.id)).map(s=>(
                <button key={s.id} onClick={()=>setFilterStatus(filterStatus===s.id?"all":s.id)} style={{padding:"2px 8px",fontSize:9,fontWeight:700,borderRadius:20,border:`1px solid ${filterStatus===s.id?s.color+"66":C.border}`,backgroundColor:filterStatus===s.id?s.color+"15":"transparent",color:filterStatus===s.id?s.color:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>{s.label}</button>
              ))}
            </div>
          )}
        </div>

        {leads.length===0&&(
          <div style={{textAlign:"center",padding:"24px 0",color:C.textMuted}}>
            <div style={{fontSize:24,marginBottom:8}}>📥</div>
            <div style={{fontSize:12,color:C.textDim,marginBottom:4}}>No leads yet</div>
            <div style={{fontSize:11,lineHeight:1.6}}>Leads from {client.name}'s landing page and tracking number will show up here automatically.</div>
          </div>
        )}

        {leads.length>0&&filtered.length===0&&(
          <div style={{textAlign:"center",padding:"16px 0",color:C.textMuted,fontSize:12}}>
            No {statusInfo(filterStatus).label.toLowerCase()} leads.
            <button onClick={()=>setFilterStatus("all")} style={{background:"none",border:"none",color:C.gold,cursor:"pointer",fontSize:12,fontWeight:700,marginLeft:5}}>Show all</button>
          </div>
        )}

        {filtered.map(({lead,idx},pos)=>{
          const st = statusInfo(lead.status||"new");
          const followCount = (lead.followUps||[]).length;
          return (
            <div key={lead.receivedAt ? `${lead.receivedAt}-${idx}` : idx} style={{padding:"10px 0",borderBottom:pos<filtered.length-1?`1px solid ${C.border2}`:"none"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8,marginBottom:5}}>
                <div style={S.f1min}>
                  <div style={{fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lead.name || (lead.source==="call_tracking" ? "Inbound Call" : "Unknown")}</div>
                  <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{sourceLabel(lead.source)} · {lead.receivedAt ? fmt(lead.receivedAt) : "—"}</div>
                </div>
                <Chip label={st.label} color={st.color} small/>
              </div>
              {(lead.phone||lead.email)&&(
                <div style={{fontSize:11,color:C.textDim,lineHeight:1.6,marginBottom:4}}>
                  {lead.phone}{lead.phone && lead.email ? " · " : ""}{lead.email}
                </div>
              )}
              {lead.message&&<div style={{fontSize:11,color:C.textDim,lineHeight:1.6,marginBottom:6,fontStyle:"italic"}}>"{lead.message}"</div>}
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                {STATUSES.map(s=>(
                  <button key={s.id} onClick={()=>setLeadStatus(idx,s.id)} disabled={(lead.status||"new")===s.id} style={{
                    padding:"3px 9px",fontSize:9,fontWeight:700,borderRadius:7,
                    border:`1px solid ${(lead.status||"new")===s.id?s.color+"66":C.border}`,
                    backgroundColor:(lead.status||"new")===s.id?s.color+"15":"transparent",
                    color:(lead.status||"new")===s.id?s.color:C.textMuted,
                    cursor:(lead.status||"new")===s.id?"default":"pointer"
                  }}>{s.label}</button>
                ))}
                {followCount>0&&<span style={{fontSize:9,color:C.textMuted,marginLeft:"auto"}}>{followCount} follow-up{followCount===1?"":"s"} sent</span>}
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

// ─── ARIA ─────────────────────────────────────────────────────────────────────
function ARIAPanel({clients,onClose,onDelete,onUpdate}) {
  const [ariaTab,setAriaTab]=useState("chat");
  const {messages,loading,send,reset,pendingAction,confirmAction,cancelAction}=useAI("",{enableTools:true});
  const [input,setInput]=useState("");const [repGen,setRepGen]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}); },[messages,pendingAction]);

  // ── Live ad campaigns (Google + Meta) ── fetched once per ARIA open for every
  // client with a linked ad account, injected into the system prompt so ARIA can
  // propose EXECUTABLE actions with real campaign ids. Failures are silent — ARIA
  // simply gets no campaign data for that client and falls back to descriptive-only.
  const [adsLive,setAdsLive]=useState({});   // clientId -> Google campaigns[]
  const [metaLive,setMetaLive]=useState({}); // clientId -> Meta campaigns[]
  useEffect(()=>{
    let dead=false;
    (async()=>{
      for(const c of clients.filter(c=>c.googleAdsCustomerId).slice(0,8)){
        try{ const d=await gadsCall({action:"campaigns",customerId:c.googleAdsCustomerId}); if(dead)return; setAdsLive(p=>({...p,[c.id]:d.campaigns||[]})); }catch(e){}
      }
      for(const c of clients.filter(c=>c.metaAdAccountId).slice(0,8)){
        try{ const d=await metaCall({action:"campaigns",adAccountId:c.metaAdAccountId}); if(dead)return; setMetaLive(p=>({...p,[c.id]:d.campaigns||[]})); }catch(e){}
      }
    })();
    return ()=>{ dead=true; };
  },[]);
  const adsLines=clients.filter(c=>adsLive[c.id]&&adsLive[c.id].length)
    .map(c=>`${c.name}: `+adsLive[c.id].map(cp=>`[id ${cp.id} "${cp.name}" ${cp.status} $${cp.dailyBudget}/day | 30d: ${cp.clicks} clicks, ${cp.conversions} conv, $${cp.cost.toFixed(0)} spent]`).join(" "))
    .join("\n");
  const metaLines=clients.filter(c=>metaLive[c.id]&&metaLive[c.id].length)
    .map(c=>`${c.name}: `+metaLive[c.id].map(cp=>`[id ${cp.id} "${cp.name}" ${cp.status} $${cp.dailyBudget}/day | 30d: ${cp.clicks} clicks, ${cp.leads} leads, $${cp.spend.toFixed(0)} spent]`).join(" "))
    .join("\n");

  const MRR=clients.reduce((s,c)=>s+((findPkg(c.packageId) && findPkg(c.packageId).price)||0),0);
  const upgradeRequests=clients.filter(c=>c.upgradeRequest);
  const SYSTEM=`You are ARIA, BoldLine Media's agency AI. Full system access. Bryson runs a pay-per-lead agency (roofing, med spas, auto detailing).
STATE: ${clients.length} clients | ${clients.filter(c=>c.stage==="active").length} active | MRR $${MRR.toLocaleString()} | ${clients.flatMap(c=>getAlerts(c)).length} alerts | ${upgradeRequests.length} upgrade requests
CLIENTS:
${clients.map(c=>{ const p=findPkg(c.packageId); return `${c.name}: ${(p && p.name)}(${(p && p.platform)}) stage=${c.stage} leads=${c.leads} CPL=$${c.cpl} health=${calcHealth(c).toFixed(1)} contract=${c.contractEnd}${c.upgradeRequest?" UPGRADE:"+c.upgradeRequest:""}`; }).join("\n")}
Be direct, opinionated. Flag problems Bryson hasn't noticed.
If Bryson clearly asks you to delete a specific client, call the delete_client tool with that client's exact name. He'll see an on-screen confirm button before anything is actually deleted, so just call the tool — no need to double-check in chat first.
If you identify a specific, concrete action worth taking on a client's campaign — a budget change, pausing something underperforming, a creative refresh, anything with real-world or financial impact — call the propose_action tool instead of just suggesting it in chat. It lands in Bryson's approval queue (Notifications) for him to approve or reject; nothing executes without his approval. Propose it any time you'd otherwise just tell him "you should..." about a specific client.
${(adsLines||metaLines)?`LIVE AD CAMPAIGNS (real, from the APIs — 30-day metrics). For an executable proposal, set exec.platform to "google" or "meta" matching which list the campaign came from, use that campaign's EXACT id, and give budgets as DAILY dollars. Never invent an id; if a campaign isn't listed, omit exec.
${adsLines?`GOOGLE ADS:\n${adsLines}\n`:""}${metaLines?`META ADS:\n${metaLines}\n`:""}When a proposal is exactly ONE budget change or ONE pause/enable on a listed campaign, include the exec payload (platform + kind + that campaign's exact id + name) so Bryson's approval executes it automatically.`:""}`;
  const buildReport=()=>{ reset();setRepGen(true);setAriaTab("chat");send(`Generate the weekly BoldLine Media system report. Include: 1) Executive Summary 2) Each client status 3) Revenue analysis including upgrade opportunities 4) Bot system health 5) Top 3 optimization recommendations 6) Urgent alerts 7) Actions for this week.`,SYSTEM); };
  const handleSend=()=>{ if(!input.trim()||loading)return; send(input.trim(),SYSTEM); setInput(""); };

  const handleConfirmDelete=()=>{
    const targetName=String((pendingAction.input && pendingAction.input.client_name)||"");
    const target=clients.find(c=>c.name.toLowerCase()===targetName.toLowerCase());
    if(target){ onDelete(target.id); confirmAction(`Deleted ${target.name}.`,SYSTEM); }
    else { confirmAction(`Could not find a client named "${targetName}". No changes made.`,SYSTEM); }
  };
  const handleCancelDelete=()=>cancelAction(SYSTEM);

  useEffect(()=>{
    if(!pendingAction||pendingAction.name!=="propose_action") return;
    const {client_name,title,detail,category}=pendingAction.input||{};
    const target=clients.find(c=>c.name.toLowerCase()===String(client_name||"").toLowerCase());
    if(!target){ confirmAction(`Could not find a client named "${client_name}". No proposal logged.`,SYSTEM); return; }
    // Validate the optional exec payload — only attach when it's a well-formed,
    // single Google Ads operation on a client with a linked ad account. Anything
    // malformed silently degrades to a descriptive-only proposal (never blocks).
    let exec=null;
    const rawExec=pendingAction.input&&pendingAction.input.exec;
    if(rawExec){
      const platform=String(rawExec.platform||"google").toLowerCase()==="meta"?"meta":"google";
      const linkedOk=platform==="meta"?!!target.metaAdAccountId:!!target.googleAdsCustomerId;
      const kind=String(rawExec.kind||"");
      const campaignId=String(rawExec.campaign_id||"").replace(/[^0-9]/g,"");
      const budget=Number(rawExec.new_daily_budget_dollars);
      const okKind=["set_daily_budget","pause_campaign","enable_campaign"].includes(kind);
      const okBudget=kind!=="set_daily_budget"||(Number.isFinite(budget)&&budget>0&&budget<100000);
      if(linkedOk&&okKind&&campaignId&&okBudget){
        exec={platform,kind,campaignId,campaignName:String(rawExec.campaign_name||""),...(kind==="set_daily_budget"?{newDailyBudgetDollars:budget}:{})};
      }
    }
    const action={id:crypto.randomUUID(),title:String(title||"Proposed action"),detail:String(detail||""),category:String(category||"other"),createdAt:new Date().toISOString(),...(exec?{exec}:{})};
    onUpdate({...target,pendingActions:[...(target.pendingActions||[]),action]});
    confirmAction(`Logged for Bryson's approval: "${action.title}" on ${target.name}.${exec?` It will execute in ${exec.platform==="meta"?"Meta":"Google"} Ads the moment he approves.`:""}`,SYSTEM);
  },[pendingAction]);
  return (
    <Sheet onClose={onClose} zIndex={80} height="96vh" accentBorder={`${C.purple}44`}>
      <div style={{padding:"13px 14px 11px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:11}}>
          <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.purple},#1D4ED8)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>✦</div>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:C.text}}>ARIA</div><div style={{fontSize:11,color:C.textMuted}}>Agency-wide AI · {clients.length} clients · ${MRR.toLocaleString()}/mo MRR</div></div>
          <CloseBtn onClick={onClose}/>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setAriaTab("chat")} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${ariaTab==="chat"?`${C.purple}44`:C.border}`,backgroundColor:ariaTab==="chat"?`${C.purple}15`:"rgba(255,255,255,.03)",color:ariaTab==="chat"?C.purple:C.textMuted,cursor:"pointer"}}>Chat</button>
          <button onClick={buildReport} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",backgroundColor:repGen?"rgba(16,185,129,.15)":"#1D4ED8",color:repGen?"#34D399":"#fff",cursor:"pointer"}}>{loading&&repGen?"Generating…":repGen?"Regenerate":"Weekly Report"}</button>
          <button onClick={()=>setAriaTab("builder")} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${ariaTab==="builder"?`${C.purple}44`:C.border}`,backgroundColor:ariaTab==="builder"?`${C.purple}15`:"rgba(255,255,255,.03)",color:ariaTab==="builder"?C.purple:C.textMuted,cursor:"pointer"}}>System Builder</button>
          <button onClick={()=>setAriaTab("deploy")} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${ariaTab==="deploy"?"rgba(245,158,11,0.4)":C.border}`,backgroundColor:ariaTab==="deploy"?"rgba(245,158,11,0.1)":"rgba(255,255,255,.03)",color:ariaTab==="deploy"?C.amber:C.textMuted,cursor:"pointer"}}>Deployment ⚡</button>
        </div>
      </div>
      {ariaTab==="chat"&&(
        <><div style={{flex:1,overflowY:"auto",padding:"14px"}}>
          {messages.length===0&&<div style={{color:C.textMuted,fontSize:13,lineHeight:1.8,padding:"8px 0"}}>
            <div style={{fontWeight:700,color:C.textDim,marginBottom:11}}>ARIA has full visibility into your entire agency.</div>
            {["Ask about any client's performance or status","Get a weekly system report","Request optimization suggestions for any area","Describe something to build — ARIA will design it","Ask ARIA to flag anything that looks off"].map((t,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8}}><span style={{color:C.purple,fontWeight:700,flexShrink:0}}>→</span><span>{t}</span></div>
            ))}
          </div>}
          {messages.map((m,i)=><Bubble key={i} msg={m}/>)}
          {loading&&<Typing/>}
          {pendingAction&&pendingAction.name==="delete_client"&&(
            <div style={{margin:"4px 0 10px",padding:"12px 13px",borderRadius:11,backgroundColor:"rgba(248,113,113,0.06)",border:`1px solid ${C.red}44`}}>
              <div style={{fontSize:12,color:C.textDim,marginBottom:9,lineHeight:1.6}}>ARIA wants to delete <strong style={{color:C.red}}>{(pendingAction.input && pendingAction.input.client_name)||"this client"}</strong>. This cannot be undone.</div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={handleCancelDelete} style={{flex:1,padding:"7px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
                <button onClick={handleConfirmDelete} style={{flex:1,padding:"7px",fontSize:11,fontWeight:700,borderRadius:8,border:"none",backgroundColor:"rgba(248,113,113,0.15)",color:C.red,cursor:"pointer"}}>Yes, Delete</button>
              </div>
            </div>
          )}
          <div ref={endRef}/>
        </div>
        <ChatBar value={input} onChange={setInput} onSend={handleSend} disabled={loading||!!pendingAction} placeholder="Ask ARIA anything about your agency…"/></>
      )}
      {ariaTab==="builder"&&<ARIABuilderTab ariaSystem={SYSTEM}/>}
      {ariaTab==="deploy"&&<ARIADeployTab/>}
    </Sheet>
  );
}

// Sends a real (non-binding) test envelope through the JWT integration so the

function DocuSignTestCard() {
  const [email,setEmail]=useState("");
  const [state,setState]=useState("idle");   // idle | sending | sent | error
  const [msg,setMsg]=useState("");
  const send=async()=>{
    const to=email.trim();
    if(!to||!to.includes("@")){ setState("error"); setMsg("Enter a valid email address."); return; }
    setState("sending"); setMsg("");
    try{
      const { data:{ session } }=await supabaseClient.auth.getSession();

      const d=await r.json().catch(()=>({}));
      if(!r.ok||!d.ok){ setState("error"); setMsg((d.stage?d.stage+" — ":"")+(d.error||"Send failed.")+(d.detail?" | "+JSON.stringify(d.detail):"")); return; }
      setState("sent"); setMsg("✓ Envelope sent to "+to+". Check your inbox (and spam) for a DocuSign email.");
    }catch(e){ setState("error"); setMsg("Network error — try again."); }

  return (
