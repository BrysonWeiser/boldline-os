// Add exactly N calendar months — preserves the day-of-month correctly.
// e.g. Jan 31 + 1 month = Feb 28/29 (not Mar 2/3 like *30 days gives)
const addMonths = (date, n) => {
  const d = new Date(date);
  const day = d.getDate();
  d.setMonth(d.getMonth() + n);
  // If day overflowed (e.g. Jan 31 + 1 month → Mar 3), roll back to last day of intended month
  if (d.getDate() !== day) d.setDate(0);
  return d;
};

};

// ─── AUTO HEALTH SCORE ────────────────────────────────────────────────────────
const calcHealth = (cl) => {
  let score = 0;
  const pkg = findPkg(cl.packageId);
  const days = daysUntil(cl.contractEnd);

  // ── Foundation (max 2 pts) ─────────────────────────────────────────────────
  if (cl.contractSigned)  score += 1;   // signed = relationship is real
  if (cl.intakeComplete)  score += 1;   // intake = we can actually do the work

  // ── Campaign stage (max 2 pts) ─────────────────────────────────────────────
  const stageScore = {
    onboarding:0, research:0.5, building:1, review:1.5,
    active:2, optimizing:2, scaling:2, paused:0.5,
  };
  score += stageScore[cl.stage]||0;

  // ── Lead performance (max 2 pts) ──────────────────────────────────────────
  if (cl.leads>0)  score += 0.5;   // at least something coming in
  if (cl.leads>10) score += 0.5;   // meaningful volume
  if (cl.leads>30) score += 0.5;   // strong volume
  if (cl.leads>0 && cl.cpl>0) {
    const niche = cl.niche;
    const target = PER_LEAD[niche]||50; // use per-lead fee as CPL benchmark
    if (cl.cpl <= target * 0.75) score += 0.5;       // beating target by 25%+
    else if (cl.cpl <= target)   score += 0.25;      // at or near target
  }

  // ── Contract health (max 2 pts) ───────────────────────────────────────────
  if (cl.contractStatus==="active") score += 1;
  if (days>30)  score += 1;         // plenty of runway
  else if (days>7) score += 0.5;    // getting close

  // ── Bot pipeline progress (max 1 pt) ──────────────────────────────────────
  const statuses = Object.values(cl.botStatuses||{});
  const done = statuses.filter(s=>s==="done").length;
  const total = statuses.length||1;
  score += (done/total) * 1;

  // ── Deductions ────────────────────────────────────────────────────────────
  if (cl.upgradeRequest) score -= 0;  // upgrade request is positive signal, no penalty
  if (!cl.intakeComplete && cl.stage!=="onboarding") score -= 0.5; // overdue intake
  if (cl.contractStatus==="expired") score -= 1;

  return Math.max(1, Math.min(10, Math.round(score * 10) / 10));
};

// ─── AI HOOK ─────────────────────────────────────────────────────────────────
function useAI(system) {
  const [messages,setMessages] = useState([]);
  const [loading,setLoading]   = useState(false);
  const send = async (text, override) => {
    const h = [...messages, {role:"user",content:text}];
    setMessages(h); setLoading(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1200,system:override||system,messages:h.map(m=>({role:m.role,content:m.content}))})});
      const d = await r.json();
      setMessages([...h,{role:"assistant",content:(d.content && d.content[0] && d.content[0].text)||"No response."}]);
    } catch { setMessages([...h,{role:"assistant",content:"Connection error — try again."}]); }
    setLoading(false);
  };
  const reset = (intro) => setMessages(intro?[{role:"assistant",content:intro}]:[]);
  return {messages,loading,send,reset};
}

          <div style={{textAlign:"center",padding:"50px 20px",color:C.textMuted,fontSize:13,lineHeight:1.7}}>

          <>

              Select an upgrade option below. No changes are made until your account manager confirms and you approve the invoice.

            {options.map(pkg=>{
              const isSelected = selected===pkg.id;
              const diff = pkg.price - ((cur && cur.price)||0);
              const newFeatures = ALL_FEATURES.filter(f=>pkgHasFeature(pkg.id,f.id)&&!pkgHasFeature(currentPkgId,f.id));
              return (
                <button key={pkg.id} onClick={()=>setSelected(pkg.id)}
                  style={{width:"100%",textAlign:"left",padding:"14px",borderRadius:13,

                      <div style={{fontSize:14,fontWeight:700,color:C.text}}>{pkg.name}</div>
                      <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{pkg.platform} · {pkg.adSpend}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                      <div style={{fontSize:19,fontWeight:800,color:C.gold}}>${pkg.price}<span style={{fontSize:10,fontWeight:400,color:C.textMuted}}>/mo</span></div>

                      {newFeatures.slice(0,4).map(f=>(
                        <span key={f.id} style={{fontSize:9,padding:"2px 8px",borderRadius:20,

          <div style={{fontSize:11,color:C.textMuted,textAlign:"center",marginTop:8}}>

    </Sheet>
  );
}

const makePortalHTML=(cl,pkg)=>{
  const si=STAGES.findIndex(s=>s.id===cl.stage);
  const pl=PER_LEAD[cl.niche];
  const SC=["#6366F1","#0891B2","#D97706","#7C3AED","#10B981","#2563EB","#059669","#6B7280"];

  const exclFeats=ALL_FEATURES.filter(f=>!pkgHasFeature(cl.packageId,f.id)&&upgOpts.some(p=>pkgHasFeature(p.id,f.id)));

    return `<details class="stage-row"><summary class="stage-btn"><span class="stage-dot" style="background:${dot}"></span><span class="stage-name">${SL[i]}</span><span class="stage-tag" style="color:${tagColor}">${tag}</span></summary><div class="stage-desc">${SD[i]}</div></details>`;
  }).join('');
  const fHTML = inclFeats.map(f=>'<div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;color:#9CA3AF;display:flex;align-items:center;gap:8px"><span style="color:#C8A84B;font-weight:700">✓</span>'+f.label+'</div>').join('');
  const uHTML = exclFeats.slice(0,8).map(f=>'<div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;color:#374151;display:flex;align-items:center;gap:8px"><span>○</span>'+f.label+'<span style="margin-left:auto;font-size:9px;padding:1px 6px;border-radius:20px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.2);color:#C8A84B">Upgrade</span></div>').join('');

    '<div style="font-size:11px;color:#6B7280;margin-bottom:10px">Select a package. Your account manager will confirm and send an invoice — no changes until you approve.</div>' +
    upgOpts.map(function(p,i){ return '<div class="uopt" id="u'+i+'" data-name="'+p.name+' ('+p.platform+') $'+p.price+'/mo" onclick="selUpg(this,'+i+')"><div style="display:flex;justify-content:space-between"><div><div style="font-size:13px;font-weight:700;color:#F0F2FF">'+p.name+'</div><div style="font-size:10px;color:#6B7280">'+p.platform+'</div></div><div style="font-size:18px;font-weight:800;color:#C8A84B">$'+p.price+'<span style="font-size:10px;font-weight:400;color:#6B7280">/mo</span></div></div></div>'; }).join('') +
    '<button class="btn" id="upgbtn" disabled onclick="submitUpg()" style="opacity:.4">Review Selection →</button></div>';
  const contractAlert = (dL<=30&&dL>=0) ? '<div style="margin-top:10px;padding:8px 10px;border-radius:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);font-size:11px;color:#F59E0B">Contract renewing in '+dL+' days. Your account manager will be in touch.</div>' : '';
  const css = '*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#080A0F;color:#F9FAFB;font-size:14px}.hdr{background:#0D0F16;border-bottom:1px solid rgba(255,255,255,.08);padding:12px 16px;display:flex;align-items:center;gap:10px}.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#C8A84B,#9a7a2e);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#0a0800}.nav{display:flex;overflow-x:auto;background:#0D0F16;border-bottom:1px solid rgba(255,255,255,.07)}.nb{padding:11px 14px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none;background:transparent;color:#6B7280;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}.nb.on{color:#C8A84B;border-bottom-color:#C8A84B}.main{padding:14px;max-width:600px;margin:0 auto}.card{background:#0D0F16;border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:14px;margin-bottom:10px}.lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#4B5563;margin-bottom:8px}.stage-cur{padding:11px;border-radius:9px;background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.2);margin-bottom:8px}.stage-cur-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}.stage-cur-name{font-size:13px;font-weight:700}.stage-cur-desc{font-size:11px;color:#9CA3AF;line-height:1.6}.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}.stage-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-left:auto}.stage-list{margin-top:2px}.stage-toggle{padding:9px 4px;font-size:11px;font-weight:700;color:#9CA3AF;cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:center;gap:6px;border-top:1px solid rgba(255,255,255,.06);margin-top:4px}.stage-toggle::-webkit-details-marker{display:none}.stage-toggle::after{content:"▾";font-size:9px}.stage-list[open]>.stage-toggle::after{content:"▴"}.stage-row{border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-top:6px}.stage-btn{padding:9px 10px;font-size:12px;font-weight:600;color:#E5E7EB;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}.stage-btn::-webkit-details-marker{display:none}.stage-btn::after{content:"▾";font-size:9px;color:#6B7280;margin-left:4px}.stage-row[open]>.stage-btn::after{content:"▴"}.stage-desc{padding:0 10px 10px 26px;font-size:11px;color:#9CA3AF;line-height:1.6}.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:9px 11px;flex:1}.inp{width:100%;padding:9px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;color:#F9FAFB;font-size:13px;font-family:inherit;margin-bottom:8px}.btn{width:100%;padding:12px;font-size:13px;font-weight:700;border-radius:10px;border:1px solid rgba(200,168,75,.35);background:rgba(200,168,75,.1);color:#C8A84B;cursor:pointer;font-family:inherit;margin-top:10px}.uopt{padding:12px;border-radius:10px;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);cursor:pointer;margin-bottom:8px}.uopt.sel{border-color:#C8A84B;background:rgba(200,168,75,.07)}select{background:#0D0F16;color:#F9FAFB}';

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>'+cl.name+' Portal</title><style>'+css+'</style></head><body>'
    +'<div class="hdr"><div class="logo">B</div><div><div style="font-size:13px;font-weight:700;color:#E8E4D0">BoldLine Media</div><div style="font-size:9px;color:#6e6b54">Client Portal</div></div><div style="margin-left:auto;font-size:11px;color:#9CA3AF">'+cl.name+'</div></div>'
    +`<div class="nav"><button class="nb on" onclick="show('status',this)">Status</button><button class="nb" onclick="show('package',this)">My Package</button><button class="nb" onclick="show('intake',this)">My Info</button><button class="nb" onclick="show('contract',this)">Contract</button></div>`
    +'<div class="main">'
    +`<div id="t-status"><div class="card"><div class="lbl">Campaign Progress</div><div class="stage-cur"><div class="stage-cur-top"><span class="stage-dot" style="background:${SC[si]||'#6B7280'}"></span><span class="stage-cur-name" style="color:${SC[si]||'#9CA3AF'}">${SL[si]||'—'}</span><span class="stage-tag" style="color:${SC[si]||'#9CA3AF'}">In Progress</span></div><div class="stage-cur-desc">${SD[si]||'Your campaign status will appear here.'}</div></div><details class="stage-list"><summary class="stage-toggle">View all steps</summary>${stageRows}</details></div>`
    +'<div class="card"><div class="lbl">Your Campaign</div><div style="display:flex;gap:8px;flex-wrap:wrap"><div class="stat"><div class="lbl">Package</div><div style="font-size:13px;font-weight:700;color:#E5E7EB">'+(pkg&&pkg.name||'—')+'</div></div><div class="stat"><div class="lbl">Platform</div><div style="font-size:13px;font-weight:700;color:#E5E7EB">'+(pkg&&pkg.platform||'—')+'</div></div>'+(pl?'<div class="stat"><div class="lbl">Per Lead</div><div style="font-size:13px;font-weight:700;color:#C8A84B">$'+pl+'</div></div>':'')+'</div></div></div>'
    +'<div id="t-package" style="display:none"><div class="card"><div class="lbl">Your Package — '+(pkg&&pkg.name||'—')+'</div><div style="font-size:11px;color:#C8A84B;margin-bottom:12px">'+(pkg&&pkg.platform||'')+(pkg?' · $'+pkg.price+'/mo':'')+'</div>'+fHTML+(exclFeats.length>0?'<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)"><div class="lbl">Available with Upgrade</div>'+uHTML+'</div>':'')+'</div>'+upgSection+'</div>'
    +`<div id="t-intake" style="display:none"><div class="card"><div class="lbl">Business Details</div><input class="inp" placeholder="Business Name *" value="${cl.name}"><input class="inp" placeholder="Contact Name" value="${cl.contactName||''}"><input class="inp" placeholder="Email" value="${cl.email||''}"><input class="inp" placeholder="Business Address" value="${cl.businessAddress||''}"><input class="inp" placeholder="Service Area"></div><div class="card"><div class="lbl">Your Offer</div><input class="inp" placeholder="Main service to advertise *"><input class="inp" placeholder="Average job / ticket value *"><input class="inp" placeholder="What makes you different? *"></div><div class="card"><div class="lbl">Assets</div><select class="inp"><option>Do you have photos of your work?</option><option>Yes — I will send them</option><option>No — use stock images</option></select><input class="inp" placeholder="Where should leads be sent? *"><input class="inp" placeholder="CRM or booking system (if any)"></div><button class="btn" onclick="this.textContent='✓ Saved';this.disabled=true">Save My Information</button></div>`
    +'<div id="t-contract" style="display:none"><div class="card"><div class="lbl">Contract Status</div><div style="font-size:13px;font-weight:700;color:'+(cl.contractStatus==='active'?'#10B981':cl.contractStatus==='pending'?'#F59E0B':'#EF4444')+';margin-bottom:6px">'+(cl.contractStatus==='active'?'Signed and Active':cl.contractStatus==='pending'?'Pending Signature':'Expired')+'</div><div style="font-size:11px;color:#6B7280;line-height:1.6">Start: '+(cl.contractStart||'—')+' · End: '+(cl.contractEnd||'—')+'</div>'+contractAlert+'</div></div>'
    +'</div>'
    +`<script>var selUpgName=null;function show(n,b){document.querySelectorAll('[id^="t-"]').forEach(e=>e.style.display="none");document.querySelectorAll('.nb').forEach(e=>e.classList.remove('on'));document.getElementById('t-'+n).style.display='block';b.classList.add('on');}function selUpg(el,i){selUpgName=el.getAttribute('data-name');document.querySelectorAll('.uopt').forEach((e,j)=>{e.classList.toggle('sel',i===j)});var b=document.getElementById('upgbtn');if(b){b.disabled=false;b.style.opacity='1';}}function submitUpg(){if(!selUpgName)return;if(confirm('Send upgrade request?\\n'+selUpgName+'\\n\\nYour account manager will be in touch within 1 business day.')){document.getElementById('upgrade-section').innerHTML='<div style="text-align:center;padding:24px"><div style="font-size:30px;margin-bottom:10px">✓</div><div style="font-size:15px;font-weight:700;color:#F0F2FF;margin-bottom:8px">Request Sent</div><div style="font-size:12px;color:#6B7280">Your account manager will be in touch within 1 business day.</div></div>';}}<\/script>`
    +'</body></html>';
};


// ─── HOME SCREEN ─────────────────────────────────────────────────────────────
function HomeScreen({clients,onSelect,onAdd}) {
  const [search,setSearch]     = useState("");
  const [stageFilter,setStageF]= useState("all");
  const [nicheFilter,setNicheF]= useState("all");
  const [sortBy,setSortBy]     = useState("name"); // name | health | leads | expiry
  const [showFilters,setShowF] = useState(false);

  const MRR       = clients.reduce((s,c)=>s+((findPkg(c.packageId) && findPkg(c.packageId).price)||0),0);
  const active    = clients.filter(c=>c.stage==="active").length;
  const allAlerts = clients.flatMap(c=>getAlerts(c));
  const expiring  = clients.filter(c=>{ const d=daysUntil(c.contractEnd); return d>=0&&d<=30; });

  // ── Filter + sort pipeline ─────────────────────────────────────────────────
  const q = search.toLowerCase().trim();
  const filtered = clients
    .filter(cl=>{
      if (q) {
        const pkg = findPkg(cl.packageId);
        const haystack = [cl.name,cl.contactName,cl.niche,cl.email,(pkg && pkg.name),(pkg && pkg.platform)].join(" ").toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      if (stageFilter!=="all" && cl.stage!==stageFilter) return false;
      if (nicheFilter!=="all" && cl.niche!==nicheFilter)  return false;
      return true;
    })
    .sort((a,b)=>{
      if (sortBy==="health")  return calcHealth(b)-calcHealth(a);
      if (sortBy==="leads")   return (b.leads||0)-(a.leads||0);
      if (sortBy==="expiry")  return daysUntil(a.contractEnd)-daysUntil(b.contractEnd);
      return a.name.localeCompare(b.name); // default: alphabetical
    });

  const hasActiveFilters = stageFilter!=="all" || nicheFilter!=="all" || sortBy!=="name";
  const clearAll = () => { setSearch(""); setStageF("all"); setNicheF("all"); setSortBy("name"); };

  return (
    <div style={{flex:1,overflowY:"auto",padding:"16px 14px 100px"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:42,height:42,borderRadius:12,background:C.gradB,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:18,fontWeight:900,color:"#0a0800",flexShrink:0,
            boxShadow:"0 4px 16px rgba(200,168,75,0.25)"}}>B</div>
          <div>
            <div style={{fontSize:17,fontWeight:800,color:C.text,letterSpacing:"-0.02em",lineHeight:1.1}}>BoldLine OS</div>
            <div style={{fontSize:10,color:C.textMuted,letterSpacing:"0.06em",textTransform:"uppercase",marginTop:2}}>Agency Dashboard</div>
          </div>
        </div>
      </div>

      {/* MRR hero card */}
      <div style={{background:"linear-gradient(135deg,rgba(200,168,75,0.12),rgba(200,168,75,0.04))",
        border:"1px solid rgba(200,168,75,0.2)",borderRadius:16,padding:"18px 20px",marginBottom:12,
        position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:100,height:100,borderRadius:"50%",
          background:"radial-gradient(circle,rgba(200,168,75,0.12),transparent 70%)"}}/>
        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:C.gold,marginBottom:4,opacity:.8}}>Monthly Recurring Revenue</div>
        <div style={{fontSize:32,fontWeight:900,color:C.gold,letterSpacing:"-0.02em",lineHeight:1,marginBottom:4}}>${MRR.toLocaleString()}</div>
        <div style={{fontSize:11,color:C.textMuted}}>management fees · {active} active of {clients.length} total</div>
      </div>

      {/* Stats row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
        {[
          {l:"Alerts",  v:allAlerts.length, color:allAlerts.length>0?C.amber:C.green},
          {l:"Expiring",v:expiring.length,  color:expiring.length>0?C.red:C.textMuted},
          {l:"Clients", v:clients.length,   color:C.blue},
        ].map(({l,v,color})=>(
          <div key={l} style={{backgroundColor:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px",textAlign:"center"}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.textMuted,marginBottom:4}}>{l}</div>
            <div style={{fontSize:22,fontWeight:800,color,lineHeight:1}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Urgent alerts */}
      {expiring.map(cl=>{
        const d=daysUntil(cl.contractEnd);
        return <div key={cl.id} onClick={()=>onSelect(cl)} style={{marginBottom:8,padding:"11px 13px",borderRadius:11,backgroundColor:d<=7?"rgba(239,68,68,.07)":"rgba(245,158,11,.07)",border:`1px solid ${d<=7?C.red:C.amber}33`,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{d<=7?"🔴":"🟡"}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div><div style={{fontSize:11,color:d<=7?C.red:C.amber}}>Contract expires in {d} day{d!==1?"s":""} — {d<=7?"urgent renewal needed":"start renewal conversation"}</div></div>
          <span style={{fontSize:16,color:C.textMuted}}>›</span>
        </div>;
      })}
      {clients.filter(c=>c.upgradeRequest).map(cl=>(
        <div key={cl.id} onClick={()=>onSelect(cl)} style={{marginBottom:8,padding:"11px 13px",borderRadius:11,backgroundColor:`${C.purple}08`,border:`1px solid ${C.purple}33`,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>⬆️</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div><div style={{fontSize:11,color:C.purple}}>Upgrade requested — review and send invoice</div></div>
          <span style={{fontSize:16,color:C.textMuted}}>›</span>
        </div>
      ))}

      {/* Add client */}
      <button onClick={onAdd} style={{width:"100%",padding:"13px",fontSize:13,fontWeight:700,
        borderRadius:12,border:`1px dashed rgba(200,168,75,0.3)`,
        backgroundColor:"rgba(200,168,75,0.04)",color:C.gold,cursor:"pointer",marginBottom:14,
        display:"flex",alignItems:"center",justifyContent:"center",gap:8,letterSpacing:"0.01em"}}>
        <span style={{fontSize:20,lineHeight:1}}>+</span> Add New Client
      </button>

      {/* ── SEARCH BAR ── */}
      <div style={{position:"relative",marginBottom:8}}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.textMuted} strokeWidth="2" strokeLinecap="round"
          style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}>
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          value={search}
          onChange={e=>setSearch(e.target.value)}
          placeholder="Search clients by name, niche, or package…"
          style={{...inp, paddingLeft:32, fontSize:13}}
        />
        {search&&(
          <button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:16,lineHeight:1}}>✕</button>
        )}
      </div>

      {/* ── FILTER + SORT ROW ── */}
      <div style={{display:"flex",gap:7,marginBottom:12,alignItems:"center"}}>
        <button
          onClick={()=>setShowF(p=>!p)}
          style={{display:"flex",alignItems:"center",gap:5,padding:"6px 11px",fontSize:11,fontWeight:700,
            borderRadius:8,border:`1px solid ${hasActiveFilters?C.gold:C.border}`,
            backgroundColor:hasActiveFilters?C.goldDim:"rgba(255,255,255,0.03)",
            color:hasActiveFilters?C.gold:C.textMuted,cursor:"pointer",flexShrink:0}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
          </svg>
          Filter{hasActiveFilters?" ●":""}
        </button>
        {/* Sort chips */}
        <div style={{display:"flex",gap:5,overflowX:"auto",flex:1}}>
          {[["name","A–Z"],["health","Health"],["leads","Leads"],["expiry","Expiry"]].map(([k,l])=>(
            <button key={k} onClick={()=>setSortBy(k)} style={{
              padding:"5px 10px",fontSize:10,fontWeight:700,borderRadius:20,flexShrink:0,
              border:`1px solid ${sortBy===k?C.gold:C.border}`,
              backgroundColor:sortBy===k?C.goldDim:"transparent",
              color:sortBy===k?C.gold:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"
            }}>{l}</button>
          ))}
        </div>
        {hasActiveFilters&&(
          <button onClick={clearAll} style={{padding:"5px 9px",fontSize:10,fontWeight:700,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,0.03)",color:C.textMuted,cursor:"pointer",flexShrink:0}}>Clear</button>
        )}
      </div>

      {/* ── FILTER PANEL (collapsible) ── */}
      {showFilters&&(
        <div style={{backgroundColor:C.bg3,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px",marginBottom:12,display:"flex",flexDirection:"column",gap:12}}>
          <div>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.textMuted,marginBottom:7}}>Stage</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {[["all","All Stages"],...STAGES.map(s=>[s.id,s.label])].map(([k,l])=>(
                <button key={k} onClick={()=>setStageF(k)} style={{
                  padding:"4px 10px",fontSize:10,fontWeight:700,borderRadius:20,
                  border:`1px solid ${stageFilter===k?((STAGES.find(s=>s.id===k) && STAGES.find(s=>s.id===k).color)||C.gold):C.border}`,
                  backgroundColor:stageFilter===k?`${(STAGES.find(s=>s.id===k) && STAGES.find(s=>s.id===k).color)||C.gold}18`:"transparent",
                  color:stageFilter===k?((STAGES.find(s=>s.id===k) && STAGES.find(s=>s.id===k).color)||C.gold):C.textMuted,
                  cursor:"pointer",whiteSpace:"nowrap"
                }}>{l}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.textMuted,marginBottom:7}}>Niche</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {[["all","All Niches"],...NICHES.map(n=>[n,n])].map(([k,l])=>(
                <button key={k} onClick={()=>setNicheF(k)} style={{
                  padding:"4px 10px",fontSize:10,fontWeight:700,borderRadius:20,
                  border:`1px solid ${nicheFilter===k?C.gold:C.border}`,
                  backgroundColor:nicheFilter===k?C.goldDim:"transparent",
                  color:nicheFilter===k?C.gold:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"
                }}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── CLIENT LIST HEADER ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:C.textMuted,opacity:.7}}>
          {filtered.length===clients.length
            ? `${clients.length} Client${clients.length!==1?"s":""}`
            : `${filtered.length} of ${clients.length} Clients`}
        </div>
        <div style={{width:60,height:1,background:"linear-gradient(90deg,rgba(200,168,75,0.3),transparent)"}}/>
      </div>

      {/* ── EMPTY STATE ── */}
      {filtered.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:C.textMuted}}>
          <div style={{fontSize:28,marginBottom:10}}>🔍</div>
          <div style={{fontSize:14,fontWeight:700,color:C.textDim,marginBottom:6}}>No clients found</div>
          <div style={{fontSize:12,lineHeight:1.7}}>
            {search?`No results for "${search}".`:"No clients match the selected filters."}

          </div>

      )}

      {/* ── CLIENT CARDS ── */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map(cl=>{
          const pkg=findPkg(cl.packageId);
          const alerts=getAlerts(cl);
          const stage=stageInfo(cl.stage);
          const days=daysUntil(cl.contractEnd);
          const health=calcHealth(cl);
          return (
            <button key={cl.id} onClick={()=>onSelect(cl)} style={{
              width:"100%",textAlign:"left",cursor:"pointer",
              backgroundColor:C.bg2,
              border:`1px solid ${alerts.some(a=>a.severity==="red")?"rgba(248,113,113,0.2)":C.border}`,
              borderRadius:14,padding:"14px 15px",
            }}>
              {/* Top row: avatar, name, alert badge, chevron */}
              <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:10}}>
                <div style={{width:42,height:42,borderRadius:12,
                  background:`linear-gradient(135deg,${stage.color}33,${stage.color}11)`,
                  border:`1px solid ${stage.color}33`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:16,fontWeight:900,color:stage.color,flexShrink:0}}>
                  {cl.name[0]}
                </div>
                <div style={S.f1min}>

// ─── CONTRACT TAB ─────────────────────────────────────────────────────────────
function ContractTabContent({client,pkg,days,onRenew}) {
  const [copied,setCopied]=useState(false);
  const [showRenewal,setShowRenewal]=useState(false);
  const [renewMonths,setRenewMonths]=useState("3");
  const [renewSaved,setRenewSaved]=useState(false);
  const html=makeContractHTML(client,pkg);
  const downloadPDF=()=>{
    const blob=new Blob([html],{type:"text/html"});const url=URL.createObjectURL(blob);
    const ifr=document.createElement("iframe");ifr.style.cssText="position:fixed;width:0;height:0;border:none;left:-9999px;top:-9999px";
    document.body.appendChild(ifr);ifr.src=url;
    ifr.onload=()=>{ setTimeout(()=>{ ifr.contentWindow.print(); setTimeout(()=>{ document.body.removeChild(ifr);URL.revokeObjectURL(url); },3000); },600); };
  };
  const handleRenew=()=>{
    const months=parseInt(renewMonths)||3;
    const base=new Date(client.contractEnd||new Date());
    const newEnd=addMonths(base,months);  // proper calendar months, not *30 days
    onRenew(fmt(newEnd));
    setRenewSaved(true);
    setTimeout(()=>{ setShowRenewal(false);setRenewSaved(false); },1500);
  };
  // Live preview of the new end date using calendar months
  const renewalPreviewDate = ()=>{
    const months=parseInt(renewMonths)||3;
    const base=new Date(client.contractEnd||new Date());
    return fmt(addMonths(base,months));
  };
  const showRenewBtn = days<=30;
  return (
    <div style={S.col11}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Card style={{textAlign:"center"}}><Label>Status</Label><Chip label={client.contractStatus==="active"?"Signed & Active":client.contractStatus==="pending"?"Pending Signature":"Expired"} color={client.contractStatus==="active"?C.green:client.contractStatus==="pending"?C.amber:C.red}/></Card>
        <Card style={{textAlign:"center"}}><Label>Days Remaining</Label><div style={{fontSize:22,fontWeight:800,color:days<=7?C.red:days<=30?C.amber:C.green,lineHeight:1}}>{Math.max(0,days)}</div></Card>
      </div>
      {/* Renewal button — appears when ≤30 days left or expired */}
      {showRenewBtn&&!showRenewal&&(
        <button onClick={()=>setShowRenewal(true)} style={{width:"100%",padding:"12px",fontSize:13,fontWeight:700,borderRadius:10,border:`1px solid ${C.green}44`,backgroundColor:`${C.green}12`,color:C.green,cursor:"pointer"}}>
          ✓ Renew This Contract
        </button>
      )}
      {showRenewal&&(
        <Card style={{backgroundColor:"rgba(16,185,129,.06)",borderColor:"rgba(16,185,129,.25)"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.green,marginBottom:10}}>Renew Contract for {client.name}</div>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:5}}>Renewal Length</div>
          <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {["1","3","6","12"].map(m=>(
              <button key={m} onClick={()=>setRenewMonths(m)} style={{flex:1,padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:`1px solid ${renewMonths===m?C.green:C.border}`,backgroundColor:renewMonths===m?`${C.green}15`:"rgba(255,255,255,.03)",color:renewMonths===m?C.green:C.textMuted,cursor:"pointer",minWidth:50}}>{m} mo</button>
            ))}
          </div>
          <div style={{fontSize:11,color:C.textDim,marginBottom:12,lineHeight:1.65}}>
            <div>Renewing for <strong style={{color:C.text}}>{monthsLabel(parseInt(renewMonths||3))}</strong></div>
            <div style={{marginTop:3}}>New end date: <strong style={{color:C.green}}>{renewalPreviewDate()}</strong></div>
            <div style={{marginTop:3,fontSize:10,color:C.textMuted}}>Calculated using exact calendar months — not an approximation.</div>
          </div>
          <div style={S.row7}>
            <button onClick={()=>setShowRenewal(false)} style={{flex:1,padding:"9px",fontSize:12,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
            <button onClick={handleRenew} style={{flex:2,padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:renewSaved?"#059669":C.green,color:"#fff",cursor:"pointer",transition:"background .2s"}}>
              {renewSaved?"✓ Contract Renewed":"Confirm Renewal"}
            </button>
          </div>
        </Card>
      )}
      {!client.contractSigned&&<Card style={{backgroundColor:"rgba(59,130,246,.06)",borderColor:"rgba(59,130,246,.28)"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#60A5FA",marginBottom:4}}>Contract Not Yet Signed</div>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:10,lineHeight:1.6}}>Send to <strong style={{color:C.textDim}}>{client.email}</strong> via DocuSign for e-signature.</div>
        <button style={{width:"100%",padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:"#1D4ED8",color:"#fff",cursor:"pointer"}}>Send via DocuSign →</button>
      </Card>}

// ─── REPORTS TAB ──────────────────────────────────────────────────────────────
function ReportsTabContent({client,pkg}) {
  const {messages,loading,send,reset}=useAI("");
  const [gen,setGen]=useState(false);
  const [input,setInput]=useState("");
  const endRef=useRef(null);
  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}); },[messages]);

  const perLead = PER_LEAD[client.niche];
  const health  = calcHealth(client);
  const onTarget= client.cpl>0 && client.cpl<=(perLead||75);
  const daysLeft= daysUntil(client.contractEnd);
  const botsComplete = Object.values(client.botStatuses||{}).filter(s=>s==="done").length;
  const botsTotal    = Object.values(client.botStatuses||{}).length;

  const SYS=`You are generating a client performance report for Bryson Weiser at BoldLine Media. Write in professional plain English Bryson can read aloud on a client call. Never mention AI or bots.

CLIENT DATA:
Business: ${client.name}
Niche: ${client.niche}
Package: ${(pkg && pkg.name)} on ${(pkg && pkg.platform)}
Campaign Stage: ${client.stage}
Health Score: ${health.toFixed(1)}/10
Leads Generated: ${client.leads}
Average CPL: ${client.cpl>0?"$"+client.cpl:"Not yet tracked"}
Target CPL: ${perLead?"$"+perLead+" (per-lead rate)":"—"}
CPL Status: ${client.leads>0?(onTarget?"On target":"Above target — needs optimization"):"No leads yet"}
Ad Budget: ${client.adBudget||"Not set"}
Contract: ${client.contractStart} → ${client.contractEnd} (${daysLeft>0?daysLeft+"d remaining":"expired"})
Intake Complete: ${client.intakeComplete?"Yes":"No"}
Pipeline Progress: ${botsComplete}/${botsTotal} steps complete
Internal Notes: ${client.notes||"None"}

REPORT STRUCTURE:
1. Campaign Summary (2-3 sentences on current status)
2. Performance This Period (leads, CPL vs target, what's working)
3. What We Did (key actions taken this period)
4. What's Next (next 30 days plan)
5. One recommendation for the client

Keep it concise. Bryson will read this on a call — it should sound natural, not like a dashboard export.`;

  const generateReport = () => {
    reset();
    setGen(true);
    send(`Generate the ${(pkg && pkg.optimizationFreq)==="weekly"?"weekly":"monthly"} performance report for ${client.name}. Use all the client data provided. Make it sound like a confident account manager giving an update.`, SYS);
  };

  return (
    <div style={S.col11}>
      {/* Live data snapshot */}
      <Card style={{backgroundColor:`${C.gold}08`,borderColor:`${C.gold}22`}}>
        <Label>Data Used in This Report</Label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {[
            {l:"Leads",     v:client.leads||0,           color:C.text},
            {l:"CPL",       v:client.cpl?`$${client.cpl}`:"—", color:onTarget?C.green:client.cpl>0?C.amber:C.textMuted},
            {l:"Health",    v:`${health.toFixed(1)}/10`,  color:healthColor(health)},
            {l:"Stage",     v:stageInfo(client.stage).label, color:stageInfo(client.stage).color},
            {l:"Pipeline",  v:`${botsComplete}/${botsTotal}`, color:C.textDim},
            {l:"Days Left", v:daysLeft>0?`${daysLeft}d`:"Expired", color:daysLeft<=7?C.red:daysLeft<=30?C.amber:C.textDim},
          ].map(({l,v,color})=>(
            <div key={l} style={{padding:"6px 8px",borderRadius:7,backgroundColor:"rgba(255,255,255,0.03)",border:`1px solid ${C.border2}`}}>
              <div style={{fontSize:8,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.textMuted,marginBottom:2}}>{l}</div>
              <div style={{fontSize:12,fontWeight:700,color}}>{v}</div>
            </div>
          ))}
        </div>
        {client.notes&&<div style={{marginTop:8,fontSize:10,color:C.textMuted,lineHeight:1.5,fontStyle:"italic"}}>Notes: {client.notes.slice(0,100)}{client.notes.length>100?"…":""}</div>}
      </Card>
      {/* Generate button */}
      <div style={S.row8}>
        <button onClick={generateReport} disabled={loading} style={{flex:1,padding:"11px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:loading?"rgba(255,255,255,.05)":"#1D4ED8",color:loading?C.textMuted:"#fff",cursor:loading?"not-allowed":"pointer"}}>
          {loading?"Generating…":gen?((pkg && pkg.optimizationFreq)==="weekly"?"Regenerate Weekly":"Regenerate Monthly"):((pkg && pkg.optimizationFreq)==="weekly"?"Generate Weekly Report":"Generate Monthly Report")}
        </button>
        {gen&&!loading&&<button onClick={()=>navigator.clipboard.writeText(messages.filter(m=>m.role==="assistant").map(m=>m.content).join("\n\n"))} style={{padding:"11px 14px",fontSize:12,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textDim,cursor:"pointer"}}>Copy</button>}
      </div>
      {/* Report output */}
      <Card style={{minHeight:100}}>
        {messages.length===0&&(
          <div style={{color:C.textMuted,fontSize:12,textAlign:"center",padding:"28px 16px",lineHeight:1.7}}>
            Tap Generate to create a client-ready {(pkg && pkg.optimizationFreq)==="weekly"?"weekly":"monthly"} report for {client.name}.<br/>
            <span style={{fontSize:10,opacity:.7}}>Uses live lead count, CPL, health score, stage, and pipeline progress.</span>
          </div>
        )}
        {messages.map((m,i)=><Bubble key={i} msg={m}/>)}
        {loading&&<Typing/>}
        <div ref={endRef}/>
      </Card>
      {/* Ask */}
      <Card>
        <Label>Ask About {client.name}</Label>
        <ChatBar value={input} onChange={setInput} onSend={()=>{if(input.trim()){send(input.trim(),SYS);setInput("");}}} disabled={loading} placeholder={`Ask about ${client.name}'s performance, next steps, or talking points…`}/>
      </Card>
    </div>
  );
}

// ─── LOG TAB ─────────────────────────────────────────────────────────────────
function LogTabContent({client,onUpdate}) {
  const CATS = [
    {id:"call",    label:"Call",     color:"#22D3A0", icon:"📞"},
    {id:"email",   label:"Email",    color:"#4F8EF7", icon:"✉"},
    {id:"meeting", label:"Meeting",  color:"#8B5CF6", icon:"🤝"},
    {id:"update",  label:"Update",   color:"#C8A84B", icon:"📝"},
    {id:"note",    label:"Note",     color:"#6B7280", icon:"💬"},
  ];
  const [note,setNote]       = useState("");
  const [cat,setCat]         = useState("call");
  const [saved,setSaved]     = useState(false);
  const [filterCat,setFilter]= useState("all");
  const [delIdx,setDelIdx]   = useState(null);

  const add = () => {
    if (!note.trim()) return;
    const entry = {date:fmt(new Date()), note:note.trim(), cat, ts:Date.now()};
    onUpdate({...client, commLog:[entry,...(client.commLog||[])]});
    setNote(""); setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const deleteEntry = (idx) => {
    const updated = (client.commLog||[]).filter((_,i)=>i!==idx);
    onUpdate({...client, commLog:updated});
    setDelIdx(null);
  };

  const log = client.commLog||[];
  const filtered = filterCat==="all" ? log : log.filter(e=>e.cat===filterCat);
  const catInfo = (id) => CATS.find(c=>c.id===id)||CATS[4];

  return (
    <div style={S.col11}>
      {/* Add entry card */}
      <Card>
        <Label>Log an Entry</Label>
        {/* Category selector */}
        <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
          {CATS.map(c=>(
            <button key={c.id} onClick={()=>setCat(c.id)} style={{
              display:"flex",alignItems:"center",gap:5,
              padding:"5px 10px",fontSize:11,fontWeight:700,borderRadius:20,
              border:`1px solid ${cat===c.id?c.color+"66":C.border}`,
              backgroundColor:cat===c.id?c.color+"15":"rgba(255,255,255,0.02)",
              color:cat===c.id?c.color:C.textMuted,cursor:"pointer"
            }}>
              <span style={{fontSize:12}}>{c.icon}</span>{c.label}
            </button>
          ))}
        </div>
        <textarea
          value={note}
          onChange={e=>setNote(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&e.metaKey) add(); }}
          rows={3}
          placeholder={
            cat==="call"    ?"What was discussed, any action items, client sentiment…":
            cat==="email"   ?"Summary of email sent or received…":
            cat==="meeting" ?"Meeting notes, decisions made, follow-ups…":
            cat==="update"  ?"Campaign update, milestone reached, change made…":
                             "General note about this client…"
          }
          style={{...inp,resize:"none",lineHeight:1.6,marginBottom:8}}
        />
        <button onClick={add} disabled={!note.trim()} style={{
          width:"100%",padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",
          backgroundColor:saved?"rgba(34,211,160,0.15)":note.trim()?"#1D4ED8":"rgba(255,255,255,0.04)",
          color:saved?C.green:note.trim()?"#fff":C.textMuted,
          cursor:note.trim()?"pointer":"not-allowed",transition:"all .2s",
          border:saved?`1px solid ${C.green}33`:"none"
        }}>
          {saved?`✓ ${catInfo(cat).label} logged`:`Log ${catInfo(cat).label}`}
        </button>
        <div style={{marginTop:6,fontSize:9,color:C.textMuted,textAlign:"right"}}>⌘ + Enter to save quickly</div>
      </Card>

      {/* History */}
      <Card>
        {/* Header with filter */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <Label>History ({log.length})</Label>
          {log.length>0&&(
            <div style={{display:"flex",gap:4,overflowX:"auto"}}>
              <button onClick={()=>setFilter("all")} style={{padding:"2px 8px",fontSize:9,fontWeight:700,borderRadius:20,border:`1px solid ${filterCat==="all"?C.gold:C.border}`,backgroundColor:filterCat==="all"?C.goldDim:"transparent",color:filterCat==="all"?C.gold:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>All</button>
              {CATS.filter(c=>log.some(e=>e.cat===c.id)).map(c=>(
                <button key={c.id} onClick={()=>setFilter(filterCat===c.id?"all":c.id)} style={{padding:"2px 8px",fontSize:9,fontWeight:700,borderRadius:20,border:`1px solid ${filterCat===c.id?c.color+"66":C.border}`,backgroundColor:filterCat===c.id?c.color+"15":"transparent",color:filterCat===c.id?c.color:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>{c.icon} {c.label}</button>
              ))}
            </div>
          )}
        </div>

        {/* Empty state */}
        {log.length===0&&(
          <div style={{textAlign:"center",padding:"24px 0",color:C.textMuted}}>
            <div style={{fontSize:24,marginBottom:8}}>📋</div>
            <div style={{fontSize:12,color:C.textDim,marginBottom:4}}>No entries yet</div>
            <div style={{fontSize:11,lineHeight:1.6}}>Log calls, emails, and meetings above to keep a complete history of every interaction with {client.name}.</div>
          </div>
        )}

        {/* Filtered empty */}
        {log.length>0&&filtered.length===0&&(
          <div style={{textAlign:"center",padding:"16px 0",color:C.textMuted,fontSize:12}}>
            No {catInfo(filterCat).label.toLowerCase()} entries yet.
            <button onClick={()=>setFilter("all")} style={{background:"none",border:"none",color:C.gold,cursor:"pointer",fontSize:12,fontWeight:700,marginLeft:5}}>Show all</button>
          </div>
        )}

        {/* Entries */}
        {filtered.map((e,i)=>{
          const ci = catInfo(e.cat);
          const isDeleting = delIdx===i;
          return (
            <div key={e.ts||i} style={{
              padding:"10px 0",
              borderBottom:i<filtered.length-1?`1px solid ${C.border2}`:"none",
            }}>
              {/* Entry header */}
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                <span style={{
                  width:22,height:22,borderRadius:6,flexShrink:0,
                  backgroundColor:ci.color+"15",border:`1px solid ${ci.color+"33"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:11
                }}>{ci.icon}</span>
                <span style={{fontSize:10,fontWeight:700,color:ci.color}}>{ci.label}</span>
                <span style={{fontSize:10,color:C.textMuted,marginLeft:"auto"}}>{e.date}</span>
                {!isDeleting&&(
                  <button onClick={()=>setDelIdx(i)} style={{background:"none",border:"none",color:C.textMuted,cursor:"pointer",fontSize:13,lineHeight:1,padding:"0 2px",opacity:.5}}>×</button>
                )}
              </div>
              {/* Note text */}
              <div style={{fontSize:12,color:C.textDim,lineHeight:1.65,paddingLeft:29}}>
                {e.note}
              </div>
              {/* Delete confirm */}
              {isDeleting&&(
                <div style={{marginTop:8,paddingLeft:29,display:"flex",alignItems:"center",gap:7}}>
                  <span style={{fontSize:11,color:C.textMuted}}>Delete this entry?</span>
                  <button onClick={()=>deleteEntry(i)} style={{padding:"3px 9px",fontSize:10,fontWeight:700,borderRadius:7,border:"none",backgroundColor:"rgba(248,113,113,0.15)",color:C.red,cursor:"pointer"}}>Delete</button>
                  <button onClick={()=>setDelIdx(null)} style={{padding:"3px 9px",fontSize:10,fontWeight:700,borderRadius:7,border:`1px solid ${C.border}`,backgroundColor:"transparent",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
                </div>
              )}
            </div>
          );
        })}
      </Card>
    </div>
  );
}

// ─── ARIA ─────────────────────────────────────────────────────────────────────

  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}); },[messages]);
  const MRR=clients.reduce((s,c)=>s+((findPkg(c.packageId) && findPkg(c.packageId).price)||0),0);
  const upgradeRequests=clients.filter(c=>c.upgradeRequest);
  const SYSTEM=`You are ARIA, BoldLine Media's agency AI. Full system access. Bryson runs a pay-per-lead agency (roofing, med spas, auto detailing).
STATE: ${clients.length} clients | ${clients.filter(c=>c.stage==="active").length} active | MRR $${MRR.toLocaleString()} | ${clients.flatMap(c=>getAlerts(c)).length} alerts | ${upgradeRequests.length} upgrade requests
CLIENTS:
${clients.map(c=>{ const p=findPkg(c.packageId); return `${c.name}: ${(p && p.name)}(${(p && p.platform)}) stage=${c.stage} leads=${c.leads} CPL=$${c.cpl} health=${calcHealth(c).toFixed(1)} contract=${c.contractEnd}${c.upgradeRequest?" UPGRADE:"+c.upgradeRequest:""}`; }).join("\n")}
Be direct, opinionated. Flag problems Bryson hasn't noticed.`;
  const buildReport=()=>{ reset();setRepGen(true);setAriaTab("chat");send(`Generate the weekly BoldLine Media system report. Include: 1) Executive Summary 2) Each client status 3) Revenue analysis including upgrade opportunities 4) Bot system health 5) Top 3 optimization recommendations 6) Urgent alerts 7) Actions for this week.`,SYSTEM); };
  const handleSend=()=>{ if(!input.trim()||loading)return; send(input.trim(),SYSTEM); setInput(""); };
  return (
    <Sheet onClose={onClose} zIndex={80} height="96vh" accentBorder={`${C.purple}44`}>
      <div style={{padding:"13px 14px 11px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:11}}>
          <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.purple},#1D4ED8)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>✦</div>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:C.text}}>ARIA</div><div style={{fontSize:11,color:C.textMuted}}>Agency-wide AI · {clients.length} clients · ${MRR.toLocaleString()}/mo MRR</div></div>
          <CloseBtn onClick={onClose}/>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setAriaTab("chat")} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${ariaTab==="chat"?`${C.purple}44`:C.border}`,backgroundColor:ariaTab==="chat"?`${C.purple}15`:"rgba(255,255,255,.03)",color:ariaTab==="chat"?C.purple:C.textMuted,cursor:"pointer"}}>Chat</button>
          <button onClick={buildReport} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",backgroundColor:repGen?"rgba(16,185,129,.15)":"#1D4ED8",color:repGen?"#34D399":"#fff",cursor:"pointer"}}>{loading&&repGen?"Generating…":repGen?"Regenerate":"Weekly Report"}</button>
          <button onClick={()=>setAriaTab("builder")} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${ariaTab==="builder"?`${C.purple}44`:C.border}`,backgroundColor:ariaTab==="builder"?`${C.purple}15`:"rgba(255,255,255,.03)",color:ariaTab==="builder"?C.purple:C.textMuted,cursor:"pointer"}}>System Builder</button>
          <button onClick={()=>setAriaTab("deploy")} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${ariaTab==="deploy"?"rgba(245,158,11,0.4)":C.border}`,backgroundColor:ariaTab==="deploy"?"rgba(245,158,11,0.1)":"rgba(255,255,255,.03)",color:ariaTab==="deploy"?C.amber:C.textMuted,cursor:"pointer"}}>Deployment ⚡</button>
        </div>
      </div>
      {ariaTab==="chat"&&(
        <><div style={{flex:1,overflowY:"auto",padding:"14px"}}>
          {messages.length===0&&<div style={{color:C.textMuted,fontSize:13,lineHeight:1.8,padding:"8px 0"}}>
            <div style={{fontWeight:700,color:C.textDim,marginBottom:11}}>ARIA has full visibility into your entire agency.</div>
            {["Ask about any client's performance or status","Get a weekly system report","Request optimization suggestions for any area","Describe something to build — ARIA will design it","Ask ARIA to flag anything that looks off"].map((t,i)=>(

function ARIABuilderTab({ariaSystem}) {
  const {messages,loading,send}=useAI("");const [input,setInput]=useState("");
  const endRef=useRef(null);
  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}); },[messages]);
  const SYS=ariaSystem+"\n\nSYSTEM BUILDER MODE: Assess ideas honestly, flag overlaps, push back if needed, think about downstream effects.";
  const handleSend=()=>{ if(!input.trim()||loading)return; send(input.trim(),SYS); setInput(""); };
  return (
    <><div style={{flex:1,overflowY:"auto",padding:"14px"}}>
      {messages.length===0&&<div style={{display:"flex",flexDirection:"column",gap:7}}>
        <div style={{fontSize:13,color:C.textDim,lineHeight:1.7,marginBottom:7}}>Describe anything you want to add, change, or build. ARIA will push back if needed and help design it.</div>
        {["What gaps do you see in the system?","Design a lead quality scoring system","What automation saves the most time?","How to handle client re-engagement after expiry?"].map((s,i)=>(
          <button key={i} onClick={()=>send(s,SYS)} style={{padding:"10px 12px",fontSize:12,textAlign:"left",borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.02)",color:C.textMuted,cursor:"pointer",lineHeight:1.5}}>{s}</button>
        ))}
      </div>}
      {messages.map((m,i)=><Bubble key={i} msg={m}/>)}
      {loading&&<Typing/>}
      <div ref={endRef}/>
    </div>
    <ChatBar value={input} onChange={setInput} onSend={handleSend} disabled={loading} placeholder="Describe what you want to build or improve…"/></>
  );
}

            <div style={{display:"flex",gap:2,backgroundColor:"rgba(255,255,255,.04)",borderRadius:8,padding:3,marginBottom:10}}>{[["google","Google"],["meta","Meta"],["combined","Combined"],["ecom","E-Commerce"]].map(([key,label])=><button key={key} onClick={()=>setPkgCat(key)} style={{flex:1,padding:"4px 0",fontSize:10,fontWeight:700,borderRadius:6,border:"none",cursor:"pointer",backgroundColor:pkgCat===key?`${C.gold}33`:"transparent",color:pkgCat===key?C.gold:C.textMuted}}>{label}</button>)}</div>
            {PACKAGES_DB[pkgCat].map(pkg=>(
              <button key={pkg.id} onClick={()=>set("packageId",pkg.id)} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1px solid ${form.packageId===pkg.id?C.gold:C.border}`,backgroundColor:form.packageId===pkg.id?`${C.gold}10`:"rgba(255,255,255,.02)",cursor:"pointer",textAlign:"left",marginBottom:5}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={S.f1min}>{pkg.tag&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",backgroundColor:C.gold,color:"#0a0800",borderRadius:3,marginRight:5}}>{pkg.tag}</span>}<span style={{fontSize:12,fontWeight:700,color:C.text}}>{pkg.name}</span><div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{pkg.platform}</div></div>
                  <div style={{textAlign:"right",flexShrink:0}}><span style={{fontSize:14,fontWeight:800,color:C.gold}}>${pkg.price}</span><span style={{fontSize:10,color:C.textMuted}}>/mo</span></div>
                </div>
              </button>
            ))}
          </Card>
          {selPkg&&<Card style={{backgroundColor:"rgba(16,185,129,.05)",borderColor:"rgba(16,185,129,.2)"}}>
            <Label>Bot Pipeline for This Package</Label>
            <div style={{fontSize:11,color:C.textDim,lineHeight:1.7,marginBottom:7}}>{buildBots(selPkg).length} bots created, scoped to {selPkg.name}. Cannot build beyond what's included.</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{buildBots(selPkg).slice(0,4).map(b=><span key={b.id} style={{fontSize:10,padding:"2px 7px",borderRadius:20,backgroundColor:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.2)",color:"#34D399"}}>{b.name}</span>)}<span style={{fontSize:10,color:C.textMuted}}>+{Math.max(0,buildBots(selPkg).length-4)} more</span></div>
          </Card>}
        </>}
        {step===2&&<>
          {/* Contract Start */}
          <Card>
            <Label>Contract Start Date</Label>
            <div style={{display:"flex",gap:6,marginBottom:9,flexWrap:"wrap"}}>
              {[{l:"Today",v:fmt(today)},{l:"Next Mon",v:fmt(addDays(today,(8-today.getDay())%7||7))},{l:"1st Next Month",v:fmt(new Date(today.getFullYear(),today.getMonth()+1,1))}].map(({l,v})=>(
                <button key={l} onClick={()=>setStartDate(v)} style={{padding:"5px 10px",fontSize:10,fontWeight:700,borderRadius:20,border:`1px solid ${form.contractStart===v?C.gold:C.border}`,backgroundColor:form.contractStart===v?C.goldDim:"transparent",color:form.contractStart===v?C.gold:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>{l}</button>
              ))}
            </div>
            <input value={form.contractStart||""} onChange={e=>setStartDate(e.target.value)} placeholder="e.g. Jun 11, 2025" style={inp}/>
          </Card>
          {/* Contract Term */}
          <Card>
            <Label>Contract Length</Label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:10}}>
              {[{m:1,l:"1 Mo",sub:"Month-to-month"},{m:3,l:"3 Mo",sub:"Standard"},{m:6,l:"6 Mo",sub:"Best value"},{m:12,l:"1 Year",sub:"Premium"}].map(({m,l,sub})=>(
                <button key={m} onClick={()=>setTerm(m)} style={{padding:"9px 4px",borderRadius:10,textAlign:"center",border:`2px solid ${termMonths===m?C.gold:C.border}`,backgroundColor:termMonths===m?C.goldDim:"rgba(255,255,255,0.02)",cursor:"pointer"}}>
                  <div style={{fontSize:12,fontWeight:700,color:termMonths===m?C.gold:C.textDim}}>{l}</div>
                  <div style={{fontSize:9,color:C.textMuted,marginTop:2}}>{sub}</div>
                </button>
              ))}
            </div>
            <div style={{padding:"10px 12px",borderRadius:9,backgroundColor:validDates?"rgba(34,211,160,0.06)":"rgba(248,113,113,0.06)",border:`1px solid ${validDates?"rgba(34,211,160,0.2)":"rgba(248,113,113,0.2)"}`,marginBottom:8}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:validDates?C.green:C.red,marginBottom:3}}>{validDates?"Contract End Date":"⚠ End date before start date"}</div>
              <div style={{fontSize:15,fontWeight:700,color:validDates?C.text:C.red}}>{form.contractEnd||"—"}</div>
              {validDates&&<div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{termDays} days · {monthsLabel(termMonths)}</div>}
            </div>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:4}}>Override End Date</div>
            <input value={form.contractEnd||""} onChange={e=>set("contractEnd",e.target.value)} placeholder="e.g. Sep 11, 2025" style={{...inp,fontSize:12}}/>
          </Card>
          {/* Ad Budget */}
          <Card>
            <Label>Monthly Ad Budget</Label>
            <div style={{display:"flex",gap:6,marginBottom:9,flexWrap:"wrap"}}>
              {["$500/mo","$1,000/mo","$1,500/mo","$2,500/mo","$5,000/mo"].map(v=>(
                <button key={v} onClick={()=>set("adBudget",v)} style={{padding:"5px 10px",fontSize:10,fontWeight:700,borderRadius:20,border:`1px solid ${form.adBudget===v?C.gold:C.border}`,backgroundColor:form.adBudget===v?C.goldDim:"transparent",color:form.adBudget===v?C.gold:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>{v}</button>
              ))}
            </div>
            <input value={form.adBudget||""} onChange={e=>set("adBudget",e.target.value)} placeholder="e.g. $2,500/mo" style={inp}/>
          </Card>
          {/* Platforms */}
          <Card><Label>Platforms Running</Label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{PLATFORMS.map(p=><button key={p} onClick={()=>togglePlat(p)} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${form.platforms.includes(p)?"rgba(59,130,246,.4)":C.border}`,backgroundColor:form.platforms.includes(p)?"rgba(59,130,246,.12)":"rgba(255,255,255,.03)",color:form.platforms.includes(p)?"#60A5FA":C.textMuted,cursor:"pointer"}}>{p}</button>)}</div></Card>
          {/* Notes */}
          <div><div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:4}}>Internal Notes</div><textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} rows={3} placeholder="Context, special requests, things to watch for…" style={{...inp,resize:"vertical",lineHeight:1.6}}/></div>
          {/* Summary */}
          {selPkg&&<Card style={{backgroundColor:`${C.gold}08`,borderColor:`${C.gold}22`}}>
            <Label>Summary — Review Before Adding</Label>
            <div style={{fontSize:12,color:C.textDim,lineHeight:2.1}}>
              <div><strong style={{color:C.text}}>Client:</strong> {form.name}</div>
              <div><strong style={{color:C.text}}>Niche:</strong> {form.niche||"—"}</div>
              <div><strong style={{color:C.text}}>Package:</strong> {selPkg.name} — ${selPkg.price}/mo + ${selPkg.setup} setup</div>
              <div><strong style={{color:C.text}}>Platform:</strong> {selPkg.platform}</div>
              <div><strong style={{color:C.text}}>Contract:</strong> {form.contractStart||"—"} → {form.contractEnd||"—"} ({monthsLabel(termMonths)})</div>
              {form.adBudget&&<div><strong style={{color:C.text}}>Ad Budget:</strong> {form.adBudget}</div>}
              {form.niche&&PER_LEAD[form.niche]&&<div><strong style={{color:C.text}}>Per-lead fee:</strong> ${PER_LEAD[form.niche]}/lead</div>}
            </div>
          </Card>}
        </>}
      </div>
      <div style={{padding:"11px 14px 24px",borderTop:`1px solid ${C.border}`,flexShrink:0,display:"flex",gap:8}}>
        {step===1?<>
          <button onClick={onClose} style={{flex:1,padding:10,fontSize:13,fontWeight:600,borderRadius:10,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>setStep(2)} disabled={!form.name||!form.email||!form.packageId} style={{flex:2,padding:10,fontSize:13,fontWeight:700,borderRadius:10,border:"none",backgroundColor:(!form.name||!form.email||!form.packageId)?"rgba(255,255,255,.05)":"#1D4ED8",color:(!form.name||!form.email||!form.packageId)?C.textMuted:"#fff",cursor:"pointer"}}>Next →</button>
        </>:<>
          <button onClick={()=>setStep(1)} style={{flex:1,padding:10,fontSize:13,fontWeight:600,borderRadius:10,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>← Back</button>
          <button onClick={handleSave} disabled={!canSave} style={{flex:2,padding:10,fontSize:13,fontWeight:700,borderRadius:10,border:"none",backgroundColor:saved?"#059669":canSave?"#1D4ED8":"rgba(255,255,255,.05)",color:saved||canSave?"#fff":C.textMuted,cursor:"pointer",transition:"background .2s"}}>{saved?"✓ Client Added":"Add Client"}</button>
        </>}
      </div>
    </Sheet>
  );
}

// ─── NOTIFICATIONS PANEL ─────────────────────────────────────────────────────
function NotificationsPanel({clients,onUpdate,onClose,onNavigate}) {
  const upgradeClients = clients.filter(c=>c.upgradeRequest);
  const expiringClients= clients.filter(c=>{ const d=daysUntil(c.contractEnd); return d>=0&&d<=30; });
  const urgentClients  = clients.filter(c=>{ const d=daysUntil(c.contractEnd); return d>=0&&d<=7; });
  const [confirming,setConfirming]=useState(null);
  const [declining,setDeclining]=useState(null);
  const [done,setDone]=useState({});

  const goTo = (cl, tab) => {
    onNavigate(cl, tab);
    onClose();
  };

  const confirmUpgrade=(cl)=>{
    const newPkg=ALL_PKGS.find(p=>cl.upgradeRequest && cl.upgradeRequest.includes(p.name))||findPkg(cl.packageId);
    const bots=buildBots(newPkg);
    const botStatuses=Object.fromEntries(bots.map(b=>[b.id,"waiting"]));
    botStatuses["intake"]="done";botStatuses["ceo"]="done";
    onUpdate({...cl,packageId:newPkg.id,upgradeRequest:null,botStatuses,
      alerts:[...(cl.alerts||[]).filter(a=>a.type!=="upgrade"),
        {type:"upgrade_done",msg:`Upgraded to ${newPkg.name} — send invoice to ${cl.email}`,severity:"blue"}]
    });
    setDone(p=>({...p,[cl.id]:true}));
    setTimeout(()=>setConfirming(null),1000);
  };

  const totalCount = upgradeClients.length + urgentClients.length + expiringClients.filter(c=>daysUntil(c.contractEnd)>7).length;

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:80,backgroundColor:"rgba(0,0,0,.82)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:640,height:"88vh",backgroundColor:C.bg2,borderRadius:"20px 20px 0 0",border:`1px solid ${C.border}`,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${C.border}`,flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,color:C.text}}>Notifications</div>
            <div style={{fontSize:11,color:C.textMuted}}>{totalCount===0?"All clear — nothing needs attention":`${totalCount} item${totalCount!==1?"s":""} need your attention`}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.textMuted,fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"14px 14px 40px"}}>

          {/* Upgrade Requests */}
          {upgradeClients.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.purple,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:6,height:6,borderRadius:"50%",backgroundColor:C.purple,display:"inline-block"}}/>
                Upgrade Requests
              </div>
              {upgradeClients.map(cl=>(
                <div key={cl.id} style={{backgroundColor:C.bg3,border:`1px solid ${C.purple}33`,borderRadius:11,padding:"13px 14px",marginBottom:8}}>
                  <div onClick={()=>goTo(cl,"package")} style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10,cursor:"pointer"}}>
                    <div style={{width:36,height:36,borderRadius:9,backgroundColor:`${C.gold}18`,border:`1px solid ${C.gold}2a`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:C.gold,flexShrink:0}}>{cl.name[0]}</div>
                    <div style={S.f1min}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div>
                      <div style={{fontSize:11,color:C.purple,marginTop:1}}>Requested: {cl.upgradeRequest}</div>
                      <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>Current: {(findPkg(cl.packageId) && findPkg(cl.packageId).name)} · ${(findPkg(cl.packageId) && findPkg(cl.packageId).price)}/mo</div>
                    </div>
                    <IconChevron size={14} color={C.purple}/>
                  </div>
                  {done[cl.id]?(
                    <div style={{padding:"9px 12px",borderRadius:9,backgroundColor:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.25)",fontSize:12,fontWeight:700,color:C.green,textAlign:"center"}}>
                      ✓ Upgrade confirmed — send invoice to {cl.email}
                    </div>
                  ):confirming===cl.id?(
                    <div>
                      <div style={{fontSize:11,color:C.textDim,marginBottom:8,lineHeight:1.6}}>Confirming this upgrade will apply the new package immediately. Send the updated invoice separately before or after confirming.</div>
                      <div style={S.row7}>
                        <button onClick={()=>setConfirming(null)} style={{flex:1,padding:"9px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
                        <button onClick={()=>confirmUpgrade(cl)} style={{flex:2,padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:C.purple,color:"#fff",cursor:"pointer"}}>Confirm Upgrade ✓</button>
                      </div>
                    </div>
                  ):(
                    declining===cl.id?(
                      <div style={{padding:"10px 12px",borderRadius:9,backgroundColor:"rgba(248,113,113,0.06)",border:`1px solid ${C.red}33`}}>
                        <div style={{fontSize:11,color:C.textDim,marginBottom:8,lineHeight:1.6}}>Decline this upgrade request? The client will need to submit a new request if they still want to upgrade.</div>
                        <div style={{display:"flex",gap:7}}>
                          <button onClick={()=>setDeclining(null)} style={{flex:1,padding:"7px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
                          <button onClick={()=>{ onUpdate({...cl,upgradeRequest:null}); setDeclining(null); }} style={{flex:1,padding:"7px",fontSize:11,fontWeight:700,borderRadius:8,border:"none",backgroundColor:"rgba(248,113,113,0.15)",color:C.red,cursor:"pointer"}}>Yes, Decline</button>
                        </div>
                      </div>
                    ):(
                    <div style={S.row7}>
                      <button onClick={()=>setDeclining(cl.id)} style={{flex:1,padding:"8px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Decline</button>
                      <button onClick={()=>setConfirming(cl.id)} style={{flex:2,padding:"8px",fontSize:12,fontWeight:700,borderRadius:9,border:`1px solid ${C.purple}44`,backgroundColor:`${C.purple}22`,color:C.purple,cursor:"pointer"}}>Review and Confirm →</button>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}

          {/* Urgent contract alerts (≤7 days) */}
          {urgentClients.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.red,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:6,height:6,borderRadius:"50%",backgroundColor:C.red,display:"inline-block"}}/>
                Urgent — Contract Expiring
              </div>
              {urgentClients.map(cl=>{
                const d=daysUntil(cl.contractEnd);
                return (
                  <div key={cl.id} onClick={()=>goTo(cl,"contract")} style={{backgroundColor:C.bg3,border:`1px solid ${C.red}33`,borderRadius:11,padding:"13px 14px",marginBottom:8,cursor:"pointer"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{width:34,height:34,borderRadius:9,backgroundColor:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⚠</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div>
                        <div style={{fontSize:11,color:C.red,marginTop:1}}>Contract expires in {d} day{d!==1?"s":""}. Tap to renew.</div>
                        <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{cl.email} · {(findPkg(cl.packageId) && findPkg(cl.packageId).name)}</div>
                      </div>
                      <IconChevron size={14} color={C.red}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* 30-day contract alerts */}
          {expiringClients.filter(c=>daysUntil(c.contractEnd)>7).length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.amber,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:6,height:6,borderRadius:"50%",backgroundColor:C.amber,display:"inline-block"}}/>
                Contract Renewals Coming Up
              </div>
              {expiringClients.filter(c=>daysUntil(c.contractEnd)>7).map(cl=>{
                const d=daysUntil(cl.contractEnd);
                return (
                  <div key={cl.id} onClick={()=>goTo(cl,"contract")} style={{backgroundColor:C.bg3,border:`1px solid ${C.amber}33`,borderRadius:11,padding:"13px 14px",marginBottom:8,cursor:"pointer"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{width:34,height:34,borderRadius:9,backgroundColor:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>↻</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div>
                        <div style={{fontSize:11,color:C.amber,marginTop:1}}>Expires in {d} days. Tap to open contract.</div>
                        <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{cl.email} · ${(findPkg(cl.packageId) && findPkg(cl.packageId).price)}/mo</div>
                      </div>
                      <IconChevron size={14} color={C.amber}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Intake alerts */}
          {clients.filter(c=>!c.intakeComplete&&c.stage==="onboarding").length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.blue,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:6,height:6,borderRadius:"50%",backgroundColor:C.blue,display:"inline-block"}}/>
                Intake Forms Pending
              </div>
              {clients.filter(c=>!c.intakeComplete&&c.stage==="onboarding").map(cl=>(
                <div key={cl.id} style={{backgroundColor:C.bg3,border:`1px solid ${C.blue}33`,borderRadius:11,padding:"13px 14px",marginBottom:8}}>
                  <div onClick={()=>goTo(cl,"portal")} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:10}}>
                    <span style={{width:34,height:34,borderRadius:9,backgroundColor:"rgba(79,142,247,0.1)",border:"1px solid rgba(79,142,247,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>📋</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div>
                      <div style={{fontSize:11,color:C.blue,marginTop:1}}>Intake form not yet completed. Tap to open.</div>
                      <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{cl.email}</div>
                    </div>
                    <IconChevron size={14} color={C.blue}/>
                  </div>
                  <button onClick={()=>navigator.clipboard.writeText(`https://portal.boldlinemedia.com/client?id=${cl.id}&email=${encodeURIComponent(cl.email)}`)} style={{width:"100%",padding:"7px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,0.04)",color:C.textDim,cursor:"pointer"}}>Copy Portal Link</button>
                </div>
              ))}
            </div>
          )}

          {totalCount===0&&(
            <div style={{textAlign:"center",padding:"60px 20px",color:C.textMuted}}>
              <div style={{fontSize:40,marginBottom:14}}>✓</div>
              <div style={{fontSize:15,fontWeight:700,color:C.textDim,marginBottom:6}}>All clear</div>
              <div style={{fontSize:13,lineHeight:1.7}}>No upgrade requests, no expiring contracts, no pending intake forms. Everything is running smoothly.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
