// ─── ALL POSSIBLE FEATURES (master list for comparison view) ─────────────────
// ─── useLiveData ── keeps any view fresh with NO full-page refresh ───────────
// One primitive behind every live surface in the OS. It re-runs `load` on three
// independent triggers so a change anywhere shows up on its own:
//   1. Supabase realtime  — instant, when `table` is in the supabase_realtime
//      publication (Database → Replication). Omit `table` for function-backed
//      data (e.g. blog posts) that the browser can't read directly.
//   2. Interval poll       — the guaranteed fallback if realtime is off/lagging.
//   3. Tab focus + visibility — an immediate catch-up when you return to the tab.
// `active` gates the whole thing (e.g. wait until auth/data is ready).
function useLiveData(load, { table, interval = 15000, active = true, channel } = {}) {
  useEffect(() => {
    if (!active) return;
    let ch = null;
    if (table) {
      ch = supabaseClient.channel(channel || (table + "-live"))
        .on("postgres_changes", { event: "*", schema: "public", table }, () => load())
        .subscribe();
    }
    const poll = setInterval(load, interval);
    const onVisible = () => { if (document.visibilityState === "visible") load(); };
    document.addEventListener("visibilitychange", onVisible);
    window.addEventListener("focus", load);
    return () => {
      if (ch) supabaseClient.removeChannel(ch);
      clearInterval(poll);
      document.removeEventListener("visibilitychange", onVisible);
      window.removeEventListener("focus", load);
    };
  }, [load, table, interval, active, channel]);
}

// ─── gadsCall ── owner-authed call to the google-ads function ─────────────────
// Shared by ARIA's live-campaign reads and the approve→execute path. Throws with
// the function's stage-tagged message on any failure.
async function gadsCall(payload) {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const token = session && session.access_token;
  if (!token) throw new Error("Session expired — refresh the page and log in again.");
  const r = await fetch("/.netlify/functions/google-ads", {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: "Bearer " + token },
    body: JSON.stringify(payload),
  });
  const d = await r.json().catch(() => ({}));
  if (!r.ok || !d.ok) throw new Error((d.stage ? d.stage + " — " : "") + (d.error || "Google Ads request failed"));
  return d;
}

// ─── metaCall ── owner-authed call to the meta-ads function (Meta counterpart) ─

// Add exactly N calendar months — preserves the day-of-month correctly.
// e.g. Jan 31 + 1 month = Feb 28/29 (not Mar 2/3 like *30 days gives)
const addMonths = (date, n) => {
  const d = new Date(date);
  const day = d.getDate();
  d.setMonth(d.getMonth() + n);
  // If day overflowed (e.g. Jan 31 + 1 month → Mar 3), roll back to last day of intended month
  if (d.getDate() !== day) d.setDate(0);
  return d;
};

// ═══════════════════════════════════════════════════════════════════════════════
// TERM-BASED RENEWAL PRICING — Bryson's dials. Edit ONLY the two lines below.
// ───────────────────────────────────────────────────────────────────────────────
// New clients always start on a 3-month term at the standard package rate. At
// RENEWAL the client picks a length: month-to-month carries a small flexibility
// premium, longer commitments earn a discount. Rates are a fraction applied to
// the package's standard monthly (the 3-month rate is the anchor = 0%).
// Charges the management fee only — never ad spend (see business constraint).
//
//  • TERM_PRICING_ENABLED = false  → turns the whole thing OFF: every renewal
//    length bills the plain standard rate (no premium, no discount). This is the
//    "put the rates back to normal" switch — flip it and redeploy, nothing else
//    changes and no future feature is affected.
//  • TERM_RATE  → the percentages, as decimals (0.10 = +10%, -0.10 = -10%). Change
//    any of them any time. Keys are the term lengths in months.
const TERM_PRICING_ENABLED = true;
const TERM_RATE = { 1:0.10, 3:0, 6:-0.05, 12:-0.10 };
// ═══════════════════════════════════════════════════════════════════════════════
const termRate    = (months) => (TERM_PRICING_ENABLED ? (TERM_RATE[months] || 0) : 0);
const termMonthly = (base, months) => Math.round((Number(base)||0) * (1 + termRate(months)));
// e.g. "+10%", "−10%", or "Standard rate"
const termRateLabel = (months) => {
  const r = termRate(months);
  if (r > 0) return `+${Math.round(r*100)}%`;
  if (r < 0) return `−${Math.round(-r*100)}%`;
  return "Standard rate";
};

    else if (d<=30&&d>=0) a.push({type:"contract_30",msg:`Contract expires in ${d} days. Start renewal conversation.`,severity:"yellow"});

  // ── Billing enforcement (Agreement §3.4) — fed by Stripe webhook + the daily billing-watch job
  if (cl.billingStatus==="past_due") {
    const late = cl.billingLate||{};

    if (late.interest>0) a.push({type:"billing_interest",msg:`Payment ${days} days late${amt} — $${Number(late.interest).toLocaleString()} late interest accruing at 1.5%/mo, auto-added to their next invoice.`,severity:"red"});

// ─── AUTO HEALTH SCORE ────────────────────────────────────────────────────────
const calcHealth = (cl) => {
  let score = 0;
  const pkg = findPkg(cl.packageId);
  const days = daysUntil(cl.contractEnd);

  // ── Foundation (max 2 pts) ─────────────────────────────────────────────────
  if (cl.contractSigned)  score += 1;   // signed = relationship is real
  if (cl.intakeComplete)  score += 1;   // intake = we can actually do the work

  // ── Campaign stage (max 2 pts) ─────────────────────────────────────────────
  const stageScore = {
    onboarding:0, research:0.5, building:1, review:1.5,
    active:2, optimizing:2, scaling:2, paused:0.5,
  };
  score += stageScore[cl.stage]||0;

  // ── Lead performance (max 2 pts) ──────────────────────────────────────────
  if (cl.leads>0)  score += 0.5;   // at least something coming in
  if (cl.leads>10) score += 0.5;   // meaningful volume
  if (cl.leads>30) score += 0.5;   // strong volume
  if (cl.leads>0 && cl.cpl>0) {
    const niche = cl.niche;
    const target = PER_LEAD[niche]||50; // use per-lead fee as CPL benchmark
    if (cl.cpl <= target * 0.75) score += 0.5;       // beating target by 25%+
    else if (cl.cpl <= target)   score += 0.25;      // at or near target
  }

  // ── Contract health (max 2 pts) ───────────────────────────────────────────
  if (cl.contractStatus==="active") score += 1;
  if (days>30)  score += 1;         // plenty of runway
  else if (days>7) score += 0.5;    // getting close

  // ── Bot pipeline progress (max 1 pt) ──────────────────────────────────────
  const statuses = Object.values(cl.botStatuses||{});
  const done = statuses.filter(s=>s==="done").length;
  const total = statuses.length||1;
  score += (done/total) * 1;

  // ── Deductions ────────────────────────────────────────────────────────────
  if (cl.upgradeRequest) score -= 0;  // upgrade request is positive signal, no penalty
  if (!cl.intakeComplete && cl.stage!=="onboarding") score -= 0.5; // overdue intake
  if (cl.contractStatus==="expired") score -= 1;

  return Math.max(1, Math.min(10, Math.round(score * 10) / 10));
};

// ─── AI HOOK ─────────────────────────────────────────────────────────────────
function useAI(system, opts) {
  const enableTools = !!(opts && opts.enableTools);
  const [messages,setMessages]         = useState([]);
  const [loading,setLoading]           = useState(false);
  const [pendingAction,setPendingAction] = useState(null); // {id,name,input}
  const historyRef = useRef([]);

  const extractText = (blocks) => blocks.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();

  const call = async (override) => {
    setLoading(true);
    try {
      const r = await fetch("/.netlify/functions/aria",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:override||system,messages:historyRef.current,enableTools})});
      const d = await r.json();
      if (!d.content) { setMessages(m=>[...m,{role:"assistant",content:"No response."}]); setLoading(false); return; }
      historyRef.current = [...historyRef.current,{role:"assistant",content:d.content}];
      const toolUse = d.content.find(b=>b.type==="tool_use");
      const text = extractText(d.content);
      setMessages(m=>[...m,{role:"assistant",content:text||(toolUse?`I'd like to ${toolUse.name.replace(/_/g," ")}: ${JSON.stringify(toolUse.input)}. Confirm below.`:"No response.")}]);
      setPendingAction(toolUse?{id:toolUse.id,name:toolUse.name,input:toolUse.input}:null);
    } catch { setMessages(m=>[...m,{role:"assistant",content:"Connection error — try again."}]); }
    setLoading(false);
  };

  const send = (text, override) => {
    historyRef.current = [...historyRef.current, {role:"user",content:text}];
    setMessages(m=>[...m,{role:"user",content:text}]);
    call(override);
  };

  const confirmAction = (resultText, override) => {
    if (!pendingAction) return;
    historyRef.current = [...historyRef.current, {role:"user",content:[{type:"tool_result",tool_use_id:pendingAction.id,content:resultText}]}];
    setPendingAction(null);
    call(override);
  };

  const cancelAction = (override) => confirmAction("The user declined this action. Do not repeat it.", override);

  const reset = (intro) => { historyRef.current=[]; setPendingAction(null); setMessages(intro?[{role:"assistant",content:intro}]:[]); };

  return {messages,loading,send,reset,pendingAction,confirmAction,cancelAction};
}

                      {pkg.tag&&<span style={{fontSize:9,fontWeight:700,padding:"2px 7px",backgroundColor:C.gold,color:"#0a0800",borderRadius:20,marginRight:7,display:"inline-block",marginBottom:4}}>{pkg.tag}</span>}
                      <div style={{fontSize:14,fontWeight:700,color:C.text}}>{pkg.name}</div>
                      <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{pkg.platform} · {pkg.adSpend}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
                      <div style={{fontSize:19,fontWeight:800,color:C.gold}}>${pkg.price}<span style={{fontSize:10,fontWeight:400,color:C.textMuted}}>/mo</span></div>
                      <div style={{fontSize:10,color:C.green,fontWeight:600}}>+${diff}/mo more</div>
                    </div>
                  </div>
                  {/* New features preview */}
                  {newFeatures.length>0&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {newFeatures.slice(0,4).map(f=>(
                        <span key={f.id} style={{fontSize:9,padding:"2px 8px",borderRadius:20,
                          backgroundColor:"rgba(34,211,160,0.08)",border:"1px solid rgba(34,211,160,0.2)",
                          color:C.green}}>+ {f.label}</span>
                      ))}
                      {newFeatures.length>4&&<span style={{fontSize:9,color:C.textMuted,padding:"2px 4px"}}>+{newFeatures.length-4} more</span>}
                    </div>
                  )}
                </button>
              );
            })}
          </>
        )}
      </div>
      {options.length>0&&(
        <div style={{padding:"12px 16px 24px",borderTop:`1px solid ${C.border}`,flexShrink:0}}>
          <button onClick={()=>{ if(selected) setStep("confirm"); }}
            disabled={!selected}
            style={{width:"100%",padding:"13px",fontSize:13,fontWeight:700,borderRadius:10,border:"none",
              backgroundColor:selected?"#C8A84B":"rgba(255,255,255,0.05)",
              color:selected?"#0a0800":C.textMuted,cursor:selected?"pointer":"not-allowed"}}>
            Review My Selection →
          </button>
          <div style={{fontSize:11,color:C.textMuted,textAlign:"center",marginTop:8}}>
            No changes until your account manager confirms.
          </div>
        </div>
      )}
    </Sheet>
  );
}

// ─── PACKAGE TAB — AGENCY VIEW (only what client has + manual upgrade) ─────────
function PackageTabContent({client,pkg,onUpgradeRequest,onManualUpgrade}) {
  const [selectedManualPkg,setSelectedManualPkg] = useState(null);
  const [upgradeApplied,setUpgradeApplied] = useState(false);
  const [applyConfirm,setApplyConfirm] = useState(false);
  const perLead = PER_LEAD[client.niche];

  const featureGroups = [
    { label:"Ads and Campaigns", ids:["search_ads","meta_ads","keyword_research","ad_variations","multi_campaign","google_shopping"] },
    { label:"Landing Page",      ids:["std_landing","custom_landing","split_testing","page_cro"] },
    { label:"Tracking and Tech", ids:["lead_form","pixel","call_tracking"] },
    { label:"Optimization",      ids:["monthly_opt","weekly_opt","competitor_research","advanced_targeting"] },
    { label:"Audiences",         ids:["retargeting","lookalike","abandoned_cart","cross_retargeting"] },
    { label:"CRM and Automation",ids:["crm_integration"] },
    { label:"Reporting",         ids:["monthly_report","advanced_reporting","unified_reporting"] },
    { label:"Strategy and Scale",ids:["full_funnel","ugc_consulting","crm_input","scaling_roadmap","strategy_calls","priority_comms","slack_access"] },
  ];

  const manualOptions = ALL_PKGS.filter(p=>p.id!==client.packageId).sort((a,b)=>a.price-b.price);

  const applyManualUpgrade = () => {
    if (!selectedManualPkg) return;
    onManualUpgrade(selectedManualPkg);
    setUpgradeApplied(true);
    setTimeout(()=>{ setUpgradeApplied(false); setSelectedManualPkg(null); },1800);
  };

  return (
    <div style={S.col12}>

      {/* Package header */}
      <Card style={{background:"linear-gradient(135deg,rgba(200,168,75,0.1),rgba(200,168,75,0.03))",borderColor:C.borderAccent}}>
        <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:C.gold,opacity:.7,marginBottom:6}}>Active Package</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={S.f1min}>
            <div style={{fontSize:19,fontWeight:800,color:C.text,letterSpacing:"-0.02em"}}>{(pkg && pkg.name)}</div>
            <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{(pkg && pkg.platform)} · {(pkg && pkg.adSpend)}</div>
            {(pkg && pkg.roas)&&<div style={{fontSize:11,color:C.green,fontWeight:600,marginTop:3}}>{pkg.roas}</div>}
          </div>
          <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
            <div style={{fontSize:24,fontWeight:900,color:C.gold,letterSpacing:"-0.02em"}}>${(pkg && pkg.price).toLocaleString()}<span style={{fontSize:11,fontWeight:400,color:C.textMuted}}>/mo</span></div>
            {perLead&&<div style={{fontSize:10,color:C.textDim,marginTop:2}}>+${perLead}/lead</div>}
            <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>${(pkg && pkg.setup).toLocaleString()} setup (one-time)</div>
          </div>
        </div>
        <div style={{marginTop:10,padding:"6px 9px",borderRadius:8,backgroundColor:"rgba(0,0,0,0.3)",
          fontSize:10,color:C.textMuted,display:"flex",alignItems:"center",gap:5}}>
          <span style={{width:5,height:5,borderRadius:"50%",backgroundColor:C.green,display:"inline-block",flexShrink:0,boxShadow:`0 0 4px ${C.green}`}}/>
          {(pkg && pkg.optimizationFreq)==="weekly"?"Weekly":"Monthly"} optimization · {(PKG_FEATURES[(pkg && pkg.id)]||[]).length} features included
        </div>
      </Card>

      {/* Upgrade request pending — agency alert */}
      {client.upgradeRequest&&(
        <Card style={{backgroundColor:"rgba(139,92,246,0.06)",borderColor:`${C.purple}33`}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <span style={{width:7,height:7,borderRadius:"50%",backgroundColor:C.purple,display:"inline-block",flexShrink:0}}/>
            <div style={{fontSize:12,fontWeight:700,color:C.purple}}>Client Requested Upgrade</div>
          </div>
          <div style={{fontSize:11,color:C.textDim,lineHeight:1.6,marginBottom:6}}>{client.upgradeRequest}</div>
          <div style={{fontSize:10,color:C.textMuted}}>Go to Alerts tab to review and confirm.</div>
        </Card>
      )}

      {/* What the client has — only included features, no grey-outs */}
      <Card>
        <Label>Included Features — {client.name}</Label>
        {featureGroups.map(group=>{
          const included = group.ids.filter(fid=>pkgHasFeature(client.packageId,fid));
          if (included.length===0) return null;
          return (
            <div key={group.label} style={{marginBottom:14}}>
              <div style={{fontSize:9,fontWeight:700,color:C.textMuted,textTransform:"uppercase",
                letterSpacing:".07em",marginBottom:7,paddingBottom:4,
                borderBottom:`1px solid ${C.border2}`}}>{group.label}</div>
              {included.map(fid=>{
                const feat = ALL_FEATURES.find(f=>f.id===fid);
                if (!feat) return null;
                return (
                  <div key={fid} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",
                    borderBottom:`1px solid rgba(255,255,255,0.03)`}}>
                    <span style={{width:18,height:18,borderRadius:5,
                      backgroundColor:"rgba(34,211,160,0.1)",
                      border:"1px solid rgba(34,211,160,0.25)",
                      display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <IconCheck size={10} color={C.green}/>
                    </span>
                    <span style={{fontSize:12,color:C.textDim,flex:1,lineHeight:1.4}}>{feat.label}</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </Card>

      {/* Manual upgrade — agency only */}
      <Card style={{borderColor:`${C.purple}22`,backgroundColor:`${C.purple}05`}}>
        <Label>Manual Package Change</Label>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:10,lineHeight:1.6}}>
          Switch this client to any package immediately. Send the updated invoice separately after confirming.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
          {manualOptions.map(p=>(
            <button key={p.id} onClick={()=>setSelectedManualPkg(p.id)}
              style={{padding:"10px 12px",borderRadius:10,
                border:`1px solid ${selectedManualPkg===p.id?C.purple:C.border}`,
                backgroundColor:selectedManualPkg===p.id?`${C.purple}12`:"rgba(255,255,255,0.02)",
                cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:C.text}}>{p.name}</div>
                <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{p.platform}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:C.gold}}>${p.price}/mo</div>
                <div style={{fontSize:9,color:C.textMuted}}>${p.setup.toLocaleString()} setup</div>
              </div>
            </button>
          ))}
        </div>
        {applyConfirm?(
          <div style={{padding:"12px",borderRadius:10,backgroundColor:`${C.purple}08`,border:`1px solid ${C.purple}33`}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:4}}>Confirm Package Change</div>
            <div style={{fontSize:11,color:C.textDim,marginBottom:4}}>
              {client.name}: <span style={{color:C.textMuted}}>{(pkg && pkg.name)}</span> → <span style={{color:C.gold,fontWeight:700}}>{(findPkg(selectedManualPkg) && findPkg(selectedManualPkg).name)}</span>
            </div>
            <div style={{fontSize:10,color:C.textMuted,marginBottom:10}}>New rate: ${(findPkg(selectedManualPkg) && findPkg(selectedManualPkg).price)}/mo · ${(findPkg(selectedManualPkg) && findPkg(selectedManualPkg).setup)} setup. Send updated invoice separately.</div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>setApplyConfirm(false)} style={{flex:1,padding:"8px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>{ applyManualUpgrade(); setApplyConfirm(false); }} style={{flex:2,padding:"8px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:C.purple,color:"#fff",cursor:"pointer"}}>Confirm Change</button>
            </div>
          </div>
        ):(
          <button onClick={()=>{ if(selectedManualPkg) setApplyConfirm(true); }}
            disabled={!selectedManualPkg}
            style={{width:"100%",padding:"11px",fontSize:12,fontWeight:700,borderRadius:10,
              backgroundColor:upgradeApplied?"rgba(34,211,160,0.15)":selectedManualPkg?C.purple:"rgba(255,255,255,0.04)",
              color:upgradeApplied?C.green:selectedManualPkg?"#fff":C.textMuted,
              cursor:selectedManualPkg?"pointer":"not-allowed",transition:"all 0.2s",
              border:upgradeApplied?`1px solid ${C.green}33`:"none"}}>
            {upgradeApplied?"✓ Package Changed — Send Invoice":"Apply Package Change"}
          </button>
        )}
      </Card>
    </div>
  );
}
// ─── CONTRACT HTML ────────────────────────────────────────────────────────────
// ─── SERVICE AGREEMENT (per-package, data-driven) ─────────────────────────────
// Full advertising-services agreement. Every commercial number (fees, term,
// per-lead fee, ROAS bonus, features) comes from the client + package data, so
// one template serves every package. AZ-governed, works for out-of-state and
// international clients. DRAFT FOR ATTORNEY REVIEW — have an Arizona lawyer
// approve before the first real signature. Keep the /BL_SIGN_HERE/ anchor:
// docusign-send places the signature field on it.
const makeContractHTML=(cl,pkg)=>{
  const esc=(s)=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const money=(n)=>"$"+Number(n||0).toLocaleString();
  const pl=PER_LEAD[cl.niche];
  const feats=(PKG_FEATURES[cl.packageId]||[]).map(fid=>{const f=ALL_FEATURES.find(x=>x.id===fid);return f?'<li>'+f.label+'</li>':''}).join('');
  // Effective monthly = the agreed rate (term-priced at renewal) when set, else the standard package rate.
  const effMonthly = cl.billingMonthly || (pkg&&pkg.price) || 0;
  const stdMonthly = (pkg&&pkg.price) || effMonthly;      // the Standard (3-month) Rate
  // Setup fee honors a manual adjustment (billingSetup), including an explicit $0 waiver.
  const setupFee   = (cl.billingSetup!=null?cl.billingSetup:(pkg&&pkg.setup))||0;
  const termMo     = cl.contractTermMonths || 3;
  const clientName = esc(cl.name), signerName = esc(cl.contactName||"Authorized Signatory");
  const agreementNo= esc(String(cl.id||"").slice(-8).toUpperCase() || "—");
  // Section numbering: 1 Services, 2 Term, 3 Fees are fixed; Per-Lead (if any) and
  // Performance Bonus (if any) slot in after 3; everything later shifts accordingly.
  const hasBonus = !!(pkg&&pkg.roas);
  const nBase = 3 + (pl?1:0) + (hasBonus?1:0);
  const nAd=nBase+1, nResp=nBase+2, nNoG=nBase+3, nTerm=nBase+4, nIP=nBase+5, nConf=nBase+6,
        nData=nBase+7, nLiab=nBase+8, nInd=nBase+9, nRel=nBase+10, nLaw=nBase+11, nGen=nBase+12;

  const metaItem=(l,v)=>'<div class="meta-item"><div class="meta-label">'+l+'</div><div class="meta-value">'+v+'</div></div>';
  const meta =
    metaItem("Service Package",(pkg&&pkg.name)||"—")
   +metaItem("Advertising Platform",(pkg&&pkg.platform)||"—")
   +metaItem("Monthly Management Fee",money(effMonthly)+"/mo")
   +metaItem("One-Time Setup Fee",setupFee>0?money(setupFee):"Waived")
   +metaItem("Committed Term",monthsLabel(termMo))
   +metaItem("Start Date",esc(cl.contractStart)||"—")
   +metaItem("End Date",esc(cl.contractEnd)||"—")
   +metaItem("Optimization Cadence",((pkg&&pkg.optimizationFreq)==="weekly"?"Weekly":"Monthly"))
   +(pl?metaItem("Per-Qualified-Lead Fee",money(pl)+" per lead"):"")
   +(pkg&&pkg.roas?metaItem("Performance Bonus",esc(pkg.roas)):"")
   +(cl.adBudget?metaItem("Client Ad Budget (paid to platforms)",esc(cl.adBudget)):(pkg&&pkg.adSpend?metaItem("Recommended Ad Budget (paid to platforms)",esc(pkg.adSpend)):""));

  const perLeadSection = pl ? (
    '<h2>4. Per-Lead Fees</h2>'
   +'<p>4.1 In addition to the Management Fee, Client shall pay the Per-Qualified-Lead Fee stated above for each Qualified Lead generated by the Campaigns. A <strong>&ldquo;Qualified Lead&rdquo;</strong> means a prospective customer who, as a result of the Campaigns, (a) submits a lead form, (b) places a tracked telephone call lasting thirty (30) seconds or longer, or (c) initiates a text or chat conversation. Duplicate submissions from the same person within thirty (30) days, spam, bot traffic, and solicitation inquiries are not Qualified Leads.</p>'
   +'<p>4.2 Per-lead fees are calculated from campaign tracking data and invoiced monthly in arrears. If Client believes a lead was incorrectly counted, Client must notify Agency in writing within ten (10) days of the invoice date; Agency will review in good faith and credit any lead it reasonably determines was not a Qualified Lead. Invoices not disputed within that period are deemed accepted. <strong>Per-lead fees compensate lead generation only; Agency does not warrant that any lead will become a paying customer, and no fee is refundable because a lead did not convert.</strong></p>'
  ) : '';
  const bonusSection = (pkg&&pkg.roas) ? (
    '<h2>'+(pl?'5':'4')+'. Performance Bonus</h2>'
   +'<p>Where the Key Terms state a Performance Bonus, Client shall pay Agency the stated bonus for each calendar month in which the Campaigns achieve the stated return-on-ad-spend (ROAS) threshold, as measured by the advertising platform&rsquo;s reported conversion value divided by ad spend for that month. The bonus is invoiced with the following month&rsquo;s Management Fee. Platform-reported attribution is the definitive measurement for this purpose.</p>'
  ) : '';
  // Section numbers after the conditional ones stay fixed by rendering both slots
  // (empty string when absent) and numbering the rest from 6 onward.
  const css='body{font-family:Georgia,"Times New Roman",serif;font-size:12.5px;line-height:1.75;color:#191919;background:#fff;padding:34px 38px;max-width:100%;word-break:break-word}'
   +'.hd{display:flex;align-items:center;gap:14px;border-bottom:3px solid #C8A84B;padding-bottom:14px;margin-bottom:6px}'
   +'.hd img{width:52px;height:52px;object-fit:contain}'
   +'.hd .co{font-size:21px;font-weight:700;letter-spacing:.04em;color:#111}.hd .co span{color:#8B6914}'
   +'.hd .tag{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#8B6914;margin-top:2px}'
   +'.docmeta{display:flex;justify-content:space-between;font-size:10px;color:#666;margin:8px 0 18px}'
   +'h1{font-size:17px;text-align:center;margin:6px 0 2px;letter-spacing:.02em}'
   +'.sub{text-align:center;font-size:11px;color:#666;margin-bottom:16px}'
   +'h2{font-size:12.5px;margin:20px 0 6px;color:#8B6914;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e5e0d0;padding-bottom:4px;page-break-after:avoid}'
   +'.parties{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;padding:12px;background:#f9f8f4;border:1px solid #e5e0d0;border-radius:4px}'
   +'.pl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8B6914;margin-bottom:4px}'
   +'.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}'
   +'.meta-item{padding:8px 10px;background:#f9f8f4;border:1px solid #e5e0d0;border-radius:4px}'
   +'.meta-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#8B6914}'
   +'.meta-value{font-size:12.5px;font-weight:700;color:#1a1a1a}'
   +'ul{padding-left:18px;margin:6px 0;columns:2;column-gap:24px}li{margin-bottom:4px;font-size:11.5px;break-inside:avoid}'
   +'p{margin-bottom:9px;font-size:11.5px;text-align:justify}'
   +'.caps{font-weight:700}'
   +'.callout{padding:10px 12px;background:#faf6ea;border:1px solid #d9c98f;border-radius:4px;margin:8px 0;font-size:11.5px}'
   +'.sigs{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px;page-break-inside:avoid}'
   +'.sig-box{padding:12px;border:1px solid #e5e0d0;border-radius:4px}'
   +'.sig-line{border-bottom:1px solid #1a1a1a;margin:26px 0 4px}'
   +'.ft{margin-top:22px;padding-top:10px;border-top:1px solid #e5e0d0;font-size:9px;color:#999;text-align:center}'
   +'@media print{body{padding:18px 22px}}';

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>'+css+'</style></head><body>'
   +'<div class="hd"><img src="'+LOGO+'" alt="BoldLine Media"><div><div class="co">BOLDLINE <span>MEDIA</span></div><div class="tag">Paid Advertising Management</div></div></div>'
   +'<div class="docmeta"><span>Agreement No. BLM-'+agreementNo+'</span><span>Effective Date: '+(esc(cl.contractStart)||'the date of last signature')+'</span></div>'
   +'<h1>Advertising Services Agreement</h1>'
   +'<p class="sub">This Advertising Services Agreement (the &ldquo;Agreement&rdquo;) is entered into between the parties below and governs the services described herein.</p>'

   +'<h2>Parties</h2><div class="parties">'
   +'<div><div class="pl">Agency</div><strong>BoldLine Media LLC</strong><br>an Arizona limited liability company<br>Bryson Weiser, Owner<br>brysonaweiser@gmail.com<br>(&ldquo;Agency&rdquo;)</div>'
   +'<div><div class="pl">Client</div><strong>'+clientName+'</strong><br>'+signerName+'<br>'+esc(cl.email)+'<br>'+esc(cl.businessAddress)+'<br>(&ldquo;Client&rdquo;)</div></div>'

   +'<h2>Key Commercial Terms</h2><div class="meta">'+meta+'</div>'

   +'<h2>1. Services and Scope</h2>'
   +'<p>1.1 Agency will provide the paid-advertising management services included in the Service Package identified above (the &ldquo;Services&rdquo;), consisting of the following deliverables:</p>'
   +'<ul>'+feats+'</ul>'
   +'<p>1.2 The Services are limited to the Service Package selected. Work outside that scope (including additional platforms, campaigns, pages, or service tiers) requires a written package upgrade or separate agreement, at Agency&rsquo;s then-current rates. Agency may use subcontractors and automated tooling to perform the Services, and remains responsible for the Services performed.</p>'
   +'<p>1.3 Agency will determine campaign structure, targeting, bidding, and creative in its professional judgment, subject to Client&rsquo;s approval rights over ad copy and landing-page content that names Client or makes claims about Client&rsquo;s products or services. No advertising spend will be initiated or increased without Client&rsquo;s sign-off on the associated budget.</p>'

   +'<h2>2. Term, Renewal, and Holdover</h2>'
   +'<p>2.1 This Agreement begins on the Start Date and continues for the Committed Term shown above. <strong>The initial term is a minimum commitment of three (3) months</strong>; Client acknowledges that paid-advertising results require an initial optimization period and the pricing reflects that commitment.</p>'
   +'<p>2.2 At the end of any term, the parties may renew for a length of one (1), three (3), six (6), or twelve (12) months. The Monthly Management Fee for a renewal depends on the renewal length selected: month-to-month service carries a premium over the standard three-month rate, and longer commitments receive a discounted rate, as quoted by Agency at the time of renewal. The rate for the current term is the Monthly Management Fee stated in the Key Commercial Terms.</p>'
   +'<p>2.3 <strong>Holdover.</strong> If the term expires and the parties have neither renewed nor terminated, this Agreement continues on a month-to-month basis at Agency&rsquo;s then-current month-to-month rate for the same Service Package, until either party terminates under Section '+nTerm+'. This prevents any interruption of live campaigns.</p>'

   +'<h2>3. Fees and Payment</h2>'
   +'<p>3.1 <strong>Setup Fee.</strong> Any one-time Setup Fee shown in the Key Commercial Terms is due before campaign build begins and is non-refundable once Agency has commenced work, as it compensates account configuration, research, and build labor actually performed.</p>'
   +'<p>3.2 <strong>Management Fee.</strong> The Monthly Management Fee is billed monthly in advance by automatic charge (credit card or ACH bank debit) through Agency&rsquo;s payment processor (Stripe). Client authorizes recurring charges for the duration of this Agreement, including any holdover period. All amounts are in U.S. dollars; Client is responsible for any currency-conversion, bank, or international transaction fees charged by Client&rsquo;s own institutions.</p>'
   +'<p>3.3 <strong>Taxes.</strong> Fees are exclusive of all taxes. Client is responsible for any sales, use, VAT, GST, withholding, or similar taxes arising from the Services in Client&rsquo;s jurisdiction, excluding taxes on Agency&rsquo;s income. International payments must be made without deduction; if withholding is legally required, Client will gross up so Agency receives the full invoiced amount.</p>'
   +'<p>3.4 <strong>Late and Failed Payments.</strong> If a scheduled charge fails and is not cured within ten (10) days of notice, Agency may suspend the Services (including pausing campaigns) until payment is made; suspension does not extend the term or reduce fees owed. Amounts more than ten (10) days past due accrue interest at the lesser of 1.5% per month or the maximum rate permitted by law, plus reasonable collection costs. Client agrees to raise any billing dispute directly with Agency before initiating a card chargeback; a chargeback of amounts properly owed is a material breach. Client agrees that late-payment interest and any early-termination amounts owed under this Agreement may be added to Client&rsquo;s next scheduled invoice and collected by the authorized automatic payment method.</p>'
   +'<p>3.5 <strong>No refunds for partial months.</strong> Except as expressly stated in this Agreement, fees for a billing period that has begun are earned when billed and are non-refundable.</p>'
   +perLeadSection

// LandingPreview — renders the owner's in-app preview through the SAME live function
// (POST /landing) so the preview can never drift from the real /lp/<slug> page.
function LandingPreview({client}){
  const [html,setHtml]=useState("");
  const [state,setState]=useState("loading"); // loading | ok | err
  const key=JSON.stringify(client.landingPage||{})+"|"+(client.callTrackingNumber||"")+"|"+(client.bookingUrl||"")+"|"+JSON.stringify(client.campaignSetup||{})+"|"+JSON.stringify(client.brandVoice||{})+"|"+JSON.stringify((client.mediaLibrary||[]).map(m=>m.url));
  useEffect(()=>{
    let dead=false; setState("loading");
    (async()=>{
      try{
        const { data:{ session } }=await supabaseClient.auth.getSession();
        const token=session&&session.access_token;
        const r=await fetch("/.netlify/functions/landing",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+(token||"")},body:JSON.stringify({client})});
        const t=await r.text();
        if(dead)return;
        if(!r.ok){setState("err");return;}
        setHtml(t);setState("ok");
      }catch(e){ if(!dead) setState("err"); }
    })();
    return ()=>{dead=true;};
  },[key]);
  if(state==="err") return <div style={{fontSize:11,color:C.textMuted,padding:12,lineHeight:1.6}}>Preview unavailable right now — once published, the live page at <code>/lp/{client.landingSlug}</code> is what clients see.</div>;
  return <iframe srcDoc={html} title="Landing Page Preview" sandbox="allow-scripts allow-same-origin" style={{width:"100%",height:520,border:"none",display:"block",background:"#fff",opacity:state==="ok"?1:.45,transition:"opacity .2s"}}/>;
}

function HomeScreen({clients,onSelect,onAdd,onLogout,onRevenue,onSegment,isDesktop}) {
  const [search,setSearch]     = useState("");
  const [stageFilter,setStageF]= useState("all");
  const [nicheFilter,setNicheF]= useState("all");
  const [sortBy,setSortBy]     = useState("name"); // name | health | leads | expiry
  const [showFilters,setShowF] = useState(false);

  const MRR       = clients.reduce((s,c)=>s+((findPkg(c.packageId) && findPkg(c.packageId).price)||0),0);
  const active    = clients.filter(c=>c.stage==="active").length;
  const allAlerts = clients.flatMap(c=>getAlerts(c));
  const expiring  = clients.filter(c=>{ const d=daysUntil(c.contractEnd); return d>=0&&d<=30; });

  // ── Filter + sort pipeline ─────────────────────────────────────────────────
  const q = search.toLowerCase().trim();
  const filtered = clients
    .filter(cl=>{
      if (q) {
        const pkg = findPkg(cl.packageId);
        const haystack = [cl.name,cl.contactName,cl.niche,cl.email,(pkg && pkg.name),(pkg && pkg.platform)].join(" ").toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      if (stageFilter!=="all" && cl.stage!==stageFilter) return false;
      if (nicheFilter!=="all" && cl.niche!==nicheFilter)  return false;
      return true;
    })
    .sort((a,b)=>{
      if (sortBy==="health")  return calcHealth(b)-calcHealth(a);
      if (sortBy==="leads")   return (b.leads||0)-(a.leads||0);
      if (sortBy==="expiry")  return daysUntil(a.contractEnd)-daysUntil(b.contractEnd);
      return a.name.localeCompare(b.name); // default: alphabetical
    });

  const hasActiveFilters = stageFilter!=="all" || nicheFilter!=="all" || sortBy!=="name";
  const clearAll = () => { setSearch(""); setStageF("all"); setNicheF("all"); setSortBy("name"); };

    <div style={{flex:1,overflowY:"auto",padding:isDesktop?"26px 32px 60px":"16px 14px 100px"}}>

        <div style={{marginBottom:18}}>
          <div style={{fontSize:24,fontWeight:800,color:C.text,letterSpacing:"-0.02em",lineHeight:1.1}}>Dashboard</div>

            </div>
          </div>

        </div>
      )}

      {/* MRR hero + KPI tiles. Mobile: hero on top, 3-up stats below. Desktop: one row. */}
      {(()=>{
        const hero = (
          <button onClick={onRevenue} className="os-card" key="hero" style={{textAlign:"left",width:"100%",cursor:"pointer",
            background:"linear-gradient(135deg,rgba(200,168,75,0.12),rgba(200,168,75,0.04))",
            border:"1px solid rgba(200,168,75,0.2)",borderRadius:16,padding:"18px 20px",
            position:"relative",overflow:"hidden",display:"block"}}>
            <div style={{position:"absolute",top:-20,right:-20,width:100,height:100,borderRadius:"50%",
              background:"radial-gradient(circle,rgba(200,168,75,0.12),transparent 70%)"}}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:C.gold,opacity:.8}}>Monthly Recurring Revenue</div>
              <span style={{fontSize:10,fontWeight:700,color:C.gold,opacity:.7,display:"flex",alignItems:"center",gap:3}}>Breakdown ›</span>
            </div>
            <div style={{fontSize:isDesktop?36:32,fontWeight:900,color:C.gold,letterSpacing:"-0.02em",lineHeight:1,marginBottom:4}}>${MRR.toLocaleString()}</div>
            <div style={{fontSize:11,color:C.textMuted}}>management fees · {active} active of {clients.length} total</div>
          </button>
        );
        const tiles = [
          {k:"alerts",  l:"Alerts",  v:allAlerts.length, color:allAlerts.length>0?C.amber:C.green},
          {k:"expiring",l:"Expiring",v:expiring.length,  color:expiring.length>0?C.red:C.textMuted},

          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div><div style={{fontSize:11,color:C.red}}>{a.msg}</div></div>

                    <span style={{fontSize:10,color:C.textMuted}}>{cl.leads} leads · ${cl.cpl}/CPL</span>

                  <>
                    <span style={{width:3,height:3,borderRadius:"50%",backgroundColor:C.textMuted,display:"inline-block"}}/>

                {cl.upgradeRequest&&(
                  <>
                    <span style={{width:3,height:3,borderRadius:"50%",backgroundColor:C.textMuted,display:"inline-block"}}/>
                    <span style={{fontSize:10,color:C.purple,fontWeight:700}}>Upgrade pending</span>
                  </>
                )}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── STAT SEGMENT SCREEN ─────────────────────────────────────────────────────
// Opened by tapping the Alerts / Expiring / Clients tiles on the dashboard.
// One screen, three modes — each lists the clients in that category and taps
// through to the client hub.
function SegmentScreen({mode,clients,onSelect,onBack,isDesktop}) {
  const MODES = {
    alerts:  { title:"Clients with Alerts",  sub:"Active alerts across all clients" },
    expiring:{ title:"Expiring Contracts",   sub:"Contracts ending within 30 days" },
    clients: { title:"All Clients",          sub:"Full roster" },
  };
  const meta = MODES[mode]||MODES.clients;

  let rows;
  if (mode==="alerts") {
    rows = clients.map(cl=>({cl,alerts:getAlerts(cl)})).filter(r=>r.alerts.length>0)
      .sort((a,b)=>{
        const red = (r)=>r.alerts.some(x=>x.severity==="red")?1:0;
        return red(b)-red(a) || b.alerts.length-a.alerts.length;
      });
  } else if (mode==="expiring") {
    rows = clients.map(cl=>({cl,days:daysUntil(cl.contractEnd)})).filter(r=>r.days>=0&&r.days<=30)
      .sort((a,b)=>a.days-b.days);
  } else {
    rows = clients.map(cl=>({cl})).sort((a,b)=>a.cl.name.localeCompare(b.cl.name));
  }

  const EMPTY = {
    alerts:  {icon:"✅", msg:"No active alerts — every client is running clean."},
    expiring:{icon:"🗓️", msg:"No contracts expiring in the next 30 days."},
    clients: {icon:"👥", msg:"No clients yet."},
  }[mode]||{icon:"—",msg:"Nothing here."};

  const sevColor = (s)=>s==="red"?C.red:s==="blue"?C.purple:C.amber;

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header bar */}
      <div style={{borderBottom:`1px solid ${C.border}`,flexShrink:0,backgroundColor:C.bg2}}>
        <div style={{padding:isDesktop?"18px 32px":"12px 14px",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:9,background:"rgba(255,255,255,0.05)",
            border:`1px solid ${C.border}`,color:C.textDim,fontSize:16,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            ‹
          </button>
          <div>
            <div style={{fontSize:isDesktop?22:15,fontWeight:800,color:C.text,letterSpacing:"-0.01em",lineHeight:1.1}}>{meta.title}</div>
            <div style={{fontSize:isDesktop?11:10,color:C.textMuted,letterSpacing:"0.05em",textTransform:"uppercase",marginTop:2}}>{meta.sub} · {rows.length}</div>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:isDesktop?"20px 32px 60px":"14px 14px 100px"}}>
        {rows.length===0
          ? <div style={{textAlign:"center",padding:"56px 20px"}}>
              <div style={{fontSize:30,marginBottom:10}}>{EMPTY.icon}</div>
              <div style={{fontSize:13,color:C.textDim,lineHeight:1.6}}>{EMPTY.msg}</div>
            </div>
          : <div style={isDesktop?{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(360px,1fr))",gap:10,alignItems:"start"}:{display:"flex",flexDirection:"column",gap:8}}>
            {rows.map((r)=>{
              const cl=r.cl, pkg=findPkg(cl.packageId), stage=stageInfo(cl.stage), health=calcHealth(cl);
              return (
                <button key={cl.id} onClick={()=>onSelect(cl)} className="os-card" style={{textAlign:"left",width:"100%",height:isDesktop?"100%":undefined,cursor:"pointer",
                  backgroundColor:C.bg2,border:`1px solid ${mode==="alerts"&&r.alerts.some(a=>a.severity==="red")?"rgba(248,113,113,0.25)":mode==="expiring"&&r.days<=7?"rgba(248,113,113,0.25)":C.border}`,
                  borderRadius:12,padding:"12px 14px",display:"block"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cl.name}</div>
                      <div style={{fontSize:11,color:C.textMuted,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        {pkg?`${pkg.name} · ${pkg.platform}`:"No package"}
                      </div>
                    </div>
                    {mode==="expiring"&&(
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:15,fontWeight:800,color:r.days<=7?C.red:C.amber,lineHeight:1}}>{r.days}d left</div>
                        <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>ends {cl.contractEnd||"—"}</div>
                      </div>
                    )}
                    {mode==="clients"&&(
                      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                        <Chip label={stage.label} color={stage.color} small/>
                        <span style={{fontSize:10,fontWeight:600,color:healthColor(health)}}>⬡ {health.toFixed(1)}</span>
                      </div>
                    )}
                    {mode==="alerts"&&(
                      <span style={{flexShrink:0,minWidth:20,height:20,borderRadius:10,backgroundColor:r.alerts.some(a=>a.severity==="red")?C.red:C.amber,
                        color:"#0a0800",fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 6px"}}>{r.alerts.length}</span>
                    )}
                    <span style={{fontSize:16,color:C.textMuted,flexShrink:0}}>›</span>
                  </div>
                  {mode==="alerts"&&r.alerts.map((a,i)=>(
                    <div key={i} style={{marginTop:7,padding:"7px 10px",borderRadius:9,
                      backgroundColor:a.severity==="red"?"rgba(248,113,113,.07)":a.severity==="blue"?"rgba(139,92,246,.07)":"rgba(251,191,36,.07)",
                      border:`1px solid ${sevColor(a.severity)}30`,
                      fontSize:11,color:sevColor(a.severity),fontWeight:600,display:"flex",alignItems:"center",gap:7}}>
                      <span style={{fontSize:12}}>{a.severity==="red"?"⚠":"ℹ"}</span>{a.msg}
                    </div>
                  ))}
                </button>
              );
            })}
            </div>}
      </div>
    </div>
  );
}

// ─── CLIENT HUB ──────────────────────────────────────────────────────────────
function ClientHub({client,onUpdate,onDelete,onBack,isDesktop}) {
  const [tab,setTab]         = useState(client._initialTab||"overview");
  const [openBot,setOpenBot] = useState(null);
  const [showEdit,setShowEdit] = useState(false);
  const [genLanding,setGenLanding] = useState({busy:false,error:null});
  const [callTrack,setCallTrack] = useState({busy:false,error:null,areaCode:""});
  const [mediaBusy,setMediaBusy] = useState(null);
  const [mediaErr,setMediaErr]   = useState(null);
  const pkg    = findPkg(client.packageId);
  const bots   = buildBots(pkg).map(b=>({...b,status:(client.botStatuses && client.botStatuses[b.id])||"waiting"}));
  const alerts = getAlerts(client);
  const stage  = stageInfo(client.stage);
  const days   = daysUntil(client.contractEnd);
  const TABS   = [["overview","Overview"],["pipeline","Pipeline"],["leads","Leads"],["portal","Client View"],["package","Package"],["contract","Contract"],["reports","Reports"],["log","Log"]];
  const onboardingSteps = [
    {key:"contract",label:"Contract Signed",done:!!client.contractSigned,note:client.contractSigned?"Signed and on file.":"Awaiting signature."},
    {key:"billing",label:"Billing Connected",done:false,note:"BoldLine is finishing setup — coming soon."},
    {key:"ads",label:"Ad Accounts Linked",done:false,note:"BoldLine is finishing setup — coming soon."},
    {key:"campaign",label:"Campaign Setup",done:!!(client.campaignSetup&&client.campaignSetup.mainOffer),note:(client.campaignSetup&&client.campaignSetup.mainOffer)?"Offer & targeting on file.":"Waiting on client input."},
    {key:"brand",label:"Brand Voice",done:!!(client.brandVoice&&client.brandVoice.tone),note:(client.brandVoice&&client.brandVoice.tone)?"Tone & competitors on file.":"Waiting on client input."},
    {key:"media",label:"Media Library",done:!!(client.mediaLibrary&&client.mediaLibrary.length>0),note:(client.mediaLibrary&&client.mediaLibrary.length>0)?`${client.mediaLibrary.length} file${client.mediaLibrary.length===1?"":"s"} uploaded.`:"No assets uploaded yet."},
  ];

  const handleUpgradeRequest = (newPkg) => {
    onUpdate({...client, upgradeRequest:`${newPkg.name} (${newPkg.platform}) — $${newPkg.price}/mo`});
  };
  const handleManualUpgrade = (newPkgId) => {
    const newPkg = findPkg(newPkgId);
    const bots   = buildBots(newPkg);
    const botStatuses = Object.fromEntries(bots.map(b=>[b.id,"waiting"]));
    botStatuses["intake"] = "done"; botStatuses["ceo"] = "done";
    onUpdate({...client, packageId:newPkgId, upgradeRequest:null, botStatuses,
      alerts:[...client.alerts, {type:"upgrade_done", msg:`Manually upgraded to ${newPkg.name} — send invoice to ${client.email}`, severity:"blue"}]
    });
  };
  const handleGenerateLanding = async () => {
    setGenLanding({busy:true,error:null});
    try {
      const r = await fetch("/.netlify/functions/generate-landing",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:client.name,niche:client.niche,campaignSetup:client.campaignSetup,brandVoice:client.brandVoice,mediaLibrary:client.mediaLibrary,website:client.website})});
      const d = await r.json();
      if(!r.ok||!d.ok) throw new Error(d.error||"Generation failed");
      onUpdate({...client, landingPage:{...d.landingPage,published:(client.landingPage&&client.landingPage.published)||false,generatedAt:new Date().toISOString()}});
      setGenLanding({busy:false,error:null});
    } catch (err) {
      setGenLanding({busy:false,error:err.message||"Generation failed"});
    }
  };
  const handleTogglePublish = () => {
    onUpdate({...client, landingPage:{...client.landingPage,published:!(client.landingPage&&client.landingPage.published)}});
  };
  const handleProvisionNumber = async () => {
    setCallTrack(s=>({...s,busy:true,error:null}));
    try {
      const r = await fetch(`/.netlify/functions/call-tracking?token=${encodeURIComponent(client.portalToken)}&action=provision`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({areaCode:callTrack.areaCode})});
      const d = await r.json();
      if(!r.ok||!d.ok) throw new Error(d.error||"Provisioning failed");
      onUpdate({...client, callTrackingNumber:d.callTrackingNumber});
      setCallTrack(s=>({...s,busy:false,error:null}));
    } catch (err) {
      setCallTrack(s=>({...s,busy:false,error:err.message||"Provisioning failed"}));
    }
  };
  const handleReleaseNumber = async () => {
    if(!window.confirm("Release this tracking number? This stops the monthly charge and the number can't be recovered.")) return;
    setCallTrack(s=>({...s,busy:true,error:null}));
    try {
      const r = await fetch(`/.netlify/functions/call-tracking?token=${encodeURIComponent(client.portalToken)}&action=release`,{method:"POST"});
      const d = await r.json();
      if(!r.ok||!d.ok) throw new Error(d.error||"Release failed");
      onUpdate({...client, callTrackingNumber:"", callTrackingNumberSid:""});
      setCallTrack(s=>({...s,busy:false,error:null}));
    } catch (err) {
      setCallTrack(s=>({...s,busy:false,error:err.message||"Release failed"}));
    }
  };
  const handleDeleteMedia = async (m) => {
    if(!window.confirm(`Delete "${m.label}" from ${client.name}'s media library? The file is removed for good — the client loses it too.`)) return;
    setMediaBusy(m.path); setMediaErr(null);
    try {
      const r = await fetch(`/.netlify/functions/media?action=delete&token=${encodeURIComponent(client.portalToken)}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:m.path})});
      const d = await r.json();
      if(!r.ok||!d.ok) throw new Error(d.error||"Delete failed");
      onUpdate({...client, mediaLibrary:d.mediaLibrary||[]});
      setMediaBusy(null);
    } catch (err) {
      setMediaBusy(null); setMediaErr(err.message||"Delete failed");
    }
  };

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{borderBottom:`1px solid ${C.border}`,flexShrink:0,backgroundColor:C.bg2}}>
        {/* Client header bar */}
        <div style={{padding:"12px 14px 10px",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:9,background:"rgba(255,255,255,0.05)",
            border:`1px solid ${C.border}`,color:C.textDim,fontSize:16,cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            ‹
          </button>
          <div style={{width:36,height:36,borderRadius:10,
            background:`linear-gradient(135deg,${stage.color}44,${stage.color}15)`,
            border:`1px solid ${stage.color}33`,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:14,fontWeight:900,color:stage.color,flexShrink:0}}>
            {client.name[0]}
          </div>
          <div style={S.f1min}>
            <div style={{fontSize:14,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:"-0.01em"}}>{client.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap",marginTop:1}}>
              <Chip label={stage.label} color={stage.color} small/>
              <span style={{fontSize:10,fontWeight:600,color:healthColor(calcHealth(client))}}>⬡ {calcHealth(client).toFixed(1)}/10</span>
              {days<=30&&days>=0&&<span style={{fontSize:10,color:days<=7?C.red:C.amber,fontWeight:700}}>{days}d left</span>}
            </div>
          </div>
          <AlertBadge alerts={alerts}/>
          <button
            onClick={()=>setShowEdit(true)}
            style={{
              padding:"5px 11px",fontSize:11,fontWeight:700,borderRadius:8,
              border:`1px solid ${C.borderAccent}`,
              backgroundColor:C.goldDim,color:C.gold,cursor:"pointer",flexShrink:0
            }}>
            Edit
          </button>
        </div>
        {alerts.slice(0,1).map((a,i)=>(
          <div key={i} style={{margin:"0 14px 8px",padding:"7px 10px",borderRadius:9,
            backgroundColor:a.severity==="red"?"rgba(248,113,113,.07)":a.severity==="blue"?"rgba(139,92,246,.07)":"rgba(251,191,36,.07)",
            border:`1px solid ${a.severity==="red"?C.red:a.severity==="blue"?C.purple:C.amber}30`,
            fontSize:11,color:a.severity==="red"?C.red:a.severity==="blue"?C.purple:C.amber,fontWeight:600,
            display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:13}}>{a.severity==="red"?"⚠":"ℹ"}</span>
            {a.msg}
          </div>
        ))}
        <div style={{display:"flex",overflowX:"auto",gap:0,scrollbarWidth:"none"}}>
          {TABS.map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{
              padding:"9px 14px",fontSize:11,fontWeight:600,border:"none",
              borderBottom:`2px solid ${tab===k?C.gold:"transparent"}`,
              backgroundColor:"transparent",
              color:tab===k?C.gold:C.textMuted,
              cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,
              letterSpacing:"0.01em",transition:"color 0.15s"
            }}>
              {l}
            </button>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:isDesktop?"22px 28px 60px":"13px 13px 60px",width:"100%",maxWidth:isDesktop?1000:"none",margin:isDesktop?"0 auto":undefined}}>
        {tab==="overview"&&(
