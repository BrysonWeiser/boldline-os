      <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 10px",marginBottom:11}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={readPage} disabled={pgState==="reading"} style={{padding:"7px 12px",fontSize:11.5,fontWeight:700,borderRadius:8,border:"none",backgroundColor:pgState==="ok"?"#059669":"#1D4ED8",color:"#fff",cursor:pgState==="reading"?"default":"pointer",opacity:pgState==="reading"?.7:1,whiteSpace:"nowrap"}}>{pgState==="reading"?"Reading…":pgState==="ok"?"✓ Page read":"📄 Read Page"}</button>
          <div style={{fontSize:9.5,color:C.textMuted,lineHeight:1.5}}>Reads the Page these ads publish to — confirms manage access + pulls its follower/engagement stats.</div>
        </div>
        {pgMsg&&<div style={{fontSize:11,marginTop:8,lineHeight:1.6,color:pgState==="error"?C.red:"#34D399",wordBreak:"break-word"}}>{pgMsg}</div>}
      </div>
      {[
        {k:"name",l:"Campaign name",t:"text"},
        {k:"dailyBudgetDollars",l:"Daily budget ($/day)",t:"number"},
        {k:"landingUrl",l:"Landing page URL",t:"text"},
        {k:"headline",l:"Headline",t:"text"},
        {k:"primaryText",l:"Primary text (the post body)",t:"text"},
        {k:"description",l:"Description (optional)",t:"text"},
        {k:"imageUrl",l:"Ad image URL (optional — defaults to a client photo)",t:"text"},
      ].map(({k,l,t})=>(
        <div key={k} style={{marginBottom:9}}>
          <label style={lbl}>{l}</label>
          <input type={t} value={f[k]} onChange={e=>set(k,e.target.value)} style={box}/>
        </div>
      ))}
      <div style={{display:"flex",gap:8,marginBottom:9}}>
        <div style={{flex:1}}><label style={lbl}>CTA button</label>
          <select value={f.ctaType} onChange={e=>set("ctaType",e.target.value)} style={box}>
            {["LEARN_MORE","SIGN_UP","GET_QUOTE","CONTACT_US","BOOK_NOW","GET_OFFER","SUBSCRIBE"].map(o=><option key={o} value={o} style={{background:C.bg2}}>{o.replace(/_/g," ")}</option>)}
          </select>
        </div>
        <div style={{width:70}}><label style={lbl}>Age min</label><input type="number" value={f.ageMin} onChange={e=>set("ageMin",e.target.value)} style={box}/></div>
        <div style={{width:70}}><label style={lbl}>Age max</label><input type="number" value={f.ageMax} onChange={e=>set("ageMax",e.target.value)} style={box}/></div>
        <div style={{width:70}}><label style={lbl}>Country</label><input type="text" value={f.country} onChange={e=>set("country",e.target.value.toUpperCase().slice(0,2))} style={box}/></div>
      </div>
      <button onClick={launch} disabled={state==="creating"} style={{width:"100%",padding:"10px",fontSize:12.5,fontWeight:700,borderRadius:9,border:"none",backgroundColor:state==="done"?"#059669":C.gold,color:state==="done"?"#fff":"#15110A",cursor:state==="creating"?"default":"pointer",opacity:state==="creating"?.7:1}}>{state==="creating"?"Building campaign…":state==="done"?"✓ Created (Paused)":"Build Campaign (Paused)"}</button>
      {msg&&<div style={{fontSize:11,marginTop:9,lineHeight:1.6,color:state==="error"?C.red:"#34D399",wordBreak:"break-word"}}>{msg}</div>}
    </Card>
  );
}

// ─── BLOG MANAGEMENT ──────────────────────────────────────────────────────────
// Owner panel for the AI-written marketing blog: set the weekly cadence, write
// a post on demand, and regenerate/delete any post the AI gets wrong. All
// actions hit blog-admin.mjs under the owner's Supabase session (same auth
// gate as DocuSign/Google Ads above).
function BlogManagementCard() {
  const [posts,setPosts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [cadence,setCadence]=useState(null);
  const [cadenceInput,setCadenceInput]=useState("1");
  const [cadenceState,setCadenceState]=useState("idle"); // idle | saving | saved
  const [genState,setGenState]=useState("idle");         // idle | generating
  const [busyId,setBusyId]=useState(null);               // postId mid regenerate/delete
  const [confirmId,setConfirmId]=useState(null);         // postId armed for delete confirm
  const [bulkConfirm,setBulkConfirm]=useState(null);     // "rewrite" | "rebuild" armed for confirm
  const [bulkProgress,setBulkProgress]=useState(null);   // {type,phase,done,total} while a bulk op runs
  const [msg,setMsg]=useState("");

  const call=async(action,extra)=>{
    const { data:{ session } }=await supabaseClient.auth.getSession();
    const token=session&&session.access_token;
    if(!token) throw new Error("Session expired — refresh the page and log in again.");
    const r=await fetch("/.netlify/functions/blog-admin",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({action,...extra})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.ok) throw new Error(d.error||"Request failed.");
    return d;
  };

  // AI generation takes longer than a normal function is allowed to run, so it
  // runs as a background job (returns 202 immediately) and we poll list() for
  // the result. callBg just starts it; pollList watches until it lands.
  const callBg=async(payload)=>{
    const { data:{ session } }=await supabaseClient.auth.getSession();
    const token=session&&session.access_token;
    if(!token) throw new Error("Session expired — refresh the page and log in again.");
    const r=await fetch("/.netlify/functions/blog-write-background",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify(payload)});
    if(!(r.status>=200&&r.status<300)){ let d={}; try{ d=await r.json(); }catch(e){} throw new Error(d.error||"Couldn't start the writer. Refresh and try again."); }
  };
  const pollList=async(detect,timeoutMs=150000)=>{
    const start=Date.now();
    while(Date.now()-start<timeoutMs){
      await new Promise(res=>setTimeout(res,4000));
      let fresh; try{ fresh=(await call("list")).posts||[]; }catch(e){ continue; }
      if(detect(fresh)){ setPosts(fresh); return true; }
    }
    return false;
  };

  const loadAll=async()=>{
    setLoading(true); setMsg("");
    try{
      const [listRes,settingsRes]=await Promise.all([call("list"),call("get-settings")]);
      setPosts(listRes.posts||[]);
      setCadence(settingsRes.postsPerWeek);
      setCadenceInput(String(settingsRes.postsPerWeek));
    }catch(e){ setMsg(e.message); }
    setLoading(false);
  };
  useEffect(()=>{ loadAll(); },[]);

  // ── Live refresh ── scheduled/autopublished posts (and edits from another tab)
  // appear on their own, no page reload. We pause while a foreground op is mid-
  // flight (generate / bulk / per-post busy) so a background reload never yanks
  // the list out from under a running action. `blog_posts` gives instant updates
  // once it's added to the supabase_realtime publication; otherwise the 30s poll
  // + tab-focus refetch keep it live. opBusyRef keeps silentReload identity
  // stable so the realtime channel isn't torn down on every keystroke of state.
  const opBusyRef=useRef(false);
  useEffect(()=>{ opBusyRef.current=(genState!=="idle"||!!busyId||!!bulkProgress); },[genState,busyId,bulkProgress]);
  const silentReload=useCallback(async()=>{
    if(opBusyRef.current) return;              // don't fight a running op
    try{ const listRes=await call("list"); setPosts(listRes.posts||[]); }
    catch(e){ /* background refresh — keep the last good list on error */ }
  },[]);
  useLiveData(silentReload, { table:"blog_posts", interval:30000 });

  const saveCadence=async()=>{
    const n=Math.round(Number(cadenceInput));
    if(!Number.isFinite(n)||n<1||n>14){ setMsg("Posts per week must be 1–14."); return; }
    setCadenceState("saving"); setMsg("");
    try{ await call("set-cadence",{postsPerWeek:n}); setCadence(n); setCadenceState("saved"); setTimeout(()=>setCadenceState("idle"),1500); }
    catch(e){ setCadenceState("idle"); setMsg(e.message); }
  };

  const generateNow=async()=>{
    setGenState("generating"); setMsg("Writing and publishing… this can take up to a minute.");
    const beforeIds=new Set(posts.map(p=>p.id));
    try{
      await callBg({action:"generate-now"});
      const ok=await pollList(fresh=>fresh.some(p=>!beforeIds.has(p.id)));
      setMsg(ok?"":"Still publishing — it'll appear here shortly, or hit refresh in a minute.");
    }catch(e){ setMsg(e.message); }
    setGenState("idle");
  };

  const regenerate=async(postId)=>{
    setBusyId(postId); setMsg("Rewriting… this can take up to a minute.");
    const before=posts.find(p=>p.id===postId);
    const beforeTitle=before?before.title:null;
    try{
      await callBg({action:"regenerate",postId});
      const ok=await pollList(fresh=>{ const n=fresh.find(p=>p.id===postId); return n&&n.title!==beforeTitle; });
      setMsg(ok?"":"Still rewriting — refresh in a minute to see it.");
    }catch(e){ setMsg(e.message); }
    setBusyId(null);
  };

  const doDelete=async(postId)=>{
    setBusyId(postId); setConfirmId(null); setMsg("");
    try{ await call("delete",{postId}); setPosts(p=>p.filter(x=>x.id!==postId)); }
    catch(e){ setMsg(e.message); }
    setBusyId(null);
  };

  // Manual editor: "get" fetches the full post (list rows omit body_html),
  // "update" saves owner edits in place — same slug/URL, changes live at once.
  const [editor,setEditor]=useState(null);        // full post being edited, or null
  const [editorSaving,setEditorSaving]=useState(false);
  const openEditor=async(postId)=>{
    setBusyId(postId); setMsg("");
    try{ const d=await call("get",{postId}); setEditor(d.post); }
    catch(e){ setMsg(e.message); }
    setBusyId(null);
  };
  const setEd=(k,v)=>setEditor(p=>({...p,[k]:v}));
  const saveEditor=async()=>{
    setEditorSaving(true); setMsg("");
    try{
      const d=await call("update",{postId:editor.id,title:editor.title,category:editor.category,excerpt:editor.excerpt,meta_description:editor.meta_description,body_html:editor.body_html});
      setPosts(p=>p.map(x=>x.id===editor.id?d.post:x));
      setEditor(null);
    }catch(e){ setMsg(e.message); }
    setEditorSaving(false);
  };

  // Scheduled-pipeline controls: publish a draft early, move its go-live time,
  // or write the next post straight into the review queue.
  const [reschedId,setReschedId]=useState(null);
  const [reschedVal,setReschedVal]=useState("");
  const toLocalInput=(iso)=>{ const d=new Date(iso); const z=(n)=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate())+"T"+z(d.getHours())+":"+z(d.getMinutes()); };
  const publishNow=async(postId)=>{
    setBusyId(postId); setMsg("");
    try{ const d=await call("publish-now",{postId}); setPosts(p=>p.map(x=>x.id===postId?d.post:x)); }
    catch(e){ setMsg(e.message); }
    setBusyId(null);
  };
  const saveReschedule=async(postId)=>{
    const when=new Date(reschedVal);
    if(isNaN(when)||when.getTime()<=Date.now()){ setMsg("Pick a date and time in the future."); return; }
    setBusyId(postId); setMsg("");
    try{ const d=await call("reschedule",{postId,when:when.toISOString()}); setPosts(p=>p.map(x=>x.id===postId?d.post:x)); setReschedId(null); }
    catch(e){ setMsg(e.message); }
    setBusyId(null);
  };
  const writeScheduled=async()=>{
    setGenState("generating"); setMsg("Writing the post… this can take up to a minute.");
    const beforeIds=new Set(posts.map(p=>p.id));
    try{
      await callBg({action:"generate-scheduled"});
      const ok=await pollList(fresh=>fresh.some(p=>!beforeIds.has(p.id)));
      setMsg(ok?"":"Still writing — it'll appear here shortly, or hit refresh in a minute.");
    }catch(e){ setMsg(e.message); }
    setGenState("idle");
  };
  // Enforce one-per-week on existing scheduled drafts: any that are stacked in
  // the same week get spread onto consecutive open Monday slots.
  const respaceSchedule=async()=>{
    setGenState("generating"); setMsg("Spacing scheduled posts to one per week…");
    try{
      const d=await call("respace-schedule");
      await loadAll();
      setMsg(d.moved?`Done — moved ${d.moved} post${d.moved!==1?"s":""} so there's exactly one per week.`:"Already one per week — nothing to move.");
    }catch(e){ setMsg(e.message); }
    setGenState("idle");
  };

  // Both bulk flows are sequential client-side loops: each post's AI write is
  // kicked off as a background job (callBg) and we poll list() until it lands,
  // so nothing hits the synchronous function timeout and progress shows per post.
  const rewriteAll=async()=>{
    const targets=posts.map(p=>({id:p.id,title:p.title}));
    setBulkConfirm(null); setMsg("");
    setBulkProgress({type:"rewrite",done:0,total:targets.length});
    let done=0;
    try{
      for(const t of targets){
        await callBg({action:"regenerate",postId:t.id});
        await pollList(fresh=>{ const n=fresh.find(x=>x.id===t.id); return n&&n.title!==t.title; });
        done++; setBulkProgress({type:"rewrite",done,total:targets.length});
      }
    }catch(e){
      setMsg(`Rewrite stopped after ${done} of ${targets.length} — ${e.message}. The rest are unchanged; retry individually or try Rewrite All again.`);
    }
    setBulkProgress(null);
  };

  const rebuildFromScratch=async()=>{
    const targetCount=posts.length||3;
    setBulkConfirm(null); setMsg("");
    setBulkProgress({type:"rebuild",phase:"deleting",done:0,total:targetCount});
    try{
      await call("delete-all");
      setPosts([]);
      const known=new Set();
      for(let i=0;i<targetCount;i++){
        setBulkProgress({type:"rebuild",phase:"writing",done:i,total:targetCount});
        await callBg({action:"generate-now"});
        await pollList(fresh=>{ const fresh2=fresh.filter(p=>!known.has(p.id)); if(fresh2.length){ fresh2.forEach(p=>known.add(p.id)); return true; } return false; });
        setBulkProgress({type:"rebuild",phase:"writing",done:i+1,total:targetCount});
      }
    }catch(e){
      setMsg(`Rebuild stopped partway — ${e.message}. Use "Write & Schedule" to keep adding posts, or try Rebuild again.`);
    }
    setBulkProgress(null);
  };

  const fmtDate=(iso)=>iso?new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"";
  const bulkBusy=!!bulkProgress;

  return (
    <div style={{backgroundColor:C.bg3,border:`1px solid ${C.borderAccent}`,borderRadius:11,padding:"12px 13px",marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:5}}>📝 Blog — AI Auto-Publish</div>
      <div style={{fontSize:11,color:C.textMuted,marginBottom:10,lineHeight:1.6}}>One post a week, on autopilot. Every <strong style={{color:C.gold}}>Tuesday 8am Arizona time</strong> the AI writes next week's post and parks it under <strong style={{color:C.gold}}>Scheduled</strong>, set to publish the following <strong style={{color:C.gold}}>Monday 8am</strong> (you get an email when it's queued). You have until Monday to edit, AI-rewrite, reschedule, or delete it — do nothing and it publishes itself. There's always one waiting for review; the queue refills automatically.</div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${C.border}`,flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:C.textDim,fontWeight:600,lineHeight:1.5}}>📅 One per week · publishes Mondays 8am · written Tuesdays 8am (Arizona)</span>
        {posts.filter(p=>p.status==="draft").length>=2&&(
          <button onClick={respaceSchedule} disabled={genState==="generating"||bulkBusy} title="Spreads stacked scheduled posts onto separate weeks — one per week" style={{marginLeft:"auto",padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,border:`1px solid ${C.borderAccent}`,backgroundColor:"rgba(200,168,75,.08)",color:C.gold,cursor:"pointer",opacity:(genState==="generating"||bulkBusy)?.7:1,whiteSpace:"nowrap"}}>Space 1/week</button>
        )}
        <button onClick={writeScheduled} disabled={genState==="generating"||bulkBusy} title="Writes one now and schedules it for the next open Monday slot" style={{marginLeft:posts.filter(p=>p.status==="draft").length>=2?0:"auto",padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,border:"none",backgroundColor:C.gold,color:"#15110A",cursor:"pointer",opacity:(genState==="generating"||bulkBusy)?.7:1,whiteSpace:"nowrap"}}>{genState==="generating"?"Writing…":"Write & Schedule"}</button>
        <button onClick={generateNow} disabled={genState==="generating"||bulkBusy} title="Skips the review queue and goes live immediately" style={{padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textDim,cursor:"pointer",opacity:(genState==="generating"||bulkBusy)?.7:1,whiteSpace:"nowrap"}}>Write + Publish Now</button>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${C.border}`,flexWrap:"wrap"}}>
        {bulkProgress?(
          <span style={{fontSize:11,color:C.textDim,fontWeight:600}}>
            {bulkProgress.type==="rewrite"
              ?`Rewriting post ${bulkProgress.done} of ${bulkProgress.total}…`
              :bulkProgress.phase==="deleting"?"Clearing old posts…":`Writing post ${bulkProgress.done} of ${bulkProgress.total}…`}
          </span>
        ):bulkConfirm==="rewrite"?(
          <>
            <span style={{fontSize:11,color:C.textDim}}>Rewrite all {posts.length} posts now — same URLs, fresh text, old text gone for good?</span>
            <button onClick={()=>setBulkConfirm(null)} style={{padding:"6px 10px",fontSize:10,fontWeight:600,borderRadius:7,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>Cancel</button>
            <button onClick={rewriteAll} style={{padding:"6px 10px",fontSize:10,fontWeight:700,borderRadius:7,border:"none",backgroundColor:"rgba(248,113,113,0.15)",color:C.red,cursor:"pointer",whiteSpace:"nowrap"}}>Confirm Rewrite</button>
          </>
        ):bulkConfirm==="rebuild"?(
          <>
            <span style={{fontSize:11,color:C.textDim}}>Delete all {posts.length} posts and write {posts.length||3} brand-new ones?</span>
            <button onClick={()=>setBulkConfirm(null)} style={{padding:"6px 10px",fontSize:10,fontWeight:600,borderRadius:7,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>Cancel</button>
            <button onClick={rebuildFromScratch} style={{padding:"6px 10px",fontSize:10,fontWeight:700,borderRadius:7,border:"none",backgroundColor:"rgba(248,113,113,0.15)",color:C.red,cursor:"pointer",whiteSpace:"nowrap"}}>Confirm Rebuild</button>
          </>
        ):(
          <>
            <button onClick={()=>setBulkConfirm("rewrite")} disabled={posts.length===0||!!busyId} style={{padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textDim,cursor:"pointer",opacity:(posts.length===0||busyId)?.5:1,whiteSpace:"nowrap"}}>Rewrite All Posts</button>
            <button onClick={()=>setBulkConfirm("rebuild")} disabled={!!busyId} style={{padding:"7px 12px",fontSize:11,fontWeight:700,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textDim,cursor:"pointer",opacity:busyId?.5:1,whiteSpace:"nowrap"}}>Rebuild From Scratch</button>
          </>
        )}
      </div>

      {msg&&<div style={{fontSize:11,marginBottom:10,lineHeight:1.6,color:C.red}}>{msg}</div>}

      {loading?(
        <div style={{fontSize:12,color:C.textMuted,padding:"8px 0"}}>Loading posts…</div>
      ):posts.length===0?(
        <div style={{fontSize:12,color:C.textMuted,padding:"8px 0"}}>No posts yet — the pipeline writes and schedules the first one on its next 15-minute check, or click "Write & Schedule".</div>
      ):(()=>{
        const scheduled=posts.filter(p=>p.status==="draft").sort((a,b)=>a.published_at<b.published_at?-1:1);
        const posted=posts.filter(p=>p.status!=="draft").sort((a,b)=>a.published_at>b.published_at?-1:1);
        const fmtWhen=(iso)=>iso?new Date(iso).toLocaleString("en-US",{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"";
        const row=(p,isSched)=>(
          <div key={p.id} style={{padding:"9px 10px",borderRadius:9,backgroundColor:isSched?"rgba(200,168,75,.05)":"rgba(255,255,255,.03)",border:`1px solid ${isSched?C.borderAccent:C.border}`}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:8,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:170}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",color:C.gold,marginBottom:3}}>{p.category}{p.source==="ai"?" · AI":""}</div>
                {isSched?(
                  <span style={{fontSize:12.5,fontWeight:600,color:C.text,lineHeight:1.4}}>{p.title}</span>
                ):(
                  <a href={"https://boldlinemedia.com/blog/"+p.slug+"/"} target="_blank" rel="noopener noreferrer" style={{fontSize:12.5,fontWeight:600,color:C.text,textDecoration:"none",lineHeight:1.4}}>{p.title}</a>
                )}
                <div style={{fontSize:10,color:isSched?C.gold:C.textMuted,marginTop:3,fontWeight:isSched?700:400}}>{isSched?"Publishes "+fmtWhen(p.published_at):fmtDate(p.published_at)+" · "+p.read_minutes+" min read"}</div>
              </div>
              {reschedId===p.id?(
                <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                  <input type="datetime-local" value={reschedVal} onChange={e=>setReschedVal(e.target.value)} style={{flex:"1 1 150px",minWidth:0,maxWidth:"100%",padding:"5px 7px",fontSize:11,borderRadius:7,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.05)",color:C.text,fontFamily:"inherit",colorScheme:"dark"}}/>
                  <button onClick={()=>saveReschedule(p.id)} disabled={busyId===p.id} style={{padding:"5px 9px",fontSize:10,fontWeight:700,borderRadius:7,border:"none",backgroundColor:C.gold,color:"#15110A",cursor:"pointer",whiteSpace:"nowrap"}}>{busyId===p.id?"…":"Save"}</button>
                  <button onClick={()=>setReschedId(null)} style={{padding:"5px 9px",fontSize:10,fontWeight:600,borderRadius:7,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>Cancel</button>
                </div>
              ):(
                <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  <button onClick={()=>openEditor(p.id)} disabled={busyId===p.id||bulkBusy} style={{padding:"5px 9px",fontSize:10,fontWeight:700,borderRadius:7,border:`1px solid ${C.borderAccent}`,backgroundColor:"rgba(200,168,75,.08)",color:C.gold,cursor:"pointer",opacity:(busyId===p.id||bulkBusy)?.6:1,whiteSpace:"nowrap"}}>{isSched?"Review / Edit":"Edit"}</button>
                  <button onClick={()=>regenerate(p.id)} disabled={busyId===p.id||bulkBusy} style={{padding:"5px 9px",fontSize:10,fontWeight:700,borderRadius:7,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textDim,cursor:"pointer",opacity:(busyId===p.id||bulkBusy)?.6:1,whiteSpace:"nowrap"}}>{busyId===p.id?"…":"AI Rewrite"}</button>

function ARIABuilderTab({ariaSystem}) {
  const {messages,loading,send}=useAI("");const [input,setInput]=useState("");

}

            {/* Batch actions */}
            <div style={{marginTop:14}}>

                    <button onClick={()=>setResetConfirm(false)} style={{flex:1,padding:"6px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>

                  </div>
                </div>

                  <div style={{display:"flex",gap:7}}>

                    <button onClick={()=>{ set("botStatuses",Object.fromEntries(bots.map(b=>[b.id,"done"]))); setDoneConfirm(false); }} style={{flex:1,padding:"6px",fontSize:11,fontWeight:700,borderRadius:8,border:"none",backgroundColor:"rgba(34,211,160,0.15)",color:C.green,cursor:"pointer"}}>Yes, Mark All Done</button>
                  </div>
                </div>
              ):(
                <div style={{display:"flex",gap:7}}>
                  <button onClick={()=>setResetConfirm(true)} style={{flex:1,padding:"7px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.03)",color:C.textMuted,cursor:"pointer"}}>Reset All</button>

                </div>
              )}
            </div>
          </Card>
        )}

        {/* ── NOTES ── */}
        {section==="notes"&&(
          <Card>
            <Label>Internal Notes (not visible to client)</Label>
            <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} rows={5} placeholder="Context, special requests, communication preferences…" style={{...inp,resize:"vertical",lineHeight:1.7}}/>
            <div style={{marginTop:8,fontSize:10,color:C.textMuted}}>Internal only — appears in Overview tab.</div>
          </Card>
        )}
      </div>

      {/* Save button */}
      <div style={{padding:"11px 14px 24px",borderTop:`1px solid ${C.border}`,flexShrink:0,display:"flex",gap:8}}>
        <button onClick={onClose} style={{flex:1,padding:11,fontSize:13,fontWeight:600,borderRadius:10,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>

          border:saved?`1px solid ${C.green}33`:"none"
        }}>
          {saved?"✓ Saved":"Save Changes"}
        </button>
      </div>
    </Sheet>
  );
}

// ─── ADD CLIENT ───────────────────────────────────────────────────────────────
function AddClientSheet({onSave,onClose}) {
  const [step,setStep]     = useState(1);
  const [termMonths,setTermM] = useState(3);
  const [form,setForm]     = useState({name:"",contactName:"",email:"",businessAddress:"",businessPhone:"",niche:"",packageId:"",stage:"onboarding",platforms:[],adBudget:"",notes:"",contractStart:fmt(today),contractEnd:fmt(addMonths(today,3)),contractTermMonths:3});
  const [pkgCat,setPkgCat] = useState("google");
  const [saved,setSaved]   = useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const togglePlat=(p)=>setForm(prev=>({...prev,platforms:prev.platforms.includes(p)?prev.platforms.filter(x=>x!==p):[...prev.platforms,p]}));
  const selPkg=findPkg(form.packageId);
  const canSave=form.name&&form.email&&form.packageId;

  // Smart date helpers
  const setStartDate = (val) => {
    set("contractStart", val);
    try { const s=new Date(val); if(!isNaN(s)) set("contractEnd", fmt(addMonths(s, termMonths))); } catch(e){}
  };
  const setTerm = (m) => {
    setTermM(m);
    set("contractTermMonths", m);
    try { const s=new Date(form.contractStart||today); if(!isNaN(s)) set("contractEnd", fmt(addMonths(s, m))); } catch(e){}
  };
  const startDate  = new Date(form.contractStart||today);
  const endDate    = new Date(form.contractEnd||addMonths(today,3));
  const termDays   = !isNaN(startDate)&&!isNaN(endDate) ? Math.round((endDate-startDate)/(864e5)) : 0;
  const validDates = termDays >= 28;
  const handleSave=()=>{
    if(!canSave)return;
    const pkg=findPkg(form.packageId);const bots=buildBots(pkg);
    const botStatuses=Object.fromEntries(bots.map(b=>[b.id,"waiting"]));botStatuses["intake"]="active";
    onSave({...form,id:uid(),portalToken:crypto.randomUUID(),leadToken:crypto.randomUUID(),intakeComplete:false,contractSigned:false,contractStatus:"pending",healthScore:null,leads:0,cpl:0,alerts:[],commLog:[],leadsLog:[],upgradeRequest:null,botStatuses,campaignSetup:{serviceArea:"",mainOffer:"",avgTicket:"",targetLocations:"",excludedKeywords:"",leadDestination:"",crmSystem:""},brandVoice:{tone:"",competitors:"",differentiator:""},businessPhone:form.businessPhone||"",callTrackingNumber:"",callTrackingNumberSid:"",mediaLibrary:[],landingSlug:makeSlug(form.name),landingPage:{headline:"",subheadline:"",bullets:[],ctaText:"",published:false,generatedAt:null}});
    setSaved(true);setTimeout(()=>{ setSaved(false);onClose(); },1200);
  };
  return (
    <Sheet onClose={onClose} zIndex={90} height="96vh">
      <div style={{padding:"13px 14px 11px",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
          <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:C.text}}>Add New Client</div><div style={{fontSize:11,color:C.textMuted}}>Step {step} of 2 — {step===1?"Client info and package":"Contract dates and platforms"}</div></div>
          <CloseBtn onClick={onClose}/>
        </div>
        <div style={{height:3,backgroundColor:"rgba(255,255,255,.06)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",backgroundColor:"#1D4ED8",width:step===1?"50%":"100%",transition:"width .3s",borderRadius:2}}/></div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"13px 14px",display:"flex",flexDirection:"column",gap:12}}>
        {step===1&&<>
          <Card>
            <Label>Client Information</Label>
            {[{k:"name",l:"Business Name *",t:"text",ph:"e.g. Apex Roofing LLC"},{k:"contactName",l:"Contact Name",t:"text",ph:"First and last name"},{k:"email",l:"Email Address * (portal login)",t:"email",ph:"owner@business.com"},{k:"businessPhone",l:"Business Phone (for call forwarding)",t:"text",ph:"(555) 123-4567"},{k:"businessAddress",l:"Business Address",t:"text",ph:"123 Main St, City, State ZIP"}].map(({k,l,t,ph})=>(
              <div key={k} style={{marginBottom:11}}><div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:4}}>{l}</div><input type={t} value={form[k]||""} onChange={e=>set(k,e.target.value)} placeholder={ph} style={inp}/></div>
            ))}
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:4}}>Niche</div>
            <select value={form.niche} onChange={e=>set("niche",e.target.value)} style={inp}><option value="">Select niche…</option>{NICHES.map(n=><option key={n} value={n} style={{backgroundColor:C.bg2}}>{n}</option>)}</select>
          </Card>
          <Card style={{backgroundColor:`${C.gold}08`,borderColor:`${C.gold}33`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{fontSize:10,fontWeight:700,color:C.gold,textTransform:"uppercase",letterSpacing:".07em"}}>Package</div><span style={{fontSize:9,padding:"2px 7px",borderRadius:20,backgroundColor:`${C.gold}18`,border:`1px solid ${C.gold}33`,color:C.gold,fontWeight:700}}>Only you can set this</span></div>
            <div style={{display:"flex",gap:2,backgroundColor:"rgba(255,255,255,.04)",borderRadius:8,padding:3,marginBottom:10}}>{[["google","Google"],["meta","Meta"],["combined","Combined"],["ecom","E-Commerce"]].map(([key,label])=><button key={key} onClick={()=>setPkgCat(key)} style={{flex:1,padding:"4px 0",fontSize:10,fontWeight:700,borderRadius:6,border:"none",cursor:"pointer",backgroundColor:pkgCat===key?`${C.gold}33`:"transparent",color:pkgCat===key?C.gold:C.textMuted}}>{label}</button>)}</div>
            {PACKAGES_DB[pkgCat].map(pkg=>(
              <button key={pkg.id} onClick={()=>set("packageId",pkg.id)} style={{width:"100%",padding:"9px 11px",borderRadius:9,border:`1px solid ${form.packageId===pkg.id?C.gold:C.border}`,backgroundColor:form.packageId===pkg.id?`${C.gold}10`:"rgba(255,255,255,.02)",cursor:"pointer",textAlign:"left",marginBottom:5}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={S.f1min}>{pkg.tag&&<span style={{fontSize:9,fontWeight:700,padding:"1px 5px",backgroundColor:C.gold,color:"#0a0800",borderRadius:3,marginRight:5}}>{pkg.tag}</span>}<span style={{fontSize:12,fontWeight:700,color:C.text}}>{pkg.name}</span><div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{pkg.platform}</div></div>
                  <div style={{textAlign:"right",flexShrink:0}}><span style={{fontSize:14,fontWeight:800,color:C.gold}}>${pkg.price}</span><span style={{fontSize:10,color:C.textMuted}}>/mo</span></div>
                </div>
              </button>
            ))}
          </Card>
          {selPkg&&<Card style={{backgroundColor:"rgba(16,185,129,.05)",borderColor:"rgba(16,185,129,.2)"}}>
            <Label>Bot Pipeline for This Package</Label>
            <div style={{fontSize:11,color:C.textDim,lineHeight:1.7,marginBottom:7}}>{buildBots(selPkg).length} bots created, scoped to {selPkg.name}. Cannot build beyond what's included.</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{buildBots(selPkg).slice(0,4).map(b=><span key={b.id} style={{fontSize:10,padding:"2px 7px",borderRadius:20,backgroundColor:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.2)",color:"#34D399"}}>{b.name}</span>)}<span style={{fontSize:10,color:C.textMuted}}>+{Math.max(0,buildBots(selPkg).length-4)} more</span></div>
          </Card>}
        </>}
        {step===2&&<>
          {/* Contract Start */}
          <Card>
            <Label>Contract Start Date</Label>
            <div style={{display:"flex",gap:6,marginBottom:9,flexWrap:"wrap"}}>
              {[{l:"Today",v:fmt(today)},{l:"Next Mon",v:fmt(addDays(today,(8-today.getDay())%7||7))},{l:"1st Next Month",v:fmt(new Date(today.getFullYear(),today.getMonth()+1,1))}].map(({l,v})=>(

              ))}
            </div>
            <input value={form.contractStart||""} onChange={e=>setStartDate(e.target.value)} placeholder="e.g. Jun 11, 2025" style={inp}/>
          </Card>
          {/* Contract Term */}
          <Card>
            <Label>Contract Length</Label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:10}}>
              {[{m:1,l:"1 Mo",sub:"Month-to-month"},{m:3,l:"3 Mo",sub:"Standard"},{m:6,l:"6 Mo",sub:"Best value"},{m:12,l:"1 Year",sub:"Premium"}].map(({m,l,sub})=>(
                <button key={m} onClick={()=>setTerm(m)} style={{padding:"9px 4px",borderRadius:10,textAlign:"center",border:`2px solid ${termMonths===m?C.gold:C.border}`,backgroundColor:termMonths===m?C.goldDim:"rgba(255,255,255,0.02)",cursor:"pointer"}}>
                  <div style={{fontSize:12,fontWeight:700,color:termMonths===m?C.gold:C.textDim}}>{l}</div>
                  <div style={{fontSize:9,color:C.textMuted,marginTop:2}}>{sub}</div>
                </button>
              ))}
            </div>
            <div style={{padding:"10px 12px",borderRadius:9,backgroundColor:validDates?"rgba(34,211,160,0.06)":"rgba(248,113,113,0.06)",border:`1px solid ${validDates?"rgba(34,211,160,0.2)":"rgba(248,113,113,0.2)"}`,marginBottom:8}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:validDates?C.green:C.red,marginBottom:3}}>{validDates?"Contract End Date":"⚠ End date before start date"}</div>
              <div style={{fontSize:15,fontWeight:700,color:validDates?C.text:C.red}}>{form.contractEnd||"—"}</div>
              {validDates&&<div style={{fontSize:10,color:C.textMuted,marginTop:2}}>{termDays} days · {monthsLabel(termMonths)}</div>}
            </div>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:4}}>Override End Date</div>
            <input value={form.contractEnd||""} onChange={e=>set("contractEnd",e.target.value)} placeholder="e.g. Sep 11, 2025" style={{...inp,fontSize:12}}/>
          </Card>
          {/* Ad Budget */}
          <Card>
            <Label>Monthly Ad Budget</Label>
            <div style={{display:"flex",gap:6,marginBottom:9,flexWrap:"wrap"}}>
              {["$500/mo","$1,000/mo","$1,500/mo","$2,500/mo","$5,000/mo"].map(v=>(
                <button key={v} onClick={()=>set("adBudget",v)} style={{padding:"5px 10px",fontSize:10,fontWeight:700,borderRadius:20,border:`1px solid ${form.adBudget===v?C.gold:C.border}`,backgroundColor:form.adBudget===v?C.goldDim:"transparent",color:form.adBudget===v?C.gold:C.textMuted,cursor:"pointer",whiteSpace:"nowrap"}}>{v}</button>
              ))}
            </div>
            <input value={form.adBudget||""} onChange={e=>set("adBudget",e.target.value)} placeholder="e.g. $2,500/mo" style={inp}/>
          </Card>
          {/* Platforms */}
          <Card><Label>Platforms Running</Label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{PLATFORMS.map(p=><button key={p} onClick={()=>togglePlat(p)} style={{padding:"5px 11px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${form.platforms.includes(p)?"rgba(59,130,246,.4)":C.border}`,backgroundColor:form.platforms.includes(p)?"rgba(59,130,246,.12)":"rgba(255,255,255,.03)",color:form.platforms.includes(p)?"#60A5FA":C.textMuted,cursor:"pointer"}}>{p}</button>)}</div></Card>
          {/* Notes */}
          <div><div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:C.textMuted,marginBottom:4}}>Internal Notes</div><textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} rows={3} placeholder="Context, special requests, things to watch for…" style={{...inp,resize:"vertical",lineHeight:1.6}}/></div>
          {/* Summary */}
          {selPkg&&<Card style={{backgroundColor:`${C.gold}08`,borderColor:`${C.gold}22`}}>
            <Label>Summary — Review Before Adding</Label>
            <div style={{fontSize:12,color:C.textDim,lineHeight:2.1}}>
              <div><strong style={{color:C.text}}>Client:</strong> {form.name}</div>
              <div><strong style={{color:C.text}}>Niche:</strong> {form.niche||"—"}</div>
              <div><strong style={{color:C.text}}>Package:</strong> {selPkg.name} — ${selPkg.price}/mo + ${selPkg.setup} setup</div>
              <div><strong style={{color:C.text}}>Platform:</strong> {selPkg.platform}</div>
              <div><strong style={{color:C.text}}>Contract:</strong> {form.contractStart||"—"} → {form.contractEnd||"—"} ({monthsLabel(termMonths)})</div>
              {form.adBudget&&<div><strong style={{color:C.text}}>Ad Budget:</strong> {form.adBudget}</div>}
              {form.niche&&PER_LEAD[form.niche]&&<div><strong style={{color:C.text}}>Per-lead fee:</strong> ${PER_LEAD[form.niche]}/lead</div>}
            </div>
          </Card>}
        </>}
      </div>
      <div style={{padding:"11px 14px 24px",borderTop:`1px solid ${C.border}`,flexShrink:0,display:"flex",gap:8}}>
        {step===1?<>
          <button onClick={onClose} style={{flex:1,padding:10,fontSize:13,fontWeight:600,borderRadius:10,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>setStep(2)} disabled={!form.name||!form.email||!form.packageId} style={{flex:2,padding:10,fontSize:13,fontWeight:700,borderRadius:10,border:"none",backgroundColor:(!form.name||!form.email||!form.packageId)?"rgba(255,255,255,.05)":"#1D4ED8",color:(!form.name||!form.email||!form.packageId)?C.textMuted:"#fff",cursor:"pointer"}}>Next →</button>
        </>:<>
          <button onClick={()=>setStep(1)} style={{flex:1,padding:10,fontSize:13,fontWeight:600,borderRadius:10,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>← Back</button>
          <button onClick={handleSave} disabled={!canSave} style={{flex:2,padding:10,fontSize:13,fontWeight:700,borderRadius:10,border:"none",backgroundColor:saved?"#059669":canSave?"#1D4ED8":"rgba(255,255,255,.05)",color:saved||canSave?"#fff":C.textMuted,cursor:"pointer",transition:"background .2s"}}>{saved?"✓ Client Added":"Add Client"}</button>
        </>}
      </div>
    </Sheet>
  );
}

// ─── NOTIFICATIONS PANEL ─────────────────────────────────────────────────────
const CATEGORY_LABELS = {budget:"💰 Budget",creative:"🎨 Creative",targeting:"🎯 Targeting",pause:"⏸ Pause",other:"📌 Other"};

function NotificationsPanel({clients,onUpdate,onClose,onNavigate}) {
  const isDismissed = (cl,key) => (cl.dismissedAlerts||[]).includes(key);
  const dismiss = (cl,key) => onUpdate({...cl, dismissedAlerts:[...(cl.dismissedAlerts||[]), key]});
  const upgradeClients = clients.filter(c=>c.upgradeRequest);
  const urgentClients  = clients.filter(c=>{ const d=daysUntil(c.contractEnd); return d>=0&&d<=7 && !isDismissed(c,`c7:${c.contractEnd}`); });
  const expiringSoon   = clients.filter(c=>{ const d=daysUntil(c.contractEnd); return d>7&&d<=30 && !isDismissed(c,`c30:${c.contractEnd}`); });
  const intakeClients  = clients.filter(c=>!c.intakeComplete&&c.stage==="onboarding"&&!isDismissed(c,"intake"));
  const pendingApprovals = clients.flatMap(c=>(c.pendingActions||[]).map(a=>({...a,client:c})));
  const [confirming,setConfirming]=useState(null);
  const [declining,setDeclining]=useState(null);
  const [done,setDone]=useState({});
  const dismissBtn = (cl,key,color) => (
    <button onClick={(e)=>{e.stopPropagation();dismiss(cl,key);}} title="Dismiss"
      style={{background:"none",border:"none",color:C.textMuted,fontSize:16,lineHeight:1,cursor:"pointer",padding:"2px 5px",flexShrink:0}}>✕</button>
  );

  const goTo = (cl, tab) => {
    onNavigate(cl, tab);
    onClose();
  };

  // Approve/Reject an ARIA proposal. Approving a proposal that carries an exec
  // payload EXECUTES it on the right platform (Google or Meta) first: re-read the
  // account's campaigns (verifies the campaign still exists + gets fresh resource
  // names — never trust ids cached at proposal time), then fire the guarded write.
  // Success clears the card + logs "EXECUTED"; failure keeps the card in the queue
  // with the error shown so Approve becomes a retry. Proposals without exec (and
  // all rejections) just log the decision.
  const [executingId,setExecutingId]=useState(null);
  const [execErrors,setExecErrors]=useState({});
  const decideAction=async(cl,action,decision)=>{
    const ex=action.exec;
    const platform=ex&&(ex.platform==="meta"?"meta":"google");
    const linkedId=ex&&(platform==="meta"?cl.metaAdAccountId:cl.googleAdsCustomerId);
    if(decision==="approved"&&ex&&linkedId){
      if(executingId)return;
      setExecutingId(action.id);
      setExecErrors(p=>{const n={...p};delete n[action.id];return n;});
      try{
        let summary;
        if(platform==="meta"){
          const d=await metaCall({action:"campaigns",adAccountId:cl.metaAdAccountId});
          const camp=(d.campaigns||[]).find(c=>String(c.id)===String(ex.campaignId));
          if(!camp)throw new Error(`Campaign "${ex.campaignName||ex.campaignId}" wasn't found in the Meta account — it may have been removed or renamed. Nothing was changed.`);
          if(ex.kind==="set_daily_budget"){
            await metaCall({action:"setBudget",campaignId:camp.id,dailyBudgetDollars:ex.newDailyBudgetDollars});
            summary=`Meta "${camp.name}" daily budget $${camp.dailyBudget} → $${ex.newDailyBudgetDollars}`;
          }else{
            const st=ex.kind==="pause_campaign"?"PAUSED":"ACTIVE";
            await metaCall({action:"setStatus",campaignId:camp.id,status:st});
            summary=`Meta "${camp.name}" ${st==="PAUSED"?"paused":"activated"}`;
          }
        }else{
          const d=await gadsCall({action:"campaigns",customerId:cl.googleAdsCustomerId});
          const camp=(d.campaigns||[]).find(c=>String(c.id)===String(ex.campaignId));
          if(!camp)throw new Error(`Campaign "${ex.campaignName||ex.campaignId}" wasn't found in the Google account — it may have been removed or renamed. Nothing was changed.`);
          if(ex.kind==="set_daily_budget"){
            await gadsCall({action:"setBudget",customerId:cl.googleAdsCustomerId,budgetResourceName:camp.budgetResourceName,dollars:ex.newDailyBudgetDollars});
            summary=`Google "${camp.name}" daily budget $${camp.dailyBudget} → $${ex.newDailyBudgetDollars}`;
          }else{
            const st=ex.kind==="pause_campaign"?"PAUSED":"ENABLED";
            await gadsCall({action:"setStatus",customerId:cl.googleAdsCustomerId,campaignResourceName:camp.campaignResourceName,status:st});
            summary=`Google "${camp.name}" ${st==="PAUSED"?"paused":"re-enabled"}`;
          }
        }
        setExecutingId(null);
        onUpdate({...cl,
          pendingActions:(cl.pendingActions||[]).filter(a=>a.id!==action.id),
          commLog:[{date:fmt(new Date()),note:`Approved + EXECUTED: ${action.title} (${summary})`,cat:"update",ts:Date.now()},...(cl.commLog||[])],
        });
      }catch(e){
        setExecutingId(null);
        setExecErrors(p=>({...p,[action.id]:e.message||"Execution failed — nothing was changed."}));
      }
      return;
    }
    onUpdate({...cl,
      pendingActions:(cl.pendingActions||[]).filter(a=>a.id!==action.id),
      commLog:[{date:fmt(new Date()),note:`${decision==="approved"?"Approved":"Rejected"} ARIA proposal: ${action.title}`,cat:"update",ts:Date.now()},...(cl.commLog||[])],
    });
  };

  const confirmUpgrade=(cl)=>{
    const newPkg=ALL_PKGS.find(p=>cl.upgradeRequest && cl.upgradeRequest.includes(p.name))||findPkg(cl.packageId);
    const bots=buildBots(newPkg);
    const botStatuses=Object.fromEntries(bots.map(b=>[b.id,"waiting"]));
    botStatuses["intake"]="done";botStatuses["ceo"]="done";
    onUpdate({...cl,packageId:newPkg.id,upgradeRequest:null,botStatuses,
      alerts:[...(cl.alerts||[]).filter(a=>a.type!=="upgrade"),
        {type:"upgrade_done",msg:`Upgraded to ${newPkg.name} — send invoice to ${cl.email}`,severity:"blue"}]
    });
    setDone(p=>({...p,[cl.id]:true}));
    setTimeout(()=>setConfirming(null),1000);
  };

  const totalCount = upgradeClients.length + urgentClients.length + expiringSoon.length + pendingApprovals.length + intakeClients.length;

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:80,backgroundColor:"rgba(0,0,0,.82)",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} className="os-sheet" style={{width:"100%",maxWidth:640,height:"88vh","--sh-dvh":"88dvh",backgroundColor:C.bg2,borderRadius:"20px 20px 0 0",border:`1px solid ${C.border}`,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${C.border}`,flexShrink:0,display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,color:C.text}}>Notifications</div>
            <div style={{fontSize:11,color:C.textMuted}}>{totalCount===0?"All clear — nothing needs attention":`${totalCount} item${totalCount!==1?"s":""} need your attention`}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.textMuted,fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"14px 14px 40px"}}>

          {/* Upgrade Requests */}
          {upgradeClients.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.purple,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:6,height:6,borderRadius:"50%",backgroundColor:C.purple,display:"inline-block"}}/>
                Upgrade Requests
              </div>
              {upgradeClients.map(cl=>(
                <div key={cl.id} style={{backgroundColor:C.bg3,border:`1px solid ${C.purple}33`,borderRadius:11,padding:"13px 14px",marginBottom:8}}>
                  <div onClick={()=>goTo(cl,"package")} style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10,cursor:"pointer"}}>
                    <div style={{width:36,height:36,borderRadius:9,backgroundColor:`${C.gold}18`,border:`1px solid ${C.gold}2a`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:C.gold,flexShrink:0}}>{cl.name[0]}</div>
                    <div style={S.f1min}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div>
                      <div style={{fontSize:11,color:C.purple,marginTop:1}}>Requested: {cl.upgradeRequest}</div>
                      <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>Current: {(findPkg(cl.packageId) && findPkg(cl.packageId).name)} · ${(findPkg(cl.packageId) && findPkg(cl.packageId).price)}/mo</div>
                    </div>
                    <IconChevron size={14} color={C.purple}/>
                  </div>
                  {done[cl.id]?(
                    <div style={{padding:"9px 12px",borderRadius:9,backgroundColor:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.25)",fontSize:12,fontWeight:700,color:C.green,textAlign:"center"}}>
                      ✓ Upgrade confirmed — send invoice to {cl.email}
                    </div>
                  ):confirming===cl.id?(
                    <div>
                      <div style={{fontSize:11,color:C.textDim,marginBottom:8,lineHeight:1.6}}>Confirming this upgrade will apply the new package immediately. Send the updated invoice separately before or after confirming.</div>
                      <div style={S.row7}>
                        <button onClick={()=>setConfirming(null)} style={{flex:1,padding:"9px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
                        <button onClick={()=>confirmUpgrade(cl)} style={{flex:2,padding:"9px",fontSize:12,fontWeight:700,borderRadius:9,border:"none",backgroundColor:C.purple,color:"#fff",cursor:"pointer"}}>Confirm Upgrade ✓</button>
                      </div>
                    </div>
                  ):(
                    declining===cl.id?(
                      <div style={{padding:"10px 12px",borderRadius:9,backgroundColor:"rgba(248,113,113,0.06)",border:`1px solid ${C.red}33`}}>
                        <div style={{fontSize:11,color:C.textDim,marginBottom:8,lineHeight:1.6}}>Decline this upgrade request? The client will need to submit a new request if they still want to upgrade.</div>
                        <div style={{display:"flex",gap:7}}>
                          <button onClick={()=>setDeclining(null)} style={{flex:1,padding:"7px",fontSize:11,fontWeight:600,borderRadius:8,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Cancel</button>
                          <button onClick={()=>{ onUpdate({...cl,upgradeRequest:null}); setDeclining(null); }} style={{flex:1,padding:"7px",fontSize:11,fontWeight:700,borderRadius:8,border:"none",backgroundColor:"rgba(248,113,113,0.15)",color:C.red,cursor:"pointer"}}>Yes, Decline</button>
                        </div>
                      </div>
                    ):(
                    <div style={S.row7}>
                      <button onClick={()=>setDeclining(cl.id)} style={{flex:1,padding:"8px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer"}}>Decline</button>
                      <button onClick={()=>setConfirming(cl.id)} style={{flex:2,padding:"8px",fontSize:12,fontWeight:700,borderRadius:9,border:`1px solid ${C.purple}44`,backgroundColor:`${C.purple}22`,color:C.purple,cursor:"pointer"}}>Review and Confirm →</button>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}

          {/* Pending Approvals (ARIA proposals) */}
          {pendingApprovals.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.gold,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:6,height:6,borderRadius:"50%",backgroundColor:C.gold,display:"inline-block"}}/>
                Pending Approvals
              </div>
              {pendingApprovals.map(({client:cl,...action})=>(
                <div key={action.id} style={{backgroundColor:C.bg3,border:`1px solid ${C.gold}33`,borderRadius:11,padding:"13px 14px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:9}}>
                    <div style={{width:34,height:34,borderRadius:9,backgroundColor:`${C.purple}18`,border:`1px solid ${C.purple}2a`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>✦</div>
                    <div style={S.f1min}>
                      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{action.title}{action.exec&&<span style={{marginLeft:7,fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20,backgroundColor:"rgba(34,211,160,0.12)",border:"1px solid rgba(34,211,160,0.3)",color:C.green,whiteSpace:"nowrap",verticalAlign:"2px"}}>⚡ Executes on approve</span>}</div>
                      {action.detail&&<div style={{fontSize:11,color:C.textDim,marginTop:3,lineHeight:1.6}}>{action.detail}</div>}
                      <div style={{fontSize:10,color:C.textMuted,marginTop:4}}>{cl.name} · {CATEGORY_LABELS[action.category]||CATEGORY_LABELS.other} · ARIA proposal</div>
                      {execErrors[action.id]&&<div style={{fontSize:10.5,color:C.red,marginTop:5,lineHeight:1.5}}>⚠ {execErrors[action.id]}</div>}
                    </div>
                  </div>
                  <div style={S.row7}>
                    <button onClick={()=>decideAction(cl,action,"rejected")} disabled={executingId===action.id} style={{flex:1,padding:"8px",fontSize:11,fontWeight:600,borderRadius:9,border:`1px solid ${C.border}`,backgroundColor:"rgba(255,255,255,.04)",color:C.textMuted,cursor:"pointer",opacity:executingId===action.id?.5:1}}>Reject</button>
                    <button onClick={()=>decideAction(cl,action,"approved")} disabled={executingId===action.id} style={{flex:2,padding:"8px",fontSize:12,fontWeight:700,borderRadius:9,border:`1px solid ${C.gold}44`,backgroundColor:C.goldDim,color:C.gold,cursor:"pointer",opacity:executingId===action.id?.7:1}}>{executingId===action.id?"Executing in Google Ads…":execErrors[action.id]?"Retry Execution":"Approve"}</button>
                  </div>
                </div>
              ))}
              <div style={{fontSize:10,color:C.textMuted,lineHeight:1.6,padding:"2px 2px 0"}}>Approving a proposal marked ⚡ executes the change in the client's Google Ads account immediately (logged as "EXECUTED" in their activity log). Proposals without ⚡ are logged for you to carry out manually — that includes all Meta changes until Meta's API is verified. Rejecting only records your decision; nothing is ever changed.</div>
            </div>
          )}

          {/* Urgent contract alerts (≤7 days) */}
          {urgentClients.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.red,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:6,height:6,borderRadius:"50%",backgroundColor:C.red,display:"inline-block"}}/>
                Urgent — Contract Expiring
              </div>
              {urgentClients.map(cl=>{
                const d=daysUntil(cl.contractEnd);
                return (
                  <div key={cl.id} onClick={()=>goTo(cl,"contract")} style={{backgroundColor:C.bg3,border:`1px solid ${C.red}33`,borderRadius:11,padding:"13px 14px",marginBottom:8,cursor:"pointer"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{width:34,height:34,borderRadius:9,backgroundColor:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⚠</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div>
                        <div style={{fontSize:11,color:C.red,marginTop:1}}>Contract expires in {d} day{d!==1?"s":""}. Tap to renew.</div>
                        <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{cl.email} · {(findPkg(cl.packageId) && findPkg(cl.packageId).name)}</div>
                      </div>
                      <IconChevron size={14} color={C.red}/>
                      {dismissBtn(cl,`c7:${cl.contractEnd}`)}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* 30-day contract alerts */}
          {expiringSoon.length>0&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:C.amber,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:6,height:6,borderRadius:"50%",backgroundColor:C.amber,display:"inline-block"}}/>
                Contract Renewals Coming Up
              </div>
              {expiringSoon.map(cl=>{
                const d=daysUntil(cl.contractEnd);
                return (
                  <div key={cl.id} onClick={()=>goTo(cl,"contract")} style={{backgroundColor:C.bg3,border:`1px solid ${C.amber}33`,borderRadius:11,padding:"13px 14px",marginBottom:8,cursor:"pointer"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{width:34,height:34,borderRadius:9,backgroundColor:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>↻</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{cl.name}</div>
                        <div style={{fontSize:11,color:C.amber,marginTop:1}}>Expires in {d} days. Tap to open contract.</div>
                        <div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{cl.email} · ${(findPkg(cl.packageId) && findPkg(cl.packageId).price)}/mo</div>
                      </div>
                      <IconChevron size={14} color={C.amber}/>
                      {dismissBtn(cl,`c30:${cl.contractEnd}`)}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Intake alerts */}
          {intakeClients.length>0&&(
            <div style={{marginBottom:20}}>

// ─── AUTH GATE ─────────────────────────────────────────────────────────────────
function AuthGate() {
  const [session,setSession] = useState(undefined); // undefined=checking, null=logged out

  useEffect(() => {
    supabaseClient.auth.getSession().then(({data})=>setSession(data.session));
    const { data:listener } = supabaseClient.auth.onAuthStateChange((_event,sess)=>setSession(sess));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (session === undefined) {
    return <div style={{minHeight:"100vh",backgroundColor:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:C.textMuted,fontSize:13}}>Loading…</div></div>;
  }
  if (!session) return <LoginScreen/>;
  return <App onLogout={()=>supabaseClient.auth.signOut()}/>;
}

// BoldLine's own inbound leads from boldlinemedia.com (contact form + quiz),
// stored in the website_leads table by the marketing site's submission-created
// function. Separate from per-client customer leads.
const LEAD_STATUSES = ["new","contacted","won","lost","archived"];
const leadStatusColor = (s) => s==="new"?C.gold:s==="contacted"?C.blue:s==="won"?C.green:s==="lost"?C.red:C.textMuted;
function leadTimeAgo(iso){
  const t = new Date(iso).getTime(); if(!t) return "";
  const s = Math.floor((Date.now()-t)/1000);
  if(s<60) return "just now";
  const m=Math.floor(s/60); if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  const d=Math.floor(h/24); if(d<7) return d+"d ago";
  return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

// ─── DESKTOP BREAKPOINT ───────────────────────────────────────────────────────
// Single source of truth for "is this a desktop-sized viewport". Mobile layout is
// untouched; desktop (≥1024px) gets the sidebar shell + multi-column grids.
function useIsDesktop(bp=1024){
  const get = () => typeof window!=="undefined" && window.innerWidth>bp;
  const [d,setD] = useState(get);
  useEffect(()=>{
    const m = window.matchMedia(`(min-width:${bp+1}px)`);
    const on = () => setD(m.matches);
    on();
    m.addEventListener?m.addEventListener("change",on):m.addListener(on);
    return () => { m.removeEventListener?m.removeEventListener("change",on):m.removeListener(on); };
  },[bp]);
  return d;
}
