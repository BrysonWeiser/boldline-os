  </svg>
);
const IconChevron = ({size=16,color="#fff"}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
);
const IconCheck = ({size=14,color}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function BottomNav({screen,onHome,onNotif,onARIA,notifCount}) {
  const navBg = "rgba(7,8,16,0.96)";
  const btnStyle = (active) => ({
    flex:1,height:"100%",background:"none",border:"none",cursor:"pointer",
    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,
    position:"relative",
  });
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:640,margin:"0 auto",height:64,
      backgroundColor:navBg,borderTop:"1px solid rgba(255,255,255,0.06)",
      display:"flex",alignItems:"center",zIndex:50,
      backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)"}}>
      {/* Home */}
      <button onClick={onHome} style={btnStyle(screen==="home")}>
        <IconHome size={22} color={screen==="home"?"#C8A84B":C.textMuted}/>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",
          color:screen==="home"?"#C8A84B":C.textMuted}}>Home</span>
        {screen==="home"&&<span style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",
          width:24,height:2,borderRadius:2,backgroundColor:"#C8A84B"}}/>}
      </button>

      {/* Alerts */}
      <button onClick={onNotif} style={btnStyle(false)}>
        <div style={{position:"relative"}}>
          <IconBell size={22} color={notifCount>0?C.amber:C.textMuted}/>
          {notifCount>0&&(
            <span style={{position:"absolute",top:-5,right:-7,minWidth:15,height:15,
              borderRadius:8,backgroundColor:C.red,color:"#fff",
              fontSize:9,fontWeight:800,display:"flex",alignItems:"center",
              justifyContent:"center",padding:"0 3px",lineHeight:1,
              border:"1.5px solid rgba(7,8,16,0.9)"}}>
              {notifCount}
            </span>
          )}
        </div>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",
          color:notifCount>0?C.amber:C.textMuted}}>Alerts</span>
      </button>

      {/* ARIA */}
      <button onClick={onARIA} style={btnStyle(false)}>
        <div style={{width:28,height:28,borderRadius:8,background:C.gradA,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <IconStar size={14} color="#fff"/>
        </div>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",
          color:C.purple}}>ARIA</span>
      </button>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [clients,setClients]           = useState(INIT_CLIENTS);
  const [screen,setScreen]             = useState("home");
  const [activeClient,setActiveClient] = useState(null);
  const [showARIA,setShowARIA]         = useState(false);
  const [showAdd,setShowAdd]           = useState(false);
  const [showNotif,setShowNotif]       = useState(false);

  const updateClient = useCallback((updated) => {
    setClients(prev=>prev.map(c=>c.id===updated.id?updated:c));
    if((activeClient && activeClient.id)===updated.id) setActiveClient(updated);
  },[activeClient]);

  const selectClient = (cl) => { setActiveClient(cl); setScreen("client"); };
  const addClient    = (cl) => { setClients(p=>[...p,cl]); setShowAdd(false); setActiveClient(cl); setScreen("client"); };

  const notifCount = clients.filter(c=>c.upgradeRequest).length
    + clients.filter(c=>{ const d=daysUntil(c.contractEnd); return d>=0&&d<=30; }).length
    + clients.filter(c=>!c.intakeComplete&&c.stage==="onboarding").length;

  return (
    <div style={{minHeight:"100vh",backgroundColor:C.bg,color:C.text,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",display:"flex",flexDirection:"column",maxWidth:640,margin:"0 auto",position:"relative"}}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:rgba(200,168,75,0.15);border-radius:2px}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes db{0%,80%,100%{transform:scale(.55);opacity:.35}40%{transform:scale(1);opacity:1}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        input::placeholder,textarea::placeholder{color:#2D3748}
        button,select,input,textarea{font-family:inherit}
        select option{background:#0C0D18;color:#F0F2FF}
        button:active{transform:scale(0.97);transition:transform 0.1s}
        /* ── Responsive layout ── */
        :root{--pad:14px;--card-r:14px;--font-base:13px;--font-sm:11px;--font-xs:10px}
        @media(min-width:641px){
          :root{--pad:20px;--card-r:16px;--font-base:14px;--font-sm:12px;--font-xs:11px}
        }
        @media(min-width:1025px){
          :root{--pad:28px;--card-r:18px;--font-base:15px;--font-sm:13px;--font-xs:11px}
        }
      `}</style>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",paddingBottom:60}}>
        {screen==="home"&&<HomeScreen clients={clients} onSelect={selectClient} onAdd={()=>setShowAdd(true)}/>}
        {screen==="client"&&activeClient&&<ClientHub client={activeClient} onUpdate={updateClient} onBack={()=>setScreen("home")}/>}
      </div>
      <BottomNav screen={screen} onHome={()=>setScreen("home")} onNotif={()=>setShowNotif(true)} onARIA={()=>setShowARIA(true)} notifCount={notifCount}/>
      {showNotif&&<NotificationsPanel
        clients={clients}
        onUpdate={updateClient}
        onClose={()=>setShowNotif(false)}
        onNavigate={(cl,tab)=>{
          setActiveClient({...cl,_initialTab:tab});
          setScreen("client");
          setShowNotif(false);
        }}
      />}
      {showARIA&&<ARIAPanel clients={clients} onClose={()=>setShowARIA(false)}/>}
      {showAdd&&<AddClientSheet onSave={addClient} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(App));
  </script>
</body>
</html>
