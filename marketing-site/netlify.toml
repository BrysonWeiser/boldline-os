[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Blog routes. force=true so these dynamic redirects always win, even though
# blog.css lives at the site root (/blog.css) — we keep NO real files under
# /blog/ so the placeholder routes below aren't shadowed by a real directory.
# Pagination first (/blog/page/2/, ...), with/without trailing slash.
[[redirects]]
  from = "/blog/page/:n/"
  to = "/.netlify/functions/blog-index?page=:n"
  status = 200
  force = true

[[redirects]]
  from = "/blog/page/:n"
  to = "/.netlify/functions/blog-index?page=:n"
  status = 200
  force = true

[[redirects]]
  from = "/blog/"
  to = "/.netlify/functions/blog-index"
  status = 200
  force = true

[[redirects]]
  from = "/blog"
  to = "/.netlify/functions/blog-index"
  status = 200
  force = true

# Individual posts -- /blog/:slug/ is the canonical form used everywhere on
# the site; the no-trailing-slash rule below just covers stray links/typing.
[[redirects]]
  from = "/blog/:slug/"
  to = "/.netlify/functions/blog-post?slug=:slug"
  status = 200
  force = true

[[redirects]]
  from = "/blog/:slug"
  to = "/.netlify/functions/blog-post?slug=:slug"
  status = 200
  force = true

# No catch-all on purpose: real files (index.html, privacy.html, terms.html) are
# served directly, blog routes are handled above, and any other path falls through
# to Netlify's 404 — which serves our branded /404.html with a true 404 status.
# (A previous "/* -> /index.html 200" rule caused soft-404s: unknown URLs returned
# the homepage as if it existed, which hurts SEO.)
